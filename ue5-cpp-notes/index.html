<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UE5 C++ 학습 노트</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/RIDIBatang.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;500;700&display=swap">

  <script>
    (function () {
      const COOKIE_NAME = "reader_prefs";
      const FONT_FAMILIES = {
        pretendard: '"Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif',
        ridibatang: '"RIDIBatang", "Noto Serif KR", serif',
        notoSans: '"Noto Sans KR", "Apple SD Gothic Neo", sans-serif',
        notoSerif: '"Noto Serif KR", "RIDIBatang", serif'
      };
      const FONT_SIZES = ["15", "16", "18", "20", "22"];
      const LINE_HEIGHT_STEPS = ["1.65", "1.8", "1.95", "2.1"];
      const THEMES = {
        paper: {
          bg: "#f6f3ec",
          surface: "#fffdf9",
          text: "#2b241b",
          muted: "#6d6457",
          link: "#275cb5",
          border: "#ddd2c3",
          codeBg: "#f1eadf"
        },
        sepia: {
          bg: "#efe4d5",
          surface: "#f8efe4",
          text: "#3c2f22",
          muted: "#6f5b46",
          link: "#8c592b",
          border: "#d2c0ab",
          codeBg: "#e8d9c4"
        },
        sage: {
          bg: "#edf2ec",
          surface: "#f7faf6",
          text: "#253227",
          muted: "#5c6d60",
          link: "#2d6c60",
          border: "#cad7cc",
          codeBg: "#e5ede6"
        },
        slate: {
          bg: "#1d2128",
          surface: "#242932",
          text: "#e8edf3",
          muted: "#aab5c3",
          link: "#8fb4ff",
          border: "#3d4653",
          codeBg: "#1a1f27"
        }
      };

      function getDefaultTheme() {
        if (!window.matchMedia) {
          return "sage";
        }
        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "slate"
          : "sage";
      }

      function getBasePath() {
        const pathname = window.location.pathname || "/";
        if (pathname.endsWith("/")) {
          return pathname || "/";
        }
        return pathname.replace(/[^/]*$/, "") || "/";
      }

      function getCookie(name) {
        const escapedName = name.replace(/[$()*+.?[\\\]^{|}]/g, "\\$&");
        const match = document.cookie.match(new RegExp("(?:^|; )" + escapedName + "=([^;]*)"));
        if (!match) {
          return null;
        }
        try {
          return JSON.parse(decodeURIComponent(match[1]));
        } catch (error) {
          return null;
        }
      }

      function getDefaults() {
        return {
          font: "ridibatang",
          fontSize: "16",
          lineHeight: "1.8",
          theme: getDefaultTheme()
        };
      }

      function sanitizePrefs(candidate) {
        const defaults = getDefaults();
        const prefs = Object.assign({}, defaults);
        if (!candidate || typeof candidate !== "object") {
          return prefs;
        }

        if (FONT_FAMILIES[candidate.font]) {
          prefs.font = candidate.font;
        }
        if (FONT_SIZES.includes(String(candidate.fontSize))) {
          prefs.fontSize = String(candidate.fontSize);
        }
        if (LINE_HEIGHT_STEPS.includes(String(candidate.lineHeight))) {
          prefs.lineHeight = String(candidate.lineHeight);
        }
        if (THEMES[candidate.theme]) {
          prefs.theme = candidate.theme;
        }
        return prefs;
      }

      function applyTheme(themeName) {
        const theme = THEMES[themeName] || THEMES[getDefaultTheme()];
        const root = document.documentElement;
        root.style.setProperty("--reader-bg", theme.bg);
        root.style.setProperty("--reader-surface", theme.surface);
        root.style.setProperty("--reader-text", theme.text);
        root.style.setProperty("--reader-muted", theme.muted);
        root.style.setProperty("--reader-link", theme.link);
        root.style.setProperty("--reader-border", theme.border);
        root.style.setProperty("--reader-code-bg", theme.codeBg);
      }

      function applyPrefs(prefs) {
        const root = document.documentElement;
        root.dataset.readerFont = prefs.font;
        root.dataset.readerTheme = prefs.theme;
        root.style.setProperty("--reader-font-family", FONT_FAMILIES[prefs.font]);
        root.style.setProperty("--reader-font-size", prefs.fontSize + "px");
        root.style.setProperty("--reader-line-height", prefs.lineHeight);
        applyTheme(prefs.theme);
      }

      const initialPrefs = sanitizePrefs(getCookie(COOKIE_NAME));
      window.__readerPrefsState = {
        COOKIE_NAME,
        FONT_FAMILIES,
        FONT_SIZES,
        LINE_HEIGHT_STEPS,
        THEMES,
        getBasePath,
        getCookie,
        getDefaults,
        sanitizePrefs,
        applyPrefs,
        current: initialPrefs
      };

      applyPrefs(initialPrefs);
    })();
  </script>

  <style>
    :root {
      --base-font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --base-font-size: 16px;
      --base-line-height: 1.75;
      --sidebar-width: 260px;
      --code-font-family: "D2Coding", "Consolas", monospace;
      --reader-font-family: "RIDIBatang", "Noto Serif KR", serif;
      --reader-font-size: 16px;
      --reader-line-height: 1.8;
      --reader-bg: #f6f3ec;
      --reader-surface: #fffdf9;
      --reader-text: #2b241b;
      --reader-muted: #6d6457;
      --reader-link: #275cb5;
      --reader-border: #ddd2c3;
      --reader-code-bg: #f1eadf;
    }

    /* 본문은 읽기용 바탕체 */
    .content {
      background: var(--reader-bg);
      padding-bottom: 120px;
      transition: background-color 180ms ease;
    }

    .markdown-section {
      font-family: var(--reader-font-family);
      font-size: var(--reader-font-size);
      line-height: var(--reader-line-height);
      color: var(--reader-text);
      background: var(--reader-surface);
      border: 1px solid var(--reader-border);
      border-radius: 22px;
      box-shadow: 0 18px 36px rgba(15, 18, 24, 0.06);
      word-break: keep-all;
      overflow-wrap: break-word;
      padding: 20px 24px 40px;
      transition:
        background-color 180ms ease,
        color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
    }

    /* 제목은 산세리프로 유지 */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      font-family: var(--reader-font-family);
      line-height: 1.4;
      word-break: keep-all;
      letter-spacing: -0.01em;
      color: var(--reader-text);
    }

    /* 본문 텍스트 가독성 미세 조정 */
    .markdown-section p,
    .markdown-section li,
    .markdown-section blockquote,
    .markdown-section td,
    .markdown-section th {
      letter-spacing: -0.01em;
      color: var(--reader-text);
    }

    /* 사이드바와 UI는 산세리프 + 테마 적용 */
    .sidebar,
    .sidebar ul li a,
    .app-name,
    .search input {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .sidebar {
      background: var(--reader-bg) !important;
      color: var(--reader-text);
      border-right: 1px solid var(--reader-border);
      transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .sidebar .app-name {
      color: var(--reader-text);
    }

    .sidebar ul li a {
      color: var(--reader-muted);
      transition: color 180ms ease;
    }

    .sidebar ul li a:hover {
      color: var(--reader-link);
    }

    .sidebar ul li.active > a {
      color: var(--reader-link);
      font-weight: 700;
    }

    .sidebar .search input {
      background: var(--reader-surface);
      color: var(--reader-text);
      border: 1px solid var(--reader-border);
      transition: background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .sidebar-toggle {
      background-color: var(--reader-surface) !important;
      border-top: 1px solid var(--reader-border) !important;
      transition: background-color 180ms ease, border-color 180ms ease;
    }

    .sidebar-toggle .sidebar-toggle-button .icon path {
      fill: var(--reader-muted);
    }

    /* 코드 블록/인라인 코드는 고정폭 유지 */
    .markdown-section pre,
    .markdown-section pre > code,
    .markdown-section code,
    .markdown-section tt {
      font-family: "D2Coding", "Consolas", monospace;
    }

    .markdown-section pre > code {
      font-size: 13px;
    }

    .markdown-section a {
      color: var(--reader-link);
    }

    .markdown-section strong,
    .markdown-section b {
      color: var(--reader-text);
    }

    .markdown-section blockquote {
      background: var(--reader-bg);
      border-left: 4px solid var(--reader-border);
      border-radius: 0 14px 14px 0;
      padding: 12px 16px;
      color: var(--reader-muted);
    }

    .markdown-section hr {
      border-color: var(--reader-border);
    }

    .markdown-section table,
    .markdown-section table tr,
    .markdown-section table td,
    .markdown-section table th {
      border-color: var(--reader-border) !important;
    }

    .markdown-section thead {
      background: var(--reader-bg);
    }

    .markdown-section pre {
      background: var(--reader-code-bg) !important;
      border: 1px solid var(--reader-border);
      border-radius: 16px;
    }

    .markdown-section pre > code {
      background: transparent !important;
    }

    .markdown-section :not(pre) > code {
      background: var(--reader-code-bg);
      border: 1px solid var(--reader-border);
      border-radius: 6px;
      color: var(--reader-text);
      padding: 0.15em 0.35em;
    }

    .audio-overview {
      margin: 18px 0 24px;
      padding: 18px 20px;
      border: 1px solid var(--reader-border);
      border-radius: 18px;
      background: linear-gradient(135deg, var(--reader-code-bg), var(--reader-surface));
      box-shadow: 0 10px 24px rgba(15, 18, 24, 0.08);
    }

    .audio-overview-label,
    .audio-overview-title,
    .audio-overview-description {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .audio-overview-label {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--reader-surface);
      border: 1px solid var(--reader-border);
      color: var(--reader-muted);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .audio-overview-title {
      margin: 0;
      color: var(--reader-text);
      font-size: 1.08rem;
      font-weight: 700;
    }

    .audio-overview-description {
      margin: 10px 0 14px;
      color: var(--reader-muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .audio-overview-player {
      width: 100%;
      min-height: 44px;
    }

    /* reader-settings-toggle: sidebar-toggle 바로 아래, 동일 패턴 */
    .reader-settings-toggle {
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 20;
      margin-bottom: 44px;
      width: auto;
      appearance: none;
      outline: none;
      cursor: pointer;
      background: var(--reader-surface);
      border: none;
      border-top: 1px solid var(--reader-border);
      border-right: 1px solid var(--reader-border);
      border-radius: 0 4px 0 0;
      padding: 10px 10px 6px;
      transition: background-color 180ms ease;
    }

    .reader-settings-toggle:hover {
      background: var(--reader-code-bg);
    }

    .reader-settings-toggle-button {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--reader-muted);
      line-height: 1;
      pointer-events: none;
      transition: color 180ms ease;
    }

    .reader-settings-toggle:hover .reader-settings-toggle-button {
      color: var(--reader-text);
    }

    .reader-settings-toggle:focus-visible,
    .reader-settings-panel button:focus-visible {
      outline: 2px solid var(--reader-link);
      outline-offset: 2px;
    }

    .reader-settings-panel {
      position: fixed;
      left: 4px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 88px);
      z-index: 40;
      width: min(360px, calc(100vw - 28px));
      max-height: min(72vh, 700px);
      overflow: auto;
      padding: 18px;
      border: 1px solid var(--reader-border);
      border-radius: 20px;
      background: var(--reader-surface);
      color: var(--reader-text);
      box-shadow: 0 18px 42px rgba(15, 18, 24, 0.2);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .reader-settings-panel.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .reader-settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .reader-settings-title {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }

    .reader-settings-subtitle {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 0.82rem;
      color: var(--reader-muted);
      margin: 4px 0 0;
    }

    .reader-settings-section + .reader-settings-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--reader-border);
    }

    .reader-settings-label {
      display: block;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .reader-option-grid {
      display: grid;
      gap: 8px;
    }

    .reader-option-grid.font-grid,
    .reader-option-grid.theme-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .reader-size-stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reader-chip,
    .reader-theme-chip,
    .reader-stepper-button,
    .reader-reset-button {
      appearance: none;
      border: 1px solid var(--reader-border);
      background: transparent;
      color: var(--reader-text);
      border-radius: 12px;
      cursor: pointer;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease, transform 140ms ease;
    }

    .reader-chip,
    .reader-theme-chip {
      padding: 10px 12px;
      text-align: left;
    }

    .reader-chip:hover,
    .reader-theme-chip:hover,
    .reader-stepper-button:hover,
    .reader-reset-button:hover {
      transform: translateY(-1px);
    }

    .reader-chip.is-active,
    .reader-theme-chip.is-active {
      background: var(--reader-code-bg);
      border-color: var(--reader-link);
    }

    .reader-chip-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .reader-chip-meta {
      display: block;
      margin-top: 4px;
      font-size: 0.74rem;
      color: var(--reader-muted);
    }

    .reader-size-stepper .reader-stepper-value {
      font-size: 0.92rem;
    }

    .reader-theme-chip {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reader-theme-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.12);
      flex: 0 0 auto;
    }

    .reader-stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reader-stepper-button {
      width: 40px;
      height: 40px;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      padding: 0;
    }

    .reader-stepper-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .reader-stepper-value {
      min-width: 48px;
      text-align: center;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .reader-reset-button {
      width: 100%;
      padding: 12px 14px;
      text-align: center;
      font-weight: 700;
    }

    .reader-reset-button:hover {
      background: var(--reader-code-bg);
    }

    @media (max-width: 768px) {
      .markdown-section {
        border-radius: 18px;
        padding: 18px 18px 32px;
      }

      .reader-settings-panel {
        width: min(360px, calc(100vw - 20px));
      }

    }

    @media (max-width: 480px) {
      .reader-option-grid.font-grid,
      .reader-option-grid.theme-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    const AUDIO_OVERVIEWS = {
      "/cpp_core/01_메모리_모델": {
        src: "audio/cpp_core/01_메모리_모델.m4a"
      },
      "/cpp_core/02_타입_시스템": {
        src: "audio/cpp_core/02_타입_시스템.m4a"
      },
      "/cpp_core/03_OOP": {
        src: "audio/cpp_core/03_OOP.m4a"
      },
      "/cpp_core/04_모던_CPP": {
        src: "audio/cpp_core/04_모던_CPP.m4a"
      },
      "/cpp_core/05_에러_핸들링": {
        src: "audio/cpp_core/05_에러_핸들링.m4a"
      },
      "/ue5_object_system/01_리플렉션_매크로": {
        src: "audio/ue5_object_system/01_리플렉션_매크로.m4a"
      },
      "/ue5_object_system/02_메모리_GC": {
        src: "audio/ue5_object_system/02_메모리_GC.m4a"
      },
      "/ue5_object_system/03_타입_컨테이너": {
        src: "audio/ue5_object_system/03_타입_컨테이너.m4a"
      }
    };

    function normalizeDocsifyPath(path) {
      const decoded = decodeURIComponent(path || "/");
      const withoutMd = decoded.replace(/\.md$/, "");
      const withoutTrailingSlash = withoutMd.replace(/\/+$/, "");
      return withoutTrailingSlash || "/";
    }

    function buildAudioOverviewCard(entry) {
      const card = document.createElement("section");
      card.className = "audio-overview";

      const label = document.createElement("div");
      label.className = "audio-overview-label";
      label.textContent = "Audio Overview";

      const title = document.createElement("div");
      title.className = "audio-overview-title";
      title.textContent = "NotebookLM 오디오 오버뷰";

      const description = document.createElement("p");
      description.className = "audio-overview-description";
      description.textContent = "테크니컬 인터뷰 대비용 요약입니다. 핵심 개념, 자주 나오는 질문, 헷갈리는 포인트 중심으로 들으면 됩니다.";

      const audio = document.createElement("audio");
      audio.className = "audio-overview-player";
      audio.controls = true;
      audio.preload = "none";
      audio.src = encodeURI(entry.src);

      card.appendChild(label);
      card.appendChild(title);
      card.appendChild(description);
      card.appendChild(audio);
      return card;
    }

    function injectAudioOverview(routePath) {
      const section = document.querySelector(".markdown-section");
      if (!section) {
        return;
      }

      section.querySelectorAll(".audio-overview").forEach(function (node) {
        node.remove();
      });

      const entry = AUDIO_OVERVIEWS[normalizeDocsifyPath(routePath)];
      if (!entry) {
        return;
      }

      const card = buildAudioOverviewCard(entry);
      const leadBlockquote = Array.from(section.children).find(function (node) {
        return node.tagName === "BLOCKQUOTE";
      });

      if (leadBlockquote) {
        leadBlockquote.insertAdjacentElement("afterend", card);
      } else {
        section.insertAdjacentElement("afterbegin", card);
      }
    }

    window.$docsify = {
      name: 'UE5 C++ 학습 노트',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
        depth: 3
      },
      relativePath: false,
      homepage: 'README.md',
      plugins: [
        function (hook, vm) {
          hook.doneEach(function () {
            window.requestAnimationFrame(function () {
              injectAudioOverview(vm.route.path);
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script>
    (function () {
      const state = window.__readerPrefsState;
      if (!state) {
        return;
      }

      const FONT_LABELS = {
        pretendard: { label: "Pretendard", meta: "산세리프" },
        ridibatang: { label: "RIDIBatang", meta: "바탕체" },
        notoSans: { label: "Noto Sans KR", meta: "산세리프" },
        notoSerif: { label: "Noto Serif KR", meta: "세리프" }
      };
      const THEME_LABELS = {
        paper: "Paper",
        sepia: "Sepia",
        sage: "Sage",
        slate: "Slate"
      };

      function setCookie(prefs) {
        document.cookie =
          state.COOKIE_NAME +
          "=" +
          encodeURIComponent(JSON.stringify(prefs)) +
          "; Max-Age=31536000; Path=" +
          state.getBasePath() +
          "; SameSite=Lax";
      }

      function clearCookie() {
        document.cookie =
          state.COOKIE_NAME +
          "=; Max-Age=0; Path=" +
          state.getBasePath() +
          "; SameSite=Lax";
      }

      function updatePrefs(partial, persist = true) {
        state.current = state.sanitizePrefs(Object.assign({}, state.current, partial));
        state.applyPrefs(state.current);
        if (persist) {
          setCookie(state.current);
        }
        syncUI();
      }

      function resetPrefs() {
        state.current = state.getDefaults();
        state.applyPrefs(state.current);
        clearCookie();
        syncUI();
      }

      function themeSwatchStyle(theme) {
        const palette = state.THEMES[theme];
        return "background:" + palette.bg + "; box-shadow: inset 0 0 0 5px " + palette.surface + ";";
      }

      function renderFontButtons() {
        return Object.keys(FONT_LABELS)
          .map(function (fontKey) {
            return (
              '<button type="button" class="reader-chip" data-reader-font-option="' +
              fontKey +
              '">' +
              '<span class="reader-chip-label">' +
              FONT_LABELS[fontKey].label +
              "</span>" +
              '<span class="reader-chip-meta">' +
              FONT_LABELS[fontKey].meta +
              "</span>" +
              "</button>"
            );
          })
          .join("");
      }

      function renderSizeStepper() {
        return (
          '<div class="reader-size-stepper">' +
          '<button type="button" class="reader-stepper-button" data-reader-size-step="-1" aria-label="글자 크기 줄이기">&minus;</button>' +
          '<span class="reader-stepper-value" data-reader-font-size-value>' + state.current.fontSize + 'px</span>' +
          '<button type="button" class="reader-stepper-button" data-reader-size-step="1" aria-label="글자 크기 늘리기">+</button>' +
          '</div>'
        );
      }

      function renderThemeButtons() {
        return Object.keys(THEME_LABELS)
          .map(function (themeKey) {
            return (
              '<button type="button" class="reader-theme-chip" data-reader-theme-option="' +
              themeKey +
              '">' +
              '<span class="reader-theme-swatch" style="' +
              themeSwatchStyle(themeKey) +
              '"></span>' +
              '<span class="reader-chip-label">' +
              THEME_LABELS[themeKey] +
              "</span>" +
              "</button>"
            );
          })
          .join("");
      }

      function buildWidget() {
        if (document.querySelector(".reader-settings-toggle")) {
          return;
        }

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "reader-settings-toggle";
        toggle.setAttribute("aria-label", "리더 설정 열기");
        toggle.setAttribute("aria-expanded", "false");
        var toggleInner = document.createElement("div");
        toggleInner.className = "reader-settings-toggle-button";
        toggleInner.textContent = "Aa";
        toggle.appendChild(toggleInner);

        const panel = document.createElement("aside");
        panel.className = "reader-settings-panel";
        panel.setAttribute("role", "dialog");
        panel.setAttribute("aria-label", "리더 설정");
        panel.innerHTML =
          '<div class="reader-settings-header">' +
          "<div>" +
          '<h2 class="reader-settings-title">리더 설정</h2>' +
          '<p class="reader-settings-subtitle">본문 읽기 환경을 바로 바꿀 수 있습니다.</p>' +
          "</div>" +
          "</div>" +
          '<section class="reader-settings-section">' +
          '<span class="reader-settings-label">폰트</span>' +
          '<div class="reader-option-grid font-grid">' +
          renderFontButtons() +
          "</div>" +
          "</section>" +
          '<section class="reader-settings-section">' +
          '<span class="reader-settings-label">글자 크기</span>' +
          renderSizeStepper() +
          "</section>" +
          '<section class="reader-settings-section">' +
          '<span class="reader-settings-label">줄간격</span>' +
          '<div class="reader-stepper">' +
          '<button type="button" class="reader-stepper-button" data-reader-line-step="-1" aria-label="줄간격 줄이기">-</button>' +
          '<span class="reader-stepper-value" data-reader-line-height-value>1.8</span>' +
          '<button type="button" class="reader-stepper-button" data-reader-line-step="1" aria-label="줄간격 늘리기">+</button>' +
          "</div>" +
          "</section>" +
          '<section class="reader-settings-section">' +
          '<span class="reader-settings-label">컬러 테마</span>' +
          '<div class="reader-option-grid theme-grid">' +
          renderThemeButtons() +
          "</div>" +
          "</section>" +
          '<section class="reader-settings-section">' +
          '<button type="button" class="reader-reset-button" data-reader-reset>기본값 복원</button>' +
          "</section>";

        var sidebarToggle = document.querySelector(".sidebar-toggle");
        if (sidebarToggle && sidebarToggle.parentNode) {
          sidebarToggle.parentNode.insertBefore(toggle, sidebarToggle);
        } else {
          document.body.appendChild(toggle);
        }
        document.body.appendChild(panel);

        let isOpen = false;

        function setOpen(next) {
          isOpen = next;
          panel.classList.toggle("is-open", next);
          toggle.setAttribute("aria-expanded", String(next));
        }

        toggle.addEventListener("click", function (event) {
          event.stopPropagation();
          setOpen(!isOpen);
        });

        panel.addEventListener("click", function (event) {
          event.stopPropagation();
        });

        document.addEventListener("click", function () {
          if (isOpen) {
            setOpen(false);
          }
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && isOpen) {
            setOpen(false);
          }
        });

        panel.addEventListener("click", function (event) {
          const fontButton = event.target.closest("[data-reader-font-option]");
          if (fontButton) {
            updatePrefs({ font: fontButton.getAttribute("data-reader-font-option") });
            return;
          }

          const sizeStepButton = event.target.closest("[data-reader-size-step]");
          if (sizeStepButton && !sizeStepButton.disabled) {
            var delta = Number(sizeStepButton.getAttribute("data-reader-size-step"));
            var curIdx = state.FONT_SIZES.indexOf(String(state.current.fontSize));
            var nxtIdx = Math.min(state.FONT_SIZES.length - 1, Math.max(0, curIdx + delta));
            updatePrefs({ fontSize: state.FONT_SIZES[nxtIdx] });
            return;
          }

          const themeButton = event.target.closest("[data-reader-theme-option]");
          if (themeButton) {
            updatePrefs({ theme: themeButton.getAttribute("data-reader-theme-option") });
            return;
          }

          const lineStepButton = event.target.closest("[data-reader-line-step]");
          if (lineStepButton && !lineStepButton.disabled) {
            const delta = Number(lineStepButton.getAttribute("data-reader-line-step"));
            const currentIndex = state.LINE_HEIGHT_STEPS.indexOf(String(state.current.lineHeight));
            const nextIndex = Math.min(
              state.LINE_HEIGHT_STEPS.length - 1,
              Math.max(0, currentIndex + delta)
            );
            updatePrefs({ lineHeight: state.LINE_HEIGHT_STEPS[nextIndex] });
            return;
          }

          const resetButton = event.target.closest("[data-reader-reset]");
          if (resetButton) {
            resetPrefs();
          }
        });

        window.__readerWidget = {
          toggle: toggle,
          panel: panel
        };
      }

      function syncUI() {
        const widget = window.__readerWidget;
        if (!widget) {
          return;
        }

        widget.panel.querySelectorAll("[data-reader-font-option]").forEach(function (button) {
          const isActive = button.getAttribute("data-reader-font-option") === state.current.font;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        var fontSizeValue = widget.panel.querySelector("[data-reader-font-size-value]");
        var sizeIndex = state.FONT_SIZES.indexOf(String(state.current.fontSize));
        if (fontSizeValue) {
          fontSizeValue.textContent = state.current.fontSize + "px";
        }
        var sizeDecBtn = widget.panel.querySelector('[data-reader-size-step="-1"]');
        var sizeIncBtn = widget.panel.querySelector('[data-reader-size-step="1"]');
        if (sizeDecBtn) { sizeDecBtn.disabled = sizeIndex <= 0; }
        if (sizeIncBtn) { sizeIncBtn.disabled = sizeIndex >= state.FONT_SIZES.length - 1; }

        widget.panel.querySelectorAll("[data-reader-theme-option]").forEach(function (button) {
          const isActive = button.getAttribute("data-reader-theme-option") === state.current.theme;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        const lineHeightValue = widget.panel.querySelector("[data-reader-line-height-value]");
        const currentIndex = state.LINE_HEIGHT_STEPS.indexOf(String(state.current.lineHeight));
        if (lineHeightValue) {
          lineHeightValue.textContent = state.current.lineHeight;
        }

        const decreaseButton = widget.panel.querySelector('[data-reader-line-step="-1"]');
        const increaseButton = widget.panel.querySelector('[data-reader-line-step="1"]');
        if (decreaseButton) {
          decreaseButton.disabled = currentIndex <= 0;
        }
        if (increaseButton) {
          increaseButton.disabled = currentIndex >= state.LINE_HEIGHT_STEPS.length - 1;
        }
      }

      function init() {
        buildWidget();
        syncUI();
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init, { once: true });
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
