name: yuc scrape

on:
  workflow_dispatch:
  schedule:
    # KST 07:00~09:59 = UTC 22:00~00:59. 정각 부하 회피 + 출근시간 고빈도 수집.
    - cron: "7,17,27,37,47,57 22,23,0 * * *"
    # 그 외 시간은 매시간 1회만 확인. 이것도 정각은 피한다.
    - cron: "23 1-21 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-httpx
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Make folders
        run: |
          mkdir -p yuc/scripts yuc/artifacts

      - name: Check scraper existence
        run: |
          if [ ! -f yuc/scripts/scrape.py ]; then
            echo "❌ scrape.py missing" && exit 1
          else
            echo "✅ scrape.py found"
          fi

      - name: Add jitter
        run: sleep $((30 + RANDOM % 90))

      - name: Run scraper
        run: |
          echo "Starting scrape at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> yuc/artifacts/scrape.log
          python yuc/scripts/scrape.py --log-level DEBUG --allow-stale-success >> yuc/artifacts/scrape.log 2>&1
          echo "Duration: $SECONDS s" >> yuc/artifacts/scrape.log
        env:
          YUC_SOURCE_URL: https://park.yuc.co.kr/usersite/userSiteParkingLotInfo
          YUC_FRONTEND_URL: https://park.yuc.co.kr/views/parkinglot/info/info.html
          YUC_OUTPUT_CSV: yuc/parking_log.csv
          YUC_STATUS_JSON: yuc/status.json
          YUC_TARGET_NAME: 수지노외 공영주차장
          YUC_MAX_RETRIES: "2"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yuc-artifacts
          path: |
            yuc/parking_log.csv
            yuc/status.json
            yuc/artifacts/scrape.log
          if-no-files-found: warn

      - name: Check for meaningful change
        id: check
        run: |
          git add yuc/parking_log.csv yuc/status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated YUC data
        if: steps.check.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update yuc data"
          file_pattern: "yuc/parking_log.csv yuc/status.json"
          branch: ${{ github.ref_name }}
