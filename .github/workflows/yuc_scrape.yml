name: yuc scrape

on:
  workflow_dispatch:
  schedule:
    # KST 07:30-09:59: every 5-10 min during morning rush
    # UTC 22:30=07:30, UTC 00:59=09:59
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 22 * * *"
    - cron: "0,10,20,30,40,50 23 * * *"
    - cron: "0,10,20,30,40,50 0 * * *"
    # KST 18:00-20:00: evening commuters
    - cron: "0,10,20,30,40,50 9,10 * * *"
    # Other hours: hourly, avoiding exact hour
    - cron: "23 1-8,12-21 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-httpx
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Make folders
        run: |
          mkdir -p yuc/scripts yuc/artifacts

      - name: Check scraper existence
        run: |
          if [ ! -f yuc/scripts/scrape.py ]; then
            echo "scrape.py missing" && exit 1
          else
            echo "scrape.py found"
          fi

      - name: Add jitter
        run: sleep $((30 + RANDOM % 90))

      - name: Run scraper
        run: |
          echo "Starting scrape at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> yuc/artifacts/scrape.log
          python yuc/scripts/scrape.py --log-level DEBUG --allow-stale-success >> yuc/artifacts/scrape.log 2>&1
          echo "Duration: $SECONDS s" >> yuc/artifacts/scrape.log
        env:
          YUC_SOURCE_URL: https://park.yuc.co.kr/usersite/userSiteParkingLotInfo
          YUC_FRONTEND_URL: https://park.yuc.co.kr/views/parkinglot/info/info.html
          YUC_OUTPUT_CSV: yuc/parking_log.csv
          YUC_STATUS_JSON: yuc/status.json
          YUC_TARGET_NAME: 수지노외 공영주차장
          YUC_MAX_RETRIES: "2"

      - name: Generate daily statistics
        run: |
          python yuc/scripts/build_stats.py \
            --input-csv yuc/parking_log.csv \
            --output-json yuc/daily_stats.json \
            --exclude-dates yuc/excluded_dates.txt || echo "Stats generation skipped"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yuc-artifacts
          path: |
            yuc/parking_log.csv
            yuc/status.json
            yuc/daily_stats.json
          if-no-files-found: warn

      - name: Check for meaningful change
        id: check
        run: |
          git add yuc/parking_log.csv yuc/status.json yuc/daily_stats.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated YUC data
        if: steps.check.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update yuc data"
          file_pattern: "yuc/parking_log.csv yuc/status.json yuc/daily_stats.json"
          branch: ${{ github.ref_name }}
