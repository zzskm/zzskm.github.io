name: yuc scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "2 * * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-httpx
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make folders
        run: |
          mkdir -p yuc/scripts yuc/artifacts

      - name: Check scraper existence
        run: |
          if [ ! -f yuc/scripts/scrape.py ]; then
            echo "❌ scrape.py missing" && exit 1
          else
            echo "✅ scrape.py found"
          fi

      - name: Add jitter
        run: sleep $((RANDOM % 60))

      - name: Run scraper
        run: |
          echo "Starting scrape at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> yuc/artifacts/scrape.log
          python yuc/scripts/scrape.py --log-level DEBUG >> yuc/artifacts/scrape.log 2>&1
          echo "Duration: $SECONDS s" >> yuc/artifacts/scrape.log
        env:
          YUC_SOURCE_URL: https://park.yuc.co.kr/usersite/userSiteParkingLotInfo
          YUC_FRONTEND_URL: https://park.yuc.co.kr/views/parkinglot/info/info.html
          YUC_OUTPUT_CSV: yuc/parking_log.csv
          YUC_TARGET_NAME: 수지노외 공영주차장

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yuc-artifacts
          path: |
            yuc/parking_log.csv
            yuc/artifacts/scrape.log
          if-no-files-found: warn

      - name: Check for meaningful change
        if: success()
        id: check
        run: |
          LAST_VAL=$(tail -1 yuc/parking_log.csv | cut -d',' -f3)
          PREV=$(git show HEAD:yuc/parking_log.csv | tail -1 | cut -d',' -f3)
          if [ "$LAST_VAL" = "$PREV" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            git checkout -- yuc/parking_log.csv
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated CSV
        if: success() && steps.check.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update parking_log.csv"
          file_pattern: "yuc/parking_log.csv"
          branch: ${{ github.ref_name }}
