name: garmin weight sync

on:
  workflow_dispatch:
    inputs:
      backfill_days:
        description: Days to resync, ending today
        required: false
        default: "3"
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 23 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          # rebase against origin/main on concurrent bot pushes 필요 — 전체 히스토리 받기
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-garmin-weight
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure directories
        run: mkdir -p garmin-weight/data garmin-weight/scripts

      - name: Check auth secrets
        run: |
          if [[ -z "${GARMIN_TOKENS}" && ( -z "${GARMIN_EMAIL}" || -z "${GARMIN_PASSWORD}" ) ]]; then
            echo "::error::No Garmin auth configured. Set GARMIN_TOKENS secret (preferred) or both GARMIN_EMAIL + GARMIN_PASSWORD."
            exit 1
          fi
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}

      - name: Sync Garmin aggregates
        run: |
          python garmin-weight/scripts/sync_garmin.py --backfill-days "${BACKFILL_DAYS}" --date "$(TZ=Asia/Seoul date +%Y-%m-%d)"
        env:
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '3' }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}
          GARMIN_TOKENS_JSON: ${{ secrets.GARMIN_TOKENS_JSON }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}

      - name: Rebuild summary from CSV
        if: always()
        run: python garmin-weight/scripts/sync_garmin.py --skip-garmin

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: garmin-weight-data
          path: |
            garmin-weight/data/daily_metrics.csv
            garmin-weight/data/summary.json
          if-no-files-found: warn

      # git-auto-commit-action@v5는 push 전에 pull/rebase를 하지 않아
      # 다른 봇(parking_log 등)이 같은 시각에 main을 진전시키면 non-fast-forward로 실패.
      # 직접 commit + push-with-rebase-retry 처리한다.
      - name: Commit and push data (with rebase retry)
        if: success()
        env:
          DATA_FILES: "garmin-weight/data/daily_metrics.csv garmin-weight/data/summary.json"
          MAX_ATTEMPTS: "5"
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add $DATA_FILES
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update garmin weight data"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push failed on attempt $attempt — fetching latest and rebasing."
            git fetch origin main
            # 데이터 파일은 자동 생성이라 충돌 시 항상 우리 새 결과를 우선
            git rebase -X theirs origin/main || {
              echo "Rebase failed, aborting"; git rebase --abort; exit 1;
            }
            # 짧은 백오프
            sleep $((attempt * 2))
          done

          echo "::error::Push still failing after $MAX_ATTEMPTS retries"
          exit 1
