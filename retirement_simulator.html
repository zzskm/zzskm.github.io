<script type="text/babel" data-type="module" data-presets="react">

// ============================================================
// 상수 / 디폴트
// ============================================================

const ASSUMPTIONS = {
  version: "kr-v4-2026-05",
  krPolicy: {
    pensionReplacementRate: 0.40,       // 국민연금 단순 소득대체율
    pensionAValueMonthly: 300,          // 만원/월, 국민연금 A값 단순 가정
    pensionTaxRate: 0.055,              // 연금소득세 단순 분리과세율
    maxNpYears: 40,                     // 국민연금 최대 가입연수
    contributionStartAge: 25,           // 자동 가입연수/퇴직급여 계산 기준 나이
    survivorPensionRatio: 0.50,         // 유족연금 단순 가정: 사망자 NP의 50%
    healthInsurance: {
      sideIncomeRate: 0.07,             // 지역가입자 단순 추정 (실제 산식과 다름)

  lifeCycle: {
    spendingFactors: [
      { fromAge: 0, factor: 1.0 },
      { fromAge: 65, factor: 0.75 },
      { fromAge: 75, factor: 0.55 },
    ],
    childMonthlyCosts: [
      { minAge: 0, maxAge: 6, amount: 50 },    // 만원/월
      { minAge: 7, maxAge: 18, amount: 80 },
      { minAge: 19, maxAge: 22, amount: 150 },

    // 노년기 의료비 (1인 기준, 만원/월 현재가치)
    medicalMonthlyByAge: [
      { fromAge:  0, amount:  0 },

      { fromAge: 75, amount: 60 },   // 입원·시술 빈도 증가
      { fromAge: 85, amount: 100 },  // 장기요양·간병
    ],
    medicalInflationRealPremium: 1.5, // %/년 — 의료물가가 일반물가보다 초과 상승
  },
  assetRules: {
    dcAnnualContributionSalaryDivisor: 12,
    readinessMaxRatio: 300,
    includeSeveranceLumpSumDefault: false,
    privatePensionStartAge: 60,
    privatePensionWithdrawRate: 5.0,
  },
};

const UI_RANGES = {
  currentAge:               { min: 25, max: 70, step: 1 },
  retireAge:                { min: 25, max: 75, step: 1 },
  selfPensionStartAge:      { min: 55, max: 75, step: 1 },
  spousePensionStartAge:    { min: 55, max: 75, step: 1 },
  selfLifeExpectancy:       { min: 70, max: 105, step: 1 },
  spouseLifeExpectancy:     { min: 70, max: 105, step: 1 },
  spouseCurrentAge:         { min: 20, max: 80, step: 1 },
  spouseRetireAge:          { min: 40, max: 75, step: 1 },
  selfNpYears:              { min: 0, max: 40, step: 1 },
  spouseNpYears:            { min: 0, max: 40, step: 1 },
  selfNpManualMonthly:      { min: 0, max: 300, step: 1 },
  spouseNpManualMonthly:    { min: 0, max: 300, step: 1 },
  selfCurrentSalary:        { min: 0, max: 30000, step: 100 },
  spouseCurrentSalary:      { min: 0, max: 30000, step: 100 },
  salaryGrowthRate:         { min: 0, max: 8, step: 0.1 },   // 명목 %
  postRetireSideIncome:     { min: 0, max: 500, step: 10 },
  retirementBalance:        { min: 0, max: 50000, step: 500 },
  privatePensionBalance:    { min: 0, max: 30000, step: 500 },
  cashSavings:              { min: 0, max: 50000, step: 500 },
  monthlyAddSaving:         { min: 0, max: 300, step: 10 },
  privatePensionStartAge:   { min: 55, max: 75, step: 1 },
  privatePensionWithdrawRate: { min: 0, max: 10, step: 0.1 },
  housePrice:               { min: 0, max: 300000, step: 1000 },
  houseInflationRate:       { min: 0, max: 10, step: 0.1 },  // 명목 %
  mortgageBalance:          { min: 0, max: 100000, step: 500 },
  monthlyMortgagePayment:   { min: 0, max: 500, step: 10 },
  investmentReturnRate:     { min: 0, max: 12, step: 0.1 },  // 명목 %
  inflationRate:            { min: 0, max: 8, step: 0.1 },
  scenarioBandSpread:       { min: 0, max: 4, step: 0.1 },
  workingLivingCost:        { min: 50, max: 800, step: 10 },
  bridgeLivingCost:         { min: 50, max: 800, step: 10 },
  retirementLivingCost:     { min: 50, max: 600, step: 10 },
  childCostMultiplier:      { min: 0.5, max: 2.0, step: 0.1 },
  downsizeAge:              { min: 40, max: 105, step: 1 },
  downsizeRatio:            { min: 0, max: 1, step: 0.05 },
  medicalCostMultiplier:    { min: 0.5, max: 3.0, step: 0.1 },
};

const PRESETS = {
  krDefault: {
    // 프로필 (본인)
    currentAge: 40,
    retireAge: 55,
    selfLifeExpectancy: 87,        // 자동 계산 가능
    selfPensionStartAge: 65,       // 자동 계산 가능
    selfNpAutoMode: true,
    selfNpYears: 0,                // autoMode=true 시 자동 계산
    selfNpInputMode: "auto",       // "auto" | "manual"
    selfNpManualMonthly: 0,        // 만원/월 (manual 모드)
    selfCurrentSalary: 8000,       // 만원/년
    // 배우자
    spouseEnabled: false,
    spouseCurrentAge: 38,
    spouseRetireAge: 53,
    spouseLifeExpectancy: 90,
    spousePensionStartAge: 65,
    spouseNpAutoMode: true,
    spouseNpYears: 0,
    spouseNpInputMode: "auto",
    spouseNpManualMonthly: 0,
    spouseCurrentSalary: 0,        // 만원/년
    // 퇴직 후 소득
    postRetireSideIncome: 0,       // 만원/월 (브릿지기간 본인)
    // 자산
    retirementBalance: 5000,
    privatePensionBalance: 3000,
    privatePensionStartAge: ASSUMPTIONS.assetRules.privatePensionStartAge,
    privatePensionWithdrawRate: ASSUMPTIONS.assetRules.privatePensionWithdrawRate,
    cashSavings: 2000,
    monthlyAddSaving: 30,
    hasHouse: true,
    housePrice: 80000,
    houseInflationRate: 3.0,       // 명목 %
    hasMortgage: true,
    mortgageBalance: 20000,
    monthlyMortgagePayment: 150,
    // 시장 가정 (명목 %)
    investmentReturnRate: 6.0,
    inflationRate: 2.5,
    scenarioBandSpread: 2.0,
    salaryGrowthRate: 3.5,         // 명목 %
    // 생활비
    workingLivingCost: 350,
    bridgeLivingCost: 400,
    retirementLivingCost: 300,
    // 자녀
    children: [
      { id: "child-1", birthYear: 2015 },
      { id: "child-2", birthYear: 2018 },
    ],
    childCostMultiplier: 1.0,
    // 이벤트
    downsizeEnabled: false,
    downsizeAge: 65,
    downsizeRatio: 0.6,
    // 의료비
    medicalCostMultiplier: 1.0,    // ×배율 (0.5 = 민영보험 보장 두텁게, 2.0 = 중증질환 대비)
    applyMedicalCost: true,
    // 세제
    includeSeveranceLumpSum: ASSUMPTIONS.assetRules.includeSeveranceLumpSumDefault,
    applyHealthInsurance: true,
    applyPensionTax: false,
    // C5: 인출 전략
    withdrawalStrategy: "unified",    // "unified" | "bucket" | "4pct" | "vpw"
    // C1: 시퀀스 리스크 스트레스 테스트
    stressTest: "severe",             // "none" | "mild" | "severe" | "2008"
  },
};

const KR_DEFAULTS = PRESETS.krDefault;
const SCENARIO_COLORS = ["#0f172a", "#0ea5e9", "#f59e0b", "#8b5cf6"];
const CURRENT_YEAR = new Date().getFullYear();

// ============================================================
// 자동 계산 헬퍼
// ============================================================

// 출생연도 기반 국민연금 개시 나이 (2026년 기준 법정 수급 개시)
function autoPensionStartAge(currentAge) {
  const birthYear = CURRENT_YEAR - currentAge;
  if (birthYear >= 1969) return 65;
  if (birthYear >= 1965) return 64;
  if (birthYear >= 1961) return 63;
  return 62;
}

// 퇴직 나이 기준 자동 가입연수
function autoNpYears(retireAge, policy = ASSUMPTIONS.krPolicy) {
  return Math.min(policy.maxNpYears, Math.max(0, retireAge - policy.contributionStartAge));
}

// 현재 나이 기반 기대수명 (통계청 2024 단순화)
function autoLifeExpectancy(currentAge) {
  if (currentAge <= 30) return 87;
  if (currentAge <= 40) return 86;
  if (currentAge <= 50) return 85;
  if (currentAge <= 60) return 84;
  return 83;
}

// 부부 최대 수명을 본인 나이축으로 환산
function simEndAgeFor(input) {
  const selfLE = input.selfLifeExpectancy ?? 87;
  if (!input.spouseEnabled) return selfLE;
  const offset = (input.spouseCurrentAge ?? input.currentAge) - input.currentAge;
  const spouseLeInSelfAge = (input.spouseLifeExpectancy ?? selfLE) - offset;
  return Math.max(selfLE, spouseLeInSelfAge);
}

// ============================================================
// 계산 헬퍼
// ============================================================

function npYearsFor(input, person, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;
  if (person === "spouse") {
    if (input.spouseNpAutoMode) return Math.min(policy.maxNpYears, Math.max(0, input.spouseRetireAge - policy.contributionStartAge));
    return Math.min(policy.maxNpYears, Math.max(0, input.spouseNpYears));
  }
  // self
  if (input.selfNpAutoMode) return autoNpYears(input.retireAge, policy);
  return Math.min(policy.maxNpYears, Math.max(0, input.selfNpYears));
}

function estimatedPensionMonthlyFor(input, person, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;
  if (person === "spouse") {
    if (input.spouseNpInputMode === "manual") return input.spouseNpManualMonthly ?? 0;
    const salary = input.spouseCurrentSalary ?? 0;
    const avgMonthly = (policy.pensionAValueMonthly + salary / 12) / 2;
    const years = npYearsFor(input, "spouse", assumptions);
    const replacement = years < 10 ? 0 : policy.pensionReplacementRate * (years / policy.maxNpYears);
    return replacement * avgMonthly;
  }
  // self
  if (input.selfNpInputMode === "manual") return input.selfNpManualMonthly ?? 0;
  const avgMonthly = (policy.pensionAValueMonthly + input.selfCurrentSalary / 12) / 2;
  const years = npYearsFor(input, "self", assumptions);
  const replacement = years < 10 ? 0 : policy.pensionReplacementRate * (years / policy.maxNpYears);
  return replacement * avgMonthly;
}

// 하위 호환용 (인사이트 등에서 사용)
function npYears(input, assumptions = ASSUMPTIONS) { return npYearsFor(input, "self", assumptions); }
function estimatedPensionMonthly(input, assumptions = ASSUMPTIONS) { return estimatedPensionMonthlyFor(input, "self", assumptions); }

function ageFactor(age, assumptions = ASSUMPTIONS) {
  return assumptions.lifeCycle.spendingFactors
    .filter(row => age >= row.fromAge)
    .sort((a, b) => b.fromAge - a.fromAge)[0]?.factor ?? 1.0;
}

function childCostAt(age, assumptions = ASSUMPTIONS) {
  if (age < 0) return 0;
  return assumptions.lifeCycle.childMonthlyCosts.find(row =>
    age >= row.minAge && age <= row.maxAge
  )?.amount ?? 0;
}

function childrenOf(input) {
  if (Array.isArray(input.children)) return input.children.filter(c => c && c.birthYear);
  return [input.child1BirthYear, input.child2BirthYear]
    .filter(Boolean)
    .map((birthYear, idx) => ({ id: `legacy-child-${idx + 1}`, birthYear }));
}

function childCostYearly(input, year, assumptions = ASSUMPTIONS) {
  let cost = 0;
  for (const child of childrenOf(input)) {
    cost += childCostAt(year - child.birthYear, assumptions) * 12;
  }
  return cost * (input.childCostMultiplier ?? 1.0);
}

function childEvents(input) {
  const events = [];
  childrenOf(input).forEach((child, i) => {
    const idx = i + 1;
    const parentAgeAt = (childAge) =>
      input.currentAge + ((child.birthYear + childAge) - CURRENT_YEAR);
    events.push({ age: parentAgeAt(19), label: `자녀${idx} 대학` });
    events.push({ age: parentAgeAt(23), label: `자녀${idx} 독립` });
  });
  const endAge = simEndAgeFor(input);
  return events.filter(e => e.age >= input.currentAge && e.age <= endAge);
}

// 연령별 의료비 1인 기준 (만원/월), 의료물가 초과 상승 반영
function medicalCostMonthly(age, yearsFromNow, assumptions = ASSUMPTIONS) {
  const lc = assumptions.lifeCycle;
  const base = [...(lc.medicalMonthlyByAge ?? [])]
    .filter(r => age >= r.fromAge)
    .sort((a, b) => b.fromAge - a.fromAge)[0]?.amount ?? 0;
  const premium = (lc.medicalInflationRealPremium ?? 0) / 100;
  return base * Math.pow(1 + premium, yearsFromNow);
}

// 지역가입자 건보료 단순 추정 (만원/년). 실제 산식과 다름.
function healthInsuranceYearly(financial, house, sideIncomeAnnual, assumptions = ASSUMPTIONS) {
  const hi = assumptions.krPolicy.healthInsurance;
  const base = Math.max(0, sideIncomeAnnual) * hi.sideIncomeRate
             + Math.max(0, financial) * hi.financialAssetRate
             + Math.max(0, house) * hi.houseAssetRate;
  return Math.min(base, hi.annualCap);
}

// ============================================================
// 핵심 시뮬레이션 (v4 — 본인/배우자 분리, 명목→실질 변환)
// ============================================================

function calculateScenario(input, returnRateOverride, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;

  // ── 명목 → 실질 변환 ──────────────────────────────────────
  const inflRate = input.inflationRate / 100;
  const toReal = (nomPct) => (1 + nomPct / 100) / (1 + inflRate) - 1;
  // returnRateOverride가 함수이면 연도별 실질수익률 함수; 숫자이면 고정
  const rateFn = typeof returnRateOverride === "function"
    ? returnRateOverride
    : () => toReal(returnRateOverride ?? input.investmentReturnRate);
  const sg = toReal(input.salaryGrowthRate);
  const hg = toReal(input.houseInflationRate);

  // ── 본인/배우자 국민연금 ───────────────────────────────────
  const selfNpMonthly    = estimatedPensionMonthlyFor(input, "self",   assumptions);
  const spouseNpMonthly  = estimatedPensionMonthlyFor(input, "spouse", assumptions);

  // ── 시뮬레이션 종료 나이 (self 기준) ──────────────────────
  const selfLE   = input.selfLifeExpectancy;
  const simEndAge = simEndAgeFor(input);

  // ── 초기 자산 ─────────────────────────────────────────────
  let financialRetirement   = input.retirementBalance;
  let financialPrivatePension = input.privatePensionBalance;
  let financialCash         = input.cashSavings;
  let house = input.hasHouse ? input.housePrice : 0;
  let mortgage = input.hasHouse && input.hasMortgage ? input.mortgageBalance : 0;

  let depletionAge = null;
  let bridgeShortfall = 0;
  let totalAssetsAtRetirement = 0;
  let severancePaid = !input.includeSeveranceLumpSum;
  let downsizeDone = false;
  const downsizeEvents = [];
  const years = [];

  // C5: 인출 전략 — 4% SWR 기준값은 퇴직 시점에 확정
  const strategy = input.withdrawalStrategy ?? "unified";
  let swrAnnual = 0;   // 4pct 전략용 고정 인출액 (퇴직 시 확정)

  // 유족연금 추적
  let selfSurvivorNpBonus   = 0;  // 배우자 사망 시 본인이 받을 추가 NP
  let spouseSurvivorNpBonus = 0;  // 본인 사망 시 배우자가 받을 추가 NP (계산만)
  let prevSelfAlive  = true;
  let prevSpouseAlive = input.spouseEnabled;

  for (let age = input.currentAge; age <= simEndAge; age++) {
    const t = age - input.currentAge;
    const year = CURRENT_YEAR + t;

    // ── 생존 여부 ──
    const selfAlive   = age <= selfLE;
    const spouseAge   = (input.spouseCurrentAge ?? input.currentAge) + t;
    const spouseAlive = input.spouseEnabled && spouseAge <= input.spouseLifeExpectancy;

    // 유족연금: 배우자가 이번 해에 사망했을 때
    if (prevSpouseAlive && !spouseAlive && selfAlive) {
      selfSurvivorNpBonus = spouseNpMonthly * policy.survivorPensionRatio;
    }
    // 본인이 이번 해에 사망했을 때 (배우자가 받을 몫)
    if (prevSelfAlive && !selfAlive && spouseAlive) {
      spouseSurvivorNpBonus = selfNpMonthly * policy.survivorPensionRatio;
    }
    prevSelfAlive  = selfAlive;
    prevSpouseAlive = spouseAlive;

    // ── 근로 소득 ──
    const selfIsWorking   = selfAlive && age < input.retireAge;
    const spouseIsWorking = spouseAlive && spouseAge < (input.spouseRetireAge ?? 75);

    const selfSalaryAnnual   = selfIsWorking   ? input.selfCurrentSalary   * Math.pow(1 + sg, t) : 0;
    const spouseSalaryAnnual = spouseIsWorking ? (input.spouseCurrentSalary ?? 0) * Math.pow(1 + sg, t) : 0;

    // ── DC 적립 (본인 근로기만) ──
    const dcContribAnnual = selfIsWorking
      ? selfSalaryAnnual / assumptions.assetRules.dcAnnualContributionSalaryDivisor : 0;

    // ── 국민연금 (세후) ──
    const selfIsPension   = selfAlive   && age       >= input.selfPensionStartAge;
    const spouseIsPension = spouseAlive && spouseAge >= (input.spousePensionStartAge ?? 65);

    let selfPensionAnnual   = selfIsPension   ? (selfNpMonthly   + (selfAlive ? selfSurvivorNpBonus : 0))  * 12 : 0;
    let spousePensionAnnual = spouseIsPension ? (spouseNpMonthly + spouseSurvivorNpBonus) * 12 : 0;
    if (input.applyPensionTax) {
      if (selfPensionAnnual   > 0) selfPensionAnnual   *= (1 - policy.pensionTaxRate);
      if (spousePensionAnnual > 0) spousePensionAnnual *= (1 - policy.pensionTaxRate);
    }

    // ── 브릿지 소득 (본인 퇴직 후, 연금 개시 전) ──
    const selfIsRetired = selfAlive && !selfIsWorking;
    const selfIsBridge  = selfIsRetired && !selfIsPension;
    const bridgeSideAnnual = selfIsBridge ? input.postRetireSideIncome * 12 : 0;

    // ── 생활비 ──
    const isAnyoneAlive = selfAlive || spouseAlive;
    const baseLivingMonthly = selfIsWorking
      ? input.workingLivingCost
      : selfIsBridge
        ? input.bridgeLivingCost
        : input.retirementLivingCost;
    // 본인 사망 후에도 배우자 생존 시 생활비는 0.7배로 단순화
    const livingScale = (!selfAlive && spouseAlive) ? 0.7 : 1.0;
    const livingAnnual = isAnyoneAlive
      ? baseLivingMonthly * 12 * ageFactor(age, assumptions) * livingScale : 0;

    const childAnnual = isAnyoneAlive ? childCostYearly(input, year, assumptions) : 0;

    // ── 대출 상환 ──
    const mortgagePaid = (input.hasHouse && input.hasMortgage)
      ? Math.min(mortgage, input.monthlyMortgagePayment * 12) : 0;
    mortgage = Math.max(0, mortgage - mortgagePaid);

    // ── 추가저축 (본인 근로기만) ──
    const extraSavingAnnual = selfIsWorking ? input.monthlyAddSaving * 12 : 0;

    // ── 건강보험료 (퇴직 후) ──
    const sideIncomeForHI = bridgeSideAnnual + spouseSalaryAnnual;
    const healthInsAnnual = (selfIsRetired && input.applyHealthInsurance)
      ? healthInsuranceYearly(financialRetirement + financialPrivatePension + financialCash, house, sideIncomeForHI, assumptions)
      : 0;

    // ── 노년기 의료비 ──
    const selfMedical   = selfAlive   ? medicalCostMonthly(age,      t, assumptions) * 12 : 0;
    const spouseMedical = spouseAlive ? medicalCostMonthly(spouseAge, t, assumptions) * 12 : 0;
    const medicalAnnual = (input.applyMedicalCost !== false)
      ? (selfMedical + spouseMedical) * (input.medicalCostMultiplier ?? 1.0) : 0;

    // ── 퇴직금 일시금 ──
    if (!severancePaid && age === input.retireAge && selfAlive) {
      const yearsWorked = Math.max(0, input.retireAge - policy.contributionStartAge);
      const grossSeverance = (input.selfCurrentSalary / 12) * yearsWorked;
      // 퇴직소득세 단순 적용 (근속연수공제 후 6.6% 단순 가정)
      const severanceTax = grossSeverance * 0.066;
      financialCash += grossSeverance - severanceTax;
      severancePaid = true;
    }

    // ── 다운사이징 ──
    if (!downsizeDone && input.hasHouse && input.downsizeEnabled && age === input.downsizeAge) {
      const liquidated = house * (1 - input.downsizeRatio);
      financialCash += liquidated;
      house = house * input.downsizeRatio;
      downsizeDone = true;
      downsizeEvents.push({ age, label: "주택 다운사이징", liquidated });
    }

    // ── 개인연금 인출 ──
    const privatePensionAnnual = age >= input.privatePensionStartAge && financialPrivatePension > 0
      ? Math.min(financialPrivatePension, financialPrivatePension * (input.privatePensionWithdrawRate / 100))
      : 0;
    financialPrivatePension -= privatePensionAnnual;

    // ── 현금흐름 집계 ──
    const income = selfSalaryAnnual + spouseSalaryAnnual + selfPensionAnnual + spousePensionAnnual
                 + privatePensionAnnual + bridgeSideAnnual;
    const outflow = livingAnnual + childAnnual + mortgagePaid + healthInsAnnual + medicalAnnual;
    const cashflowExclSaving = income - outflow;
    const cashflowWithSaving = cashflowExclSaving - extraSavingAnnual;

    // ── 자산 운용 (C5: 인출 전략 분기) ──
    const r = rateFn(age);

    // 먼저 모든 버킷에 수익률 적용
    financialRetirement     = financialRetirement     * (1 + r) + dcContribAnnual;
    financialPrivatePension = financialPrivatePension * (1 + r);
    financialCash           = financialCash           * (1 + r);
    house = input.hasHouse ? house * (1 + hg) : 0;

    // 퇴직 시점 4pct SWR 기준값 확정
    if (strategy === "4pct" && age === input.retireAge) {
      const totalAtRetire = financialRetirement + financialPrivatePension + financialCash;
      swrAnnual = totalAtRetire * 0.04;
    }

    // 전략별 현금흐름 적용
    if (strategy === "unified") {
      // 기존: 모든 잉여/부족을 financialCash에 통합
      financialCash += extraSavingAnnual + cashflowExclSaving;

    } else if (strategy === "bucket") {
      // Bucket 전략: 잉여 → 현금 적립, 부족 → 현금→DC→개인연금 순서로 인출
      const net = extraSavingAnnual + cashflowExclSaving;
      if (net >= 0) {
        financialCash += net;
      } else {
        let deficit = -net;
        // 1) 현금에서 우선 인출
        const fromCash = Math.min(Math.max(0, financialCash), deficit);
        financialCash -= fromCash;
        deficit -= fromCash;
        // 2) 퇴직연금(DC/IRP)에서 인출
        if (deficit > 0 && age >= input.retireAge) {
          const fromRetire = Math.min(Math.max(0, financialRetirement), deficit);
          financialRetirement -= fromRetire;
          deficit -= fromRetire;
        }
        // 3) 개인연금에서 인출
        if (deficit > 0 && age >= input.privatePensionStartAge) {
          const fromPension = Math.min(Math.max(0, financialPrivatePension), deficit);
          financialPrivatePension -= fromPension;
          deficit -= fromPension;
        }
        // 4) 여전히 부족 → financialCash 음수로 표현 (소진 감지)
        if (deficit > 0) financialCash -= deficit;
      }

    } else if (strategy === "4pct") {
      // 4% 규칙: 퇴직 후 매년 swrAnnual을 인출. 근로기는 unified와 동일
      if (age < input.retireAge) {
        financialCash += extraSavingAnnual + cashflowExclSaving;
      } else {
        // 실제 인출액 = 고정 SWR (연금·소득으로 일부 충당된 만큼은 차감)
        const incomeFromNonAssets = income; // 연금+근로+부수입
        const livingOutflow = outflow;
        const netNeed = Math.max(0, livingOutflow - incomeFromNonAssets);
        // 인출은 필요액과 SWR 중 큰 값 (SWR이 안전 한도)
        const withdrawal = Math.max(netNeed, Math.min(swrAnnual, financialCash + financialRetirement + financialPrivatePension));
        // Bucket 방식으로 인출
        let need = withdrawal - (incomeFromNonAssets - livingOutflow > 0 ? 0 : 0);
        let actualWithdrawal = Math.min(withdrawal, Math.max(0, financialCash + financialRetirement + financialPrivatePension));
        const fromCash4 = Math.min(Math.max(0, financialCash), actualWithdrawal);
        financialCash -= fromCash4;
        const rem4 = actualWithdrawal - fromCash4;
        const fromRetire4 = Math.min(Math.max(0, financialRetirement), rem4);
        financialRetirement -= fromRetire4;
        const rem4b = rem4 - fromRetire4;
        financialPrivatePension -= Math.min(Math.max(0, financialPrivatePension), rem4b);
        financialCash += extraSavingAnnual;
      }

    } else if (strategy === "vpw") {
      // VPW (Variable Percentage Withdrawal): 매년 잔여 기대연수 기반 인출
      // withdrawal_rate = PMT(r, remainingYears, -1) 역수 근사
      // simplified: rate = r / (1 - (1+r)^-n) for remaining n years
      financialCash += extraSavingAnnual;
      if (age >= input.retireAge) {
        const remaining = Math.max(1, simEndAge - age);
        const vpwRate = r > 0.0001
          ? r / (1 - Math.pow(1 + r, -remaining))
          : 1 / remaining;
        const totalFinancial = financialRetirement + financialPrivatePension + financialCash;
        const vpwWithdrawal = totalFinancial * vpwRate;
        // 생활비 대비 인출 조정: 실제 필요액과 VPW 중 큰 값
        const actualNeed = Math.max(0, outflow - (income));
        const withdrawal = Math.max(actualNeed, Math.min(vpwWithdrawal, totalFinancial));
        // Bucket 방식으로 분배
        const adjNet = (income - outflow);
        if (adjNet >= 0) {
          financialCash += adjNet;
        } else {
          let vpwDef = -adjNet;
          const fc = Math.min(Math.max(0, financialCash), vpwDef);
          financialCash -= fc; vpwDef -= fc;
          if (vpwDef > 0 && age >= input.retireAge) {
            const fr = Math.min(Math.max(0, financialRetirement), vpwDef);
            financialRetirement -= fr; vpwDef -= fr;
          }
          if (vpwDef > 0) { financialPrivatePension -= Math.min(Math.max(0, financialPrivatePension), vpwDef); }
        }
      } else {
        financialCash += cashflowExclSaving;
      }

    } else {
      // fallback: unified
      financialCash += extraSavingAnnual + cashflowExclSaving;
    }

    const financialTotal = financialRetirement + financialPrivatePension + financialCash;
    const netWorth = financialTotal + house - mortgage;

    if (financialTotal <= 0 && depletionAge === null && age >= input.retireAge) {
      depletionAge = age;
    }

    if (selfIsBridge && cashflowExclSaving < 0) bridgeShortfall += -cashflowExclSaving;
    if (age === input.retireAge) totalAssetsAtRetirement = financialTotal;

    years.push({
      age, year,
      phase: selfIsWorking ? "work" : selfIsBridge ? "bridge" : "pension",
      selfAlive, spouseAlive,
      financialRetirement: Math.round(financialRetirement),
      financialPrivatePension: Math.round(financialPrivatePension),
      financialCash: Math.round(financialCash),
      financialAssets: Math.round(financialTotal),
      houseValue: Math.round(house),
      mortgage: Math.round(mortgage),
      netWorth: Math.round(netWorth),
      selfSalaryMonthly:    Math.round(selfSalaryAnnual   / 12),
      spouseSalaryMonthly:  Math.round(spouseSalaryAnnual / 12),
      selfPensionMonthly:   Math.round(selfPensionAnnual  / 12),
      spousePensionMonthly: Math.round(spousePensionAnnual / 12),
      privatePensionMonthly: Math.round(privatePensionAnnual / 12),
      bridgeSideMonthly:    Math.round(bridgeSideAnnual   / 12),
      livingMonthly:        Math.round(livingAnnual       / 12),
      childMonthly:         Math.round(childAnnual        / 12),
      mortgageMonthly:      Math.round(mortgagePaid       / 12),
      healthInsMonthly:     Math.round(healthInsAnnual    / 12),
      medicalMonthly:       Math.round(medicalAnnual      / 12),
      cashflowMonthly:      Math.round(cashflowWithSaving / 12),
    });
  }

  const bridgeYears = Math.max(0, input.selfPensionStartAge - input.retireAge);

  let readinessRatio;
  if (depletionAge === null) {
    const last = years[years.length - 1];
    const margin = Math.max(0, last.financialAssets);
    readinessRatio = Math.min(assumptions.assetRules.readinessMaxRatio,
      100 + (totalAssetsAtRetirement > 0 ? (margin / totalAssetsAtRetirement) * 100 : 0));
  } else {
    const survived = depletionAge - input.retireAge;
    const need = simEndAge - input.retireAge;  // 부부 최대 수명 기준
    readinessRatio = need > 0 ? (survived / need) * 100 : 0;
  }

  const lastYear = years[years.length - 1] || {};

  return {
    yearlyAssetFlow: years,
    assetBucketsAtEnd: {
      retirement:     lastYear.financialRetirement   ?? 0,
      privatePension: lastYear.financialPrivatePension ?? 0,
      cash:           lastYear.financialCash          ?? 0,
      totalFinancial: lastYear.financialAssets        ?? 0,
    },
    bridgeYears,
    bridgeShortfall:        Math.round(bridgeShortfall),
    totalAssetsAtRetirement: Math.round(totalAssetsAtRetirement),
    selfNpMonthly:    Math.round(selfNpMonthly),
    spouseNpMonthly:  Math.round(spouseNpMonthly),
    privatePensionMonthly: Math.round(
      years.find(y => y.privatePensionMonthly > 0)?.privatePensionMonthly ?? 0
    ),
    readinessRatio: Math.round(readinessRatio),
    depletionAge,
    simEndAge,
    childEventList: childEvents(input),
    downsizeEvents,
    assumptionVersion: assumptions.version,
  };
}

// ============================================================
// C1: 시퀀스 리스크 프리셋 정의
// ============================================================

const STRESS_PRESETS = {
  none:   { label: "없음",              color: "none" },
  mild:   { label: "경미 (-5%p, 3년)", color: "#f59e0b",
            desc: "퇴직 직후 3년간 수익률 -5%p. 2001년 닷컴 버블 붕괴 수준." },
  severe: { label: "중간 (-10%p, 5년)", color: "#ef4444",
            desc: "퇴직 직후 5년간 수익률 -10%p. 2008년 금융위기 장기 침체 수준." },
  "2008": { label: "2008 (−30%, 회복)", color: "#7c3aed",
            desc: "첫해 -30%p 폭락 후 2년간 +10%p 반등, 이후 정상. 최악의 시나리오." },
};

// 스트레스 프리셋을 age → realRate 함수로 변환
function buildStressRateFn(stressKey, r, retireAge, inflRate) {
  const baseReal  = (1 + r / 100) / (1 + inflRate) - 1;
  if (!stressKey || stressKey === "none") return () => baseReal;

  if (stressKey === "mild") {
    const shockReal = (1 + Math.max(-30, r - 5) / 100) / (1 + inflRate) - 1;
    return (age) => (age >= retireAge && age < retireAge + 3) ? shockReal : baseReal;
  }
  if (stressKey === "severe") {
    const shockReal = (1 + Math.max(-30, r - 10) / 100) / (1 + inflRate) - 1;
    return (age) => (age >= retireAge && age < retireAge + 5) ? shockReal : baseReal;
  }
  if (stressKey === "2008") {
    const crashReal   = (1 + Math.max(-50, r - 30) / 100) / (1 + inflRate) - 1;
    const recovReal   = (1 + (r + 10) / 100) / (1 + inflRate) - 1;
    return (age) => {
      if (age === retireAge)                          return crashReal;   // 첫해 폭락
      if (age > retireAge && age <= retireAge + 2)   return recovReal;   // 2년 반등
      return baseReal;
    };
  }
  return () => baseReal;
}

// 수익률 밴드 (명목 % 기준)
function runScenarioBand(input, assumptions = ASSUMPTIONS) {
  const r = input.investmentReturnRate;
  const s = input.scenarioBandSpread;
  const inflRate = input.inflationRate / 100;

  // C1: 선택된 stressTest 프리셋으로 sequenceShock 계산
  const stressKey = input.stressTest ?? "severe";
  const stressRateFn = buildStressRateFn(stressKey, r, input.retireAge, inflRate);
  const hasStress = stressKey !== "none";

  return {
    pessimistic:    calculateScenario(input, r - s, assumptions),
    mid:            calculateScenario(input, r,     assumptions),
    optimistic:     calculateScenario(input, r + s, assumptions),
    sequenceShock:  hasStress
      ? calculateScenario(input, stressRateFn, assumptions)
      : null,
    stressKey,  // UI에서 라벨 표시용
  };
}

// ============================================================
// C9: 입력 정합성 검증
// ============================================================

function validateInput(input) {
  const warnings = [];
  if (input.retireAge <= input.currentAge)
    warnings.push({ key: "retire_age", level: "error", msg: `퇴직 나이(${input.retireAge}세)가 현재 나이(${input.currentAge}세) 이하입니다.` });
  if (input.selfPensionStartAge <= input.retireAge)
    warnings.push({ key: "pension_start", level: "warn", msg: `국민연금 개시(${input.selfPensionStartAge}세)가 퇴직(${input.retireAge}세) 이전 또는 동시입니다. 브릿지 기간이 0이 됩니다.` });
  if (input.selfLifeExpectancy <= input.retireAge)
    warnings.push({ key: "life_exp", level: "error", msg: `기대수명(${input.selfLifeExpectancy}세)이 퇴직 나이(${input.retireAge}세) 이하입니다.` });
  if (input.hasMortgage && input.mortgageBalance > 0 && input.monthlyMortgagePayment <= 0)
    warnings.push({ key: "mortgage", level: "warn", msg: "대출 잔액이 있으나 월 원리금이 0입니다. 대출이 상환되지 않습니다." });
  if ((input.retirementBalance + input.privatePensionBalance + input.cashSavings) <= 0 && input.selfCurrentSalary <= 0)
    warnings.push({ key: "no_asset", level: "warn", msg: "금융자산과 소득이 모두 0입니다. 자산 항목을 확인해주세요." });
  if (input.investmentReturnRate > 0 && input.inflationRate >= input.investmentReturnRate)
    warnings.push({ key: "real_return", level: "warn", msg: `물가상승률(${input.inflationRate}%)이 투자수익률(${input.investmentReturnRate}%)보다 높아 실질수익률이 음수입니다.` });
  if (input.spouseEnabled && input.spouseCurrentAge != null && input.spouseLifeExpectancy != null
      && input.spouseLifeExpectancy <= input.spouseCurrentAge)
    warnings.push({ key: "spouse_life", level: "error", msg: `배우자 기대수명(${input.spouseLifeExpectancy}세)이 현재 나이(${input.spouseCurrentAge}세) 이하입니다.` });
  return warnings;
}

// 자동 인사이트
// ============================================================

const INSIGHT_CANDIDATES = [
  { key: "retire+5",  label: "퇴직 +5세",          patch: (i) => ({ retireAge: Math.min(75, i.retireAge + 5) }) },
  { key: "side+50",   label: "브릿지 소득 +50만/월", patch: (i) => ({ postRetireSideIncome: i.postRetireSideIncome + 50 }) },
  { key: "live-50",   label: "생활비 −50만/월",      patch: (i) => ({
                          bridgeLivingCost: Math.max(50, i.bridgeLivingCost - 50),
                          retirementLivingCost: Math.max(50, i.retirementLivingCost - 50),
                       }) },
  { key: "downsize",  label: "주택 다운사이징 60%",  patch: (i) => ({
                          hasHouse: true,
                          downsizeEnabled: true,
                          downsizeAge: Math.min(i.selfLifeExpectancy - 1, i.retireAge + 5),
                          downsizeRatio: 0.6,
                       }) },
  { key: "saving+30", label: "추가저축 +30만/월",    patch: (i) => ({ monthlyAddSaving: i.monthlyAddSaving + 30 }) },
  { key: "private+1", label: "개인연금 인출률 +1%p", patch: (i) => ({ privatePensionWithdrawRate: Math.min(10, i.privatePensionWithdrawRate + 1) }) },
  { key: "spouse+3",  label: "배우자 은퇴 +3세",     patch: (i) => i.spouseEnabled ? ({ spouseRetireAge: Math.min(75, i.spouseRetireAge + 3) }) : ({}) },
];

function findBestInsights(input, baseResult) {
  const baseR = baseResult.readinessRatio;
  const results = INSIGHT_CANDIDATES.map(c => {
    const patched = { ...input, ...c.patch(input) };
    const r = calculateScenario(patched, undefined, ASSUMPTIONS).readinessRatio;
    return { key: c.key, label: c.label, delta: r - baseR, newRatio: r, patch: c.patch };
  });
  return results.filter(r => r.delta > 0.5).slice(0, 3);
}

function fmt만원(v) {
  if (v == null || isNaN(v)) return "—";
  if (Math.abs(v) >= 10000) return `${(v / 10000).toFixed(1)}억`;
  return `${Math.round(v).toLocaleString()}만`;
}
function fmt만원월(v) {
  if (v == null || isNaN(v)) return "—";
  return `${Math.round(v).toLocaleString()}만/월`;
}

function useDebugMode() {
  return typeof window !== 'undefined' && new URLSearchParams(window.location.search).get("debug") === "1";
}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.innerWidth < 640);
  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);
  return isMobile;
}

// ============================================================
// UI: 편집 가능 슬라이더
// ============================================================

function Slider({ label, value, min, max, step, onChange, format, hint, changed }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  const inputRef = useRef(null);
  const numericValue = Number(value);
  const effectiveMin = Number.isFinite(numericValue) ? Math.min(min, numericValue) : min;
  const effectiveMax = Number.isFinite(numericValue) ? Math.max(max, numericValue) : max;

  useEffect(() => { if (!editing) setDraft(String(value)); }, [value, editing]);
  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  const commit = () => {
    const n = Number(draft);
    if (!isNaN(n)) onChange(n);
    setEditing(false);
  };
  const cancel = () => { setDraft(String(value)); setEditing(false); };

  return (
    <div className="mb-3">
      <div className="flex items-baseline justify-between mb-1 gap-2">
        <label className={`text-xs truncate ${changed ? "text-slate-900 font-medium" : "text-slate-600"}`}>
          {label}{changed && <span className="ml-1 text-[9px] text-amber-500 font-semibold align-middle">●</span>}
        </label>
        {editing ? (
          <input
            ref={inputRef}
            type="number"
            value={draft}
            step={step}
            onChange={e => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={e => {
              if (e.key === "Enter") commit();
              if (e.key === "Escape") cancel();
            }}
            className="num text-sm font-medium w-24 px-1 py-0.5 border border-slate-300 rounded text-right bg-white focus:outline-none focus:border-slate-500"
          />
        ) : (
          <button
            onClick={() => setEditing(true)}
            className={`text-sm font-medium num hover:bg-slate-100 px-1 rounded -mx-1 ${changed ? "text-amber-700" : "text-slate-900"}`}
            title="클릭하여 직접 입력"
          >{format ? format(value) : value}</button>
        )}
      </div>
      <input
        type="range"
        min={effectiveMin} max={effectiveMax} step={step}
        value={value}
        onChange={e => onChange(Number(e.target.value))}
        className="w-full"
      />
      {hint && <p className="text-[10px] text-slate-400 mt-0.5">{hint}</p>}
    </div>
  );
}

function NumberInput({ label, value, onChange, suffix }) {
  return (
    <div className="mb-3">
      <label className="block text-xs text-slate-600 mb-1">{label}</label>
      <div className="flex items-center gap-1">
        <input
          type="number"
          value={value ?? ""}
          onChange={e => onChange(e.target.value === "" ? null : Number(e.target.value))}
          className="num w-full px-2 py-1 text-sm rounded border border-slate-200 bg-white focus:outline-none focus:border-slate-400"
        />
        {suffix && <span className="text-xs text-slate-500">{suffix}</span>}
      </div>
    </div>
  );
}

function Toggle({ label, value, onChange, hint }) {
  return (
    <div className="mb-3 flex items-center justify-between">
      <div>
        <div className="text-xs text-slate-700">{label}</div>
        {hint && <div className="text-[10px] text-slate-400">{hint}</div>}
      </div>
      <button
        onClick={() => onChange(!value)}
        className={`relative w-9 h-5 rounded-full transition ${value ? 'bg-slate-900' : 'bg-slate-300'}`}
        aria-pressed={value}
      >
        <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition ${value ? 'left-4' : 'left-0.5'}`} />
      </button>
    </div>
  );
}

function Section({ title, summary, defaultOpen, children }) {
  return (
    <details className="mb-2 border-b border-slate-100 last:border-b-0" open={!!defaultOpen}>
      <summary className="flex items-center justify-between py-2 select-none">
        <div className="flex items-center gap-1.5">
          <span className="chev text-slate-400 text-xs">▶</span>
          <span className="text-xs font-semibold uppercase tracking-wider text-slate-500">{title}</span>
        </div>
        {summary && <span className="text-[11px] text-slate-400 num">{summary}</span>}
      </summary>
      <div className="pt-1 pb-3">{children}</div>
    </details>
  );
}

function SummaryCard({ label, value, color, sub, title, large }) {
  const colorMap = {
    red:   "bg-red-50 border-red-200 text-red-900",
    amber: "bg-amber-50 border-amber-200 text-amber-900",
    green: "bg-emerald-50 border-emerald-200 text-emerald-900",
    blue:  "bg-blue-50 border-blue-200 text-blue-900",
    slate: "bg-slate-50 border-slate-200 text-slate-900",
  };
  return (
    <div className={`rounded-lg border p-3 ${colorMap[color] || colorMap.slate} ${large ? "row-span-1" : ""}`} title={title || undefined}>
      <div className="text-[11px] opacity-70 mb-1 flex items-center gap-1">
        <span>{label}</span>
        {title && <span className="opacity-60 cursor-help" aria-label="설명">ⓘ</span>}
      </div>
      <div className={`font-semibold num ${large ? "text-3xl" : "text-xl"}`}>{value}</div>
      {sub && <div className="text-[11px] opacity-70 mt-1">{sub}</div>}
    </div>
  );
}

function readinessColor(ratio) {
  if (ratio < 80) return "red";
  if (ratio < 110) return "amber";
  if (ratio < 150) return "green";
  return "blue";
}
function readinessLabel(ratio) {
  if (ratio < 80) return "위험";
  if (ratio < 110) return "경계";
  if (ratio < 150) return "안정";
  return "매우 안정";
}

const WIZARD_STEPS = ["프로필", "가족", "소득", "자산·주거", "생활비"];

function SetupWizard({ initial, onComplete, onClose }) {
  const [step, setStep] = useState(0);
  const [draft, setDraft] = useState({
    currentAge: initial.currentAge ?? 40,
    retireAge:  initial.retireAge  ?? 55,
    spouseEnabled: initial.spouseEnabled ?? false,
    spouseCurrentAge: initial.spouseCurrentAge ?? 38,
    spouseRetireAge:  initial.spouseRetireAge  ?? 53,
    childCount: (initial.children ?? []).length,
    selfCurrentSalary:   initial.selfCurrentSalary   ?? 8000,
    spouseCurrentSalary: initial.spouseCurrentSalary ?? 0,
    cashSavings:        initial.cashSavings        ?? 2000,
    retirementBalance:  initial.retirementBalance  ?? 5000,
    privatePensionBalance: initial.privatePensionBalance ?? 3000,
    hasHouse: initial.hasHouse ?? true,
    housePrice: initial.housePrice ?? 80000,
    hasMortgage: initial.hasMortgage ?? true,
    mortgageBalance: initial.mortgageBalance ?? 20000,
    monthlyMortgagePayment: initial.monthlyMortgagePayment ?? 150,
    bridgeLivingCost:      initial.bridgeLivingCost      ?? 400,
    retirementLivingCost:  initial.retirementLivingCost  ?? 300,
    investmentReturnRate:  initial.investmentReturnRate  ?? 6.0,
    inflationRate:         initial.inflationRate         ?? 2.5,
  });

  const set = (k) => (v) => setDraft(d => ({ ...d, [k]: v }));
  const num = (k, label, min, max, step = 1, suffix = "") => (
    <div className="mb-4">
      <label className="block text-sm font-medium text-slate-700 mb-1">{label}</label>
      <div className="flex items-center gap-2">
        <input
          type="range" min={min} max={max} step={step}
          value={draft[k]}
          onChange={e => set(k)(Number(e.target.value))}
          className="flex-1"
        />
        <span className="num text-sm font-semibold w-20 text-right">{draft[k]}{suffix}</span>
      </div>
    </div>
  );

  const steps = [
    // 0: 프로필
    <div key="step0">
      <p className="text-sm text-slate-500 mb-4">본인의 기본 정보를 입력해주세요.</p>
      {num("currentAge", "현재 나이", 25, 65, 1, "세")}
      {num("retireAge", "희망 퇴직 나이", draft.currentAge, 75, 1, "세")}
    </div>,
    // 1: 가족
    <div key="step1">
      <p className="text-sm text-slate-500 mb-4">가족 구성을 입력해주세요.</p>
      <div className="mb-4 flex items-center justify-between">
        <span className="text-sm font-medium text-slate-700">배우자 있음</span>
        <button onClick={() => set("spouseEnabled")(!draft.spouseEnabled)}
          className={`relative w-10 h-5.5 rounded-full transition ${draft.spouseEnabled ? 'bg-slate-900' : 'bg-slate-300'}`}
          style={{height:22, width:40}}
        >
          <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition ${draft.spouseEnabled ? 'left-5' : 'left-0.5'}`} />
        </button>
      </div>
      {draft.spouseEnabled && <>
        {num("spouseCurrentAge", "배우자 현재 나이", 20, 70, 1, "세")}
        {num("spouseRetireAge", "배우자 희망 퇴직 나이", draft.spouseCurrentAge, 75, 1, "세")}
      </>}
      {num("childCount", "자녀 수", 0, 5, 1, "명")}
    </div>,
    // 2: 소득
    <div key="step2">
      <p className="text-sm text-slate-500 mb-4">현재 연봉을 입력해주세요 (세전 기준).</p>
      {num("selfCurrentSalary", "본인 연봉", 0, 30000, 100, "만원")}
      {draft.spouseEnabled && num("spouseCurrentSalary", "배우자 연봉", 0, 30000, 100, "만원")}
    </div>,
    // 3: 자산·주거
    <div key="step3">
      <p className="text-sm text-slate-500 mb-4">현재 보유 자산과 주거 현황을 입력해주세요.</p>
      {num("cashSavings", "현금·투자 금융자산", 0, 50000, 500, "만원")}
      {num("retirementBalance", "퇴직연금(DC/IRP) 잔액", 0, 50000, 500, "만원")}
      {num("privatePensionBalance", "개인연금(연금저축) 잔액", 0, 30000, 500, "만원")}
      <div className="mb-4 flex items-center justify-between">
        <span className="text-sm font-medium text-slate-700">주택 보유</span>
        <button onClick={() => set("hasHouse")(!draft.hasHouse)}
          className={`relative rounded-full transition`}
          style={{height:22, width:40, background: draft.hasHouse ? '#0f172a' : '#cbd5e1'}}
        >
          <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition`}
            style={{left: draft.hasHouse ? '20px' : '2px'}} />
        </button>
      </div>
      {draft.hasHouse && <>
        {num("housePrice", "주택 가치", 0, 200000, 1000, "만원")}
        <div className="mb-4 flex items-center justify-between">
          <span className="text-sm font-medium text-slate-700">대출 있음</span>
          <button onClick={() => set("hasMortgage")(!draft.hasMortgage)}
            className="relative rounded-full transition"
            style={{height:22, width:40, background: draft.hasMortgage ? '#0f172a' : '#cbd5e1'}}
          >
            <span className="absolute top-0.5 w-4 h-4 rounded-full bg-white transition"
              style={{left: draft.hasMortgage ? '20px' : '2px'}} />
          </button>
        </div>
        {draft.hasMortgage && <>
          {num("mortgageBalance", "대출 잔액", 0, 100000, 500, "만원")}
          {num("monthlyMortgagePayment", "월 원리금", 0, 500, 10, "만/월")}
        </>}
      </>}
    </div>,
    // 4: 생활비·시장
    <div key="step4">
      <p className="text-sm text-slate-500 mb-4">은퇴 후 생활비와 시장 가정을 설정하세요.</p>
      {num("bridgeLivingCost", "브릿지 기간 월 생활비", 50, 800, 10, "만/월")}
      {num("retirementLivingCost", "연금 수령기 월 생활비", 50, 600, 10, "만/월")}
      {num("investmentReturnRate", "투자수익률 (명목)", 0, 12, 0.5, "%")}
      {num("inflationRate", "물가상승률 (기준)", 0, 8, 0.5, "%")}
    </div>,
  ];

  const isLast = step === WIZARD_STEPS.length - 1;

  const handleComplete = () => {
    // 자녀 배열 생성
    const children = Array.from({ length: draft.childCount }, (_, i) => ({
      id: `child-${i + 1}`,
      birthYear: CURRENT_YEAR - (draft.currentAge - (28 + i * 3)),
    }));
    const result = {
      ...KR_DEFAULTS,
      currentAge: draft.currentAge,
      retireAge:  draft.retireAge,
      selfLifeExpectancy:  autoLifeExpectancy(draft.currentAge),
      selfPensionStartAge: autoPensionStartAge(draft.currentAge),
      selfCurrentSalary:   draft.selfCurrentSalary,
      spouseEnabled:       draft.spouseEnabled,
      spouseCurrentAge:    draft.spouseCurrentAge,
      spouseRetireAge:     draft.spouseRetireAge,
      spouseLifeExpectancy:  autoLifeExpectancy(draft.spouseCurrentAge),
      spousePensionStartAge: autoPensionStartAge(draft.spouseCurrentAge),
      spouseCurrentSalary: draft.spouseCurrentSalary,
      cashSavings:         draft.cashSavings,
      retirementBalance:   draft.retirementBalance,
      privatePensionBalance: draft.privatePensionBalance,
      hasHouse:            draft.hasHouse,
      housePrice:          draft.hasHouse ? draft.housePrice : 0,
      hasMortgage:         draft.hasHouse && draft.hasMortgage,
      mortgageBalance:     draft.hasHouse && draft.hasMortgage ? draft.mortgageBalance : 0,
      monthlyMortgagePayment: draft.hasHouse && draft.hasMortgage ? draft.monthlyMortgagePayment : 0,
      bridgeLivingCost:    draft.bridgeLivingCost,
      retirementLivingCost: draft.retirementLivingCost,
      investmentReturnRate: draft.investmentReturnRate,
      inflationRate:        draft.inflationRate,
      children,
    };
    onComplete(result);
  };

  return (
    <div className="wizard-overlay">
      <div className="wizard-card">
        {/* 헤더 */}
        <div className="flex items-center justify-between mb-5">
          <div>
            <h2 className="text-base font-semibold">빠른 설정 마법사</h2>
            <p className="text-xs text-slate-400">{step + 1} / {WIZARD_STEPS.length} 단계 — {WIZARD_STEPS[step]}</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-lg leading-none">×</button>
        </div>
        {/* 진행 바 */}
        <div className="flex gap-1 mb-5">
          {WIZARD_STEPS.map((s, i) => (
            <div key={s} className={`h-1 flex-1 rounded-full transition-all ${i <= step ? 'bg-slate-900' : 'bg-slate-200'}`} />
          ))}
        </div>
        {/* 내용 */}
        {steps[step]}
        {/* 버튼 */}
        <div className="flex justify-between mt-5 pt-4 border-t border-slate-100">
          <button
            onClick={() => step > 0 ? setStep(s => s - 1) : onClose()}
            className="px-4 py-2 text-sm rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50"
          >{step === 0 ? "건너뛰기" : "이전"}</button>
          <button
            onClick={() => isLast ? handleComplete() : setStep(s => s + 1)}
            className="px-5 py-2 text-sm rounded-lg bg-slate-900 text-white font-medium hover:bg-slate-700"
          >{isLast ? "완료" : "다음"}</button>
        </div>
      </div>
    </div>
  );
}

const LS_KEY = "retirement-sim-v4";
const LEGACY_LS_KEYS = ["retirement-sim-v3-stepwise", "retirement-sim-v2"];

function uid() { return Math.random().toString(36).slice(2, 9); }

function normalizeInput(raw = {}) {
  const legacyChildren = [raw.child1BirthYear, raw.child2BirthYear]
    .filter(Boolean)
    .map((birthYear, idx) => ({ id: `legacy-child-${idx + 1}`, birthYear }));
  const children = Array.isArray(raw.children)
    ? raw.children.filter(c => c && c.birthYear).slice(0, 5).map((c, idx) => ({
        id: c.id || `child-${idx + 1}`,
        birthYear: Number(c.birthYear),
      }))
    : legacyChildren;

  // v3 → v4 마이그레이션: 단일 필드 → 본인/배우자 분리
  const selfCurrentSalary  = raw.selfCurrentSalary  ?? raw.currentSalary       ?? KR_DEFAULTS.selfCurrentSalary;
  const selfLifeExpectancy = raw.selfLifeExpectancy  ?? raw.lifeExpectancy      ?? autoLifeExpectancy(raw.currentAge ?? KR_DEFAULTS.currentAge);
  const selfPensionStartAge = raw.selfPensionStartAge ?? raw.pensionStartAge    ?? autoPensionStartAge(raw.currentAge ?? KR_DEFAULTS.currentAge);
  const selfNpYears        = raw.selfNpYears         ?? raw.npYearsContributed  ?? 0;
  const selfNpAutoMode     = raw.selfNpAutoMode      ?? raw.npYearsAutoMode     ?? true;

  // v3 spouseMonthlyIncome(월)→v4 spouseCurrentSalary(연봉)
  const spouseCurrentSalary = raw.spouseCurrentSalary
    ?? (raw.spouseMonthlyIncome != null ? raw.spouseMonthlyIncome * 12 : KR_DEFAULTS.spouseCurrentSalary);

  const spouseLifeExpectancy  = raw.spouseLifeExpectancy  ?? raw.lifeExpectancy       ?? autoLifeExpectancy(raw.spouseCurrentAge ?? KR_DEFAULTS.spouseCurrentAge);
  const spousePensionStartAge = raw.spousePensionStartAge ?? raw.pensionStartAge      ?? autoPensionStartAge(raw.spouseCurrentAge ?? KR_DEFAULTS.spouseCurrentAge);

  const input = {
    ...KR_DEFAULTS,
    ...raw,
    selfCurrentSalary,
    selfLifeExpectancy,
    selfPensionStartAge,
    selfNpYears,
    selfNpAutoMode,
    selfNpInputMode:     raw.selfNpInputMode     ?? "auto",
    selfNpManualMonthly: raw.selfNpManualMonthly ?? 0,
    spouseCurrentSalary,
    spouseLifeExpectancy,
    spousePensionStartAge,
    spouseNpYears:       raw.spouseNpYears       ?? 0,
    spouseNpAutoMode:    raw.spouseNpAutoMode     ?? true,
    spouseNpInputMode:   raw.spouseNpInputMode    ?? "auto",
    spouseNpManualMonthly: raw.spouseNpManualMonthly ?? 0,
    postRetireSideIncome: raw.postRetireSideIncome ?? raw.sideIncomeSelf ?? KR_DEFAULTS.postRetireSideIncome,
    retirementBalance:   raw.retirementBalance   ?? raw.currentDC ?? KR_DEFAULTS.retirementBalance,
    privatePensionBalance: raw.privatePensionBalance ?? raw.currentPensionSavings ?? KR_DEFAULTS.privatePensionBalance,
    cashSavings:         raw.cashSavings         ?? raw.insuranceValue ?? KR_DEFAULTS.cashSavings,
    monthlyAddSaving:    raw.monthlyAddSaving     ?? raw.monthlyAdditionalSaving ?? KR_DEFAULTS.monthlyAddSaving,
    spouseEnabled:       raw.spouseEnabled        ?? ((raw.spouseMonthlyIncome ?? raw.spouseCurrentSalary ?? 0) > 0),
    spouseCurrentAge:    raw.spouseCurrentAge     ?? KR_DEFAULTS.spouseCurrentAge,
    hasHouse:            raw.hasHouse             ?? ((raw.housePrice ?? KR_DEFAULTS.housePrice) > 0),
    hasMortgage:         raw.hasMortgage          ?? ((raw.mortgageBalance ?? KR_DEFAULTS.mortgageBalance) > 0),
    privatePensionStartAge:    raw.privatePensionStartAge    ?? ASSUMPTIONS.assetRules.privatePensionStartAge,
    privatePensionWithdrawRate: raw.privatePensionWithdrawRate ?? ASSUMPTIONS.assetRules.privatePensionWithdrawRate,
    includeSeveranceLumpSum:   raw.includeSeveranceLumpSum   ?? ASSUMPTIONS.assetRules.includeSeveranceLumpSumDefault,
    medicalCostMultiplier:     raw.medicalCostMultiplier     ?? 1.0,
    applyMedicalCost:          raw.applyMedicalCost          ?? true,
    // C5: 인출 전략
    withdrawalStrategy:        raw.withdrawalStrategy        ?? "unified",
    // C1: 시퀀스 리스크 스트레스 테스트
    stressTest:                raw.stressTest                ?? "severe",
    children,
  };

  // 명목 % 마이그레이션: v3 이하는 실질 %를 입력했음
  // v4부터 명목 % 입력 — LS_KEY가 바뀌었으므로 LEGACY 로드 시만 변환 필요
  // 단순히 기존 값을 그대로 쓰되, 하위 호환성 이슈 최소화를 위해 정상 범위로 클램핑
  // (실질 3.5% → 명목 3.5%는 약간 낮지만 사용자가 다시 설정할 것)

  const normalized = {
    ...input,
    housePrice:            input.hasHouse ? input.housePrice : 0,
    mortgageBalance:       input.hasHouse && input.hasMortgage ? input.mortgageBalance : 0,
    monthlyMortgagePayment: input.hasHouse && input.hasMortgage ? input.monthlyMortgagePayment : 0,
    downsizeEnabled:       input.hasHouse ? input.downsizeEnabled : false,
  };
  // 레거시 필드 정리
  delete normalized.lifeExpectancy;
  delete normalized.pensionStartAge;
  delete normalized.npYearsContributed;
  delete normalized.npYearsAutoMode;
  delete normalized.currentSalary;
  delete normalized.spouseMonthlyIncome;
  delete normalized.sideIncomeSelf;
  delete normalized.sideIncomeSpouse;
  delete normalized.currentDC;
  delete normalized.currentPensionSavings;
  delete normalized.insuranceValue;
  delete normalized.monthlyAdditionalSaving;
  delete normalized.child1BirthYear;
  delete normalized.child2BirthYear;
  return normalized;
}

function makeScenario(name, input, colorIdx) {
  return {
    id: uid(),
    name,
    color: SCENARIO_COLORS[colorIdx % SCENARIO_COLORS.length],
    input: normalizeInput(input),
  };
}

function loadInitial() {
  const readStored = (key) => {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!Array.isArray(obj.scenarios) || !obj.scenarios.length) return null;
    return {
      activeId: obj.activeId,
      scenarios: obj.scenarios.map((s, idx) => ({
        ...s,
        color: s.color || SCENARIO_COLORS[idx % SCENARIO_COLORS.length],
        input: normalizeInput(s.input),
      })),
    };
  };

  try {
    const current = readStored(LS_KEY);
    if (current) return { ...current, isNew: false };
    for (const key of LEGACY_LS_KEYS) {
      const migrated = readStored(key);
      if (migrated) return { ...migrated, isNew: false };
    }
  } catch {}
  const base = makeScenario("현재", KR_DEFAULTS, 0);
  return { scenarios: [base], activeId: base.id, isNew: true };
}

function App() {
  const initial = loadInitial();
  const [scenarios, setScenarios] = useState(initial.scenarios);
  const [activeId, setActiveId] = useState(initial.activeId);
  const [advancedMode, setAdvancedMode] = useState(false);
  const [showWizard, setShowWizard] = useState(() => initial.isNew);
  const [wizardSeen, setWizardSeen] = useState(() => {
    try { return localStorage.getItem("retirement-sim-wizard-seen") === "1"; } catch { return false; }
  });
  const [showSeqShock, setShowSeqShock] = useState(false);
  const [showAssumptions, setShowAssumptions] = useState(false); // C7
  const debugMode = useDebugMode(); // C9
  const [mobileView, setMobileView] = useState("results"); // "results" | "inputs"
  const isMobile = useIsMobile();

  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ scenarios, activeId })); } catch {}
  }, [scenarios, activeId]);

  const active = scenarios.find(s => s.id === activeId) || scenarios[0];
  const setInputField = (k) => (v) => {
    setScenarios(prev => prev.map(s =>
      s.id === active.id ? { ...s, input: normalizeInput({ ...s.input, [k]: v }) } : s
    ));
  };
  const setInputPatch = (patch) => {
    setScenarios(prev => prev.map(s =>
      s.id === active.id ? { ...s, input: normalizeInput({ ...s.input, ...patch }) } : s
    ));
  };
  const addChild = () => {
    if (active.input.children.length >= 5) return;
    setInputField("children")([
      ...active.input.children,
      { id: uid(), birthYear: CURRENT_YEAR - Math.max(0, active.input.currentAge - 35) },
    ]);
  };
  const updateChild = (id, birthYear) => {
    setInputField("children")(active.input.children.map(c => c.id === id ? { ...c, birthYear } : c));
  };
  const removeChild = (id) => {
    setInputField("children")(active.input.children.filter(c => c.id !== id));
  };

  const addScenario = () => {
    if (scenarios.length >= 4) return;
    // 활성 시나리오의 퇴직나이 기준으로 +5, +10, -5 순으로 비교 시나리오 생성
    const base = active.input.retireAge;
    const offsets = [5, 10, -5];
    const off = offsets[scenarios.length - 1] ?? 5;
    const minRetire = Math.max(active.input.currentAge + 1, 25);
    const newRetire = Math.min(75, Math.max(minRetire, base + off));
    const sign = off >= 0 ? "+" : "−";
    const next = makeScenario(
      `퇴직 ${sign}${Math.abs(off)}세`,
      { ...active.input, retireAge: newRetire },
      scenarios.length,
    );
    setScenarios(prev => [...prev, next]);
    setActiveId(next.id);
  };

  const removeScenario = (id) => {
    if (scenarios.length <= 1) return;
    setScenarios(prev => prev.filter(s => s.id !== id));
    if (activeId === id) setActiveId(scenarios[0].id);
  };

  const renameScenario = (id) => {
    const cur = scenarios.find(s => s.id === id);
    const name = prompt("시나리오 이름", cur?.name || "");
    if (name) setScenarios(prev => prev.map(s => s.id === id ? { ...s, name } : s));
  };

  const resetActive = () => {
    setScenarios(prev => prev.map(s => s.id === activeId ? { ...s, input: normalizeInput(KR_DEFAULTS) } : s));
  };

  const applyInsightAsNewScenario = (ins) => {
    if (scenarios.length >= 4) return;
    const newInput = normalizeInput({ ...active.input, ...ins.patch(active.input) });
    const nextColor = SCENARIO_COLORS[scenarios.length];
    const newId = uid();
    setScenarios(prev => [...prev, { id: newId, name: ins.label, color: nextColor, input: newInput }]);
    setActiveId(newId);
  };

  const handleWizardComplete = (result) => {
    setScenarios(prev => prev.map(s => s.id === active.id ? { ...s, input: normalizeInput(result) } : s));
    // 퇴직 +5세 비교 시나리오 자동 추가
    if (scenarios.length < 4) {
      const later = makeScenario("퇴직 +5세", { ...result, retireAge: Math.min(75, result.retireAge + 5) }, 1);
      setScenarios(prev => [
        ...prev.map(s => s.id === active.id ? { ...s, input: normalizeInput(result) } : s),
        later,
      ]);
    }
    setShowWizard(false);
    try { localStorage.setItem("retirement-sim-wizard-seen", "1"); } catch {}
    setWizardSeen(true);
  };

  // 결과 계산
  const bandsById = useMemo(() => {
    const m = new Map();
    for (const s of scenarios) m.set(s.id, runScenarioBand(s.input));
    return m;
  }, [scenarios]);

  const activeBand = bandsById.get(active.id);
  const activeResult = activeBand.mid;
  const insights = useMemo(() => findBestInsights(active.input, activeResult), [active.input, activeResult]);

  // 기본값 대비 변경 여부 헬퍼 (슬라이더 강조 표시용)
  const normalizedDefaults = useMemo(() => normalizeInput(KR_DEFAULTS), []);
  const changedFrom = (field) => {
    const cur = i[field]; const def = normalizedDefaults[field];
    if (typeof def === "number") return Math.abs(cur - def) > 0.001;
    return cur !== def;
  };

  const i = active.input;

  // C9: 입력 정합성 검증
  const validationWarnings = useMemo(() => validateInput(i), [i]);

  // C9: 디버그 콘솔 로그
  useEffect(() => {
    if (!debugMode) return;
    console.group(`[RetireSim Debug] 시나리오: ${active.name}`);
    console.table({
      준비율: activeResult.readinessRatio + "%",
      자산소진: activeResult.depletionAge ? activeResult.depletionAge + "세" : "없음",
      퇴직시자산: fmt만원(activeResult.totalAssetsAtRetirement),
      브릿지인출: fmt만원(activeResult.bridgeShortfall),
      본인연금월: fmt만원월(activeResult.selfNpMonthly),
      인출전략: i.withdrawalStrategy,
    });
    console.log("yearlyAssetFlow:", activeResult.yearlyAssetFlow);
    console.groupEnd();
  }, [activeResult, debugMode, active.name]);

  // 입력 패널 요약값
  const assetSummary = fmt만원(
    active.input.retirementBalance + active.input.privatePensionBalance + active.input.cashSavings +
    (active.input.hasHouse ? active.input.housePrice : 0) -
    (active.input.hasHouse && active.input.hasMortgage ? active.input.mortgageBalance : 0)
  );

  // 자산흐름 차트 데이터 결합
  const chartData = useMemo(() => {
    const map = new Map();
    const ages = activeBand.mid.yearlyAssetFlow.map(y => y.age);
    for (const age of ages) map.set(age, { age });
    for (const s of scenarios) {
      const band = bandsById.get(s.id);
      band.mid.yearlyAssetFlow.forEach((y, idx) => {
        const row = map.get(y.age) || { age: y.age };
        row[`mid_${s.id}`] = y.netWorth;
        row[`pess_${s.id}`] = band.pessimistic.yearlyAssetFlow[idx]?.netWorth;
        row[`opt_${s.id}`] = band.optimistic.yearlyAssetFlow[idx]?.netWorth;
        if (s.id === active.id) {
          row[`band_${s.id}`] = [
            band.pessimistic.yearlyAssetFlow[idx]?.netWorth,
            band.optimistic.yearlyAssetFlow[idx]?.netWorth,
          ];
          // C1: 시퀀스 리스크 라인 (stressTest=none 이면 null)
          row["seq_shock"] = band.sequenceShock?.yearlyAssetFlow[idx]?.netWorth ?? undefined;
        }
        map.set(y.age, row);
      });
    }
    return Array.from(map.values()).sort((a, b) => a.age - b.age);
  }, [scenarios, bandsById, active.id]);

  // 자산 구성 변화 차트 데이터 (활성 시나리오)
  const bucketData = useMemo(() =>
    activeResult.yearlyAssetFlow.map(y => ({
      age:    y.age,
      "현금·투자":    Math.max(0, y.financialCash),
      "퇴직연금(DC)": Math.max(0, y.financialRetirement),
      "개인연금":     Math.max(0, y.financialPrivatePension),
      "주택(순)":    Math.max(0, y.houseValue - y.mortgage),
    })),
  [activeResult]);

  // 현금흐름 차트 데이터 (Step 6 — 라벨 표준화)
  const cashflowData = activeResult.yearlyAssetFlow.map(y => ({
    age:            y.age,
    "본인 근로":      y.selfSalaryMonthly,
    "배우자 근로":    y.spouseSalaryMonthly,
    "본인 국민연금":  y.selfPensionMonthly,
    "배우자 국민연금": y.spousePensionMonthly,
    "개인연금 인출":  y.privatePensionMonthly,
    "브릿지 월소득":  y.bridgeSideMonthly,
    "생활비":       -y.livingMonthly,
    "양육비":       -y.childMonthly,
    "대출 상환":    -y.mortgageMonthly,
    "건강보험료":   -y.healthInsMonthly,
    "의료비":      -y.medicalMonthly,
    "순현금흐름":    y.cashflowMonthly,
  }));

  const minAge = i.currentAge;
  const maxAge = i.selfLifeExpectancy;

  return (
    <div className="min-h-screen">
      {showWizard && (
        <SetupWizard
          initial={active.input}
          onComplete={handleWizardComplete}
          onClose={() => setShowWizard(false)}
        />
      )}
      {showAssumptions && <AssumptionsModal onClose={() => setShowAssumptions(false)} />}

      <header className="border-b border-slate-200 bg-white sticky top-0 z-10">
        <div className="max-w-7xl mx-auto px-4 py-2.5">
          <div className="flex items-baseline gap-3 flex-wrap justify-between">

            <div className="flex items-center gap-2 shrink-0">
              <button
                onClick={() => setShowAssumptions(true)}
                className="text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors"
                title="시뮬레이션에 사용된 가정과 상수를 확인합니다"
              >ⓘ 가정</button>
              <button
                onClick={() => { setShowWizard(true); try { localStorage.setItem("retirement-sim-wizard-seen", "1"); } catch {} setWizardSeen(true); }}
                className={`text-sm px-3 py-1.5 rounded-lg font-medium transition-all bg-slate-900 text-white hover:bg-slate-700 shadow-sm ${!wizardSeen ? "ring-2 ring-amber-300 ring-offset-2 animate-pulse" : ""}`}
                title="기본 정보 몇 가지만 입력하면 자동으로 시나리오를 만들어 드립니다"
              >🪄 빠른 설정</button>
            </div>
          </div>
          {/* 모바일: 결과/입력 토글 */}
          {isMobile && (
            <div className="mt-1.5 flex gap-1 text-xs bg-slate-100 rounded-lg p-0.5 w-fit">
              <button onClick={() => setMobileView("results")} className={`px-3 py-1 rounded-md transition-all ${mobileView === "results" ? 'bg-white shadow text-slate-900 font-medium' : 'text-slate-500'}`}>결과</button>
              <button onClick={() => setMobileView("inputs")} className={`px-3 py-1 rounded-md transition-all ${mobileView === "inputs" ? 'bg-white shadow text-slate-900 font-medium' : 'text-slate-500'}`}>입력</button>
            </div>
          )}
          {/* 시나리오 탭 */}
          <div className="mt-1.5 flex items-center gap-1 overflow-x-auto -mb-px">
            {scenarios.map(s => {
              const res = bandsById?.get(s.id)?.mid;
              const baseRes = bandsById?.get(scenarios[0]?.id)?.mid;
              const deltaR = res && baseRes && s.id !== scenarios[0]?.id
                ? Math.round(res.readinessRatio - baseRes.readinessRatio) : null;
              return (
                <div key={s.id} className={`scenario-tab flex items-center gap-1 px-2 py-1 rounded-t border-b-2 transition-colors ${s.id === activeId ? 'border-current bg-slate-50' : 'border-transparent hover:bg-slate-50'}`} style={{ color: s.color }}>
                  <button
                    onClick={() => setActiveId(s.id)}
                    className="text-xs font-medium"
                  >{isMobile && s.name.length > 6 ? s.name.slice(0, 6) + '…' : s.name}</button>
                  {deltaR !== null && (
                    <span className={`text-[9px] px-1 rounded-full font-medium ${deltaR >= 0 ? "bg-emerald-100 text-emerald-700" : "bg-red-100 text-red-600"}`}>
                      {deltaR >= 0 ? "+" : ""}{deltaR}%
                    </span>
                  )}
                  <button onClick={() => renameScenario(s.id)} className="text-[10px] text-slate-400 hover:text-slate-700" title="이름 변경">✎</button>
                  {scenarios.length > 1 && (
                    <button onClick={() => removeScenario(s.id)} className="text-[10px] text-slate-400 hover:text-red-500" title="삭제">×</button>
                  )}
                </div>
              );
            })}
            {scenarios.length < 4 && (
              <button
                onClick={addScenario}
                className="text-xs px-2.5 py-1 text-slate-400 hover:text-slate-700 border border-dashed border-slate-300 hover:border-slate-400 rounded-md ml-1 transition-colors"
                title="현재 시나리오 퇴직 나이 기준 +5세 비교 시나리오 추가"
              >+ 비교</button>
            )}
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-5 grid grid-cols-1 lg:grid-cols-12 gap-5">
        {/* 입력 패널 */}
        <aside className={`lg:col-span-4 xl:col-span-3 ${isMobile && mobileView !== "inputs" ? "hidden" : ""}`}>
          <div className="lg:sticky lg:top-24 bg-white rounded-xl border border-slate-200 p-4 max-h-[calc(100vh-7rem)] overflow-y-auto">
            <div className="mb-3 pb-2 border-b border-slate-100 flex items-center justify-between gap-2">
              <div>
                <div className="text-[10px] uppercase tracking-wider text-slate-400">편집 중</div>
                <div className="text-sm font-semibold" style={{ color: active.color }}>{active.name}</div>
              </div>
              <div className="flex gap-1 text-xs bg-slate-100 rounded-lg p-0.5 shrink-0">
                <button onClick={() => setAdvancedMode(false)} className={`px-2 py-1 rounded-md transition-all ${!advancedMode ? 'bg-white shadow text-slate-900 font-medium' : 'text-slate-500 hover:text-slate-700'}`}>기본</button>
                <button onClick={() => setAdvancedMode(true)} className={`px-2 py-1 rounded-md transition-all ${advancedMode ? 'bg-white shadow text-slate-900 font-medium' : 'text-slate-500 hover:text-slate-700'}`}>고급</button>
              </div>
            </div>

            {/* 프로필 */}
            <Section title="프로필" defaultOpen summary={`${i.currentAge}→${i.retireAge}→${i.selfPensionStartAge}세`}>
              <Slider label="현재 나이" value={i.currentAge} {...UI_RANGES.currentAge} onChange={setInputField("currentAge")} format={v => `${v}세`} changed={changedFrom("currentAge")} />
              <Slider label="퇴직 나이" value={i.retireAge} min={i.currentAge} max={UI_RANGES.retireAge.max} step={UI_RANGES.retireAge.step} onChange={setInputField("retireAge")} format={v => `${v}세`} changed={changedFrom("retireAge")} />
              {advancedMode && <>
                <Slider label="국민연금 개시 나이" value={i.selfPensionStartAge} {...UI_RANGES.selfPensionStartAge} onChange={setInputField("selfPensionStartAge")} format={v => `${v}세`} hint={`자동: ${autoPensionStartAge(i.currentAge)}세 (출생연도 기준)`} />
