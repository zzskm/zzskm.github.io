<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useMemo, useEffect, useRef } from "react";
import { createRoot } from "react-dom/client";
import {
  ResponsiveContainer, ComposedChart, Area, Bar, Line,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ReferenceArea, ReferenceLine, ReferenceDot,
} from "recharts";

// ============================================================
// 상수 / 디폴트
// ============================================================

const ASSUMPTIONS = {
  version: "kr-v4-2026-05",
  krPolicy: {
    pensionReplacementRate: 0.40,       // 국민연금 단순 소득대체율
    pensionAValueMonthly: 300,          // 만원/월, 국민연금 A값 단순 가정
    pensionTaxRate: 0.055,              // 연금소득세 단순 분리과세율
    maxNpYears: 40,                     // 국민연금 최대 가입연수
    contributionStartAge: 25,           // 자동 가입연수/퇴직급여 계산 기준 나이
    survivorPensionRatio: 0.50,         // 유족연금 단순 가정: 사망자 NP의 50%
    healthInsurance: {
      sideIncomeRate: 0.07,             // 지역가입자 단순 추정 (실제 산식과 다름)
      financialAssetRate: 0.0008,
      houseAssetRate: 0.0005,
      annualCap: 800,                   // 만원/년
    },
  },
  lifeCycle: {
    spendingFactors: [
      { fromAge: 0, factor: 1.0 },
      { fromAge: 65, factor: 0.75 },
      { fromAge: 75, factor: 0.55 },
    ],
    childMonthlyCosts: [
      { minAge: 0, maxAge: 6, amount: 50 },    // 만원/월
      { minAge: 7, maxAge: 18, amount: 80 },
      { minAge: 19, maxAge: 22, amount: 150 },
    ],
  },
  assetRules: {
    dcAnnualContributionSalaryDivisor: 12,
    readinessMaxRatio: 300,
    includeSeveranceLumpSumDefault: false,
    privatePensionStartAge: 60,
    privatePensionWithdrawRate: 5.0,
  },
};

const UI_RANGES = {
  currentAge:               { min: 25, max: 70, step: 1 },
  retireAge:                { min: 25, max: 75, step: 1 },
  selfPensionStartAge:      { min: 55, max: 75, step: 1 },
  spousePensionStartAge:    { min: 55, max: 75, step: 1 },
  selfLifeExpectancy:       { min: 70, max: 105, step: 1 },
  spouseLifeExpectancy:     { min: 70, max: 105, step: 1 },
  spouseCurrentAge:         { min: 20, max: 80, step: 1 },
  spouseRetireAge:          { min: 40, max: 75, step: 1 },
  selfNpYears:              { min: 0, max: 40, step: 1 },
  spouseNpYears:            { min: 0, max: 40, step: 1 },
  selfNpManualMonthly:      { min: 0, max: 300, step: 1 },
  spouseNpManualMonthly:    { min: 0, max: 300, step: 1 },
  selfCurrentSalary:        { min: 0, max: 30000, step: 100 },
  spouseCurrentSalary:      { min: 0, max: 30000, step: 100 },
  salaryGrowthRate:         { min: 0, max: 8, step: 0.1 },   // 명목 %
  postRetireSideIncome:     { min: 0, max: 500, step: 10 },
  retirementBalance:        { min: 0, max: 50000, step: 500 },
  privatePensionBalance:    { min: 0, max: 30000, step: 500 },
  cashSavings:              { min: 0, max: 50000, step: 500 },
  monthlyAddSaving:         { min: 0, max: 300, step: 10 },
  privatePensionStartAge:   { min: 55, max: 75, step: 1 },
  privatePensionWithdrawRate: { min: 0, max: 10, step: 0.1 },
  housePrice:               { min: 0, max: 300000, step: 1000 },
  houseInflationRate:       { min: 0, max: 10, step: 0.1 },  // 명목 %
  mortgageBalance:          { min: 0, max: 100000, step: 500 },
  monthlyMortgagePayment:   { min: 0, max: 500, step: 10 },
  investmentReturnRate:     { min: 0, max: 12, step: 0.1 },  // 명목 %
  inflationRate:            { min: 0, max: 8, step: 0.1 },
  scenarioBandSpread:       { min: 0, max: 4, step: 0.1 },
  workingLivingCost:        { min: 50, max: 800, step: 10 },
  bridgeLivingCost:         { min: 50, max: 800, step: 10 },
  retirementLivingCost:     { min: 50, max: 600, step: 10 },
  childCostMultiplier:      { min: 0.5, max: 2.0, step: 0.1 },
  downsizeAge:              { min: 40, max: 105, step: 1 },
  downsizeRatio:            { min: 0, max: 1, step: 0.05 },
};

const PRESETS = {
  krDefault: {
    // 프로필 (본인)
    currentAge: 40,
    retireAge: 55,
    selfLifeExpectancy: 87,        // 자동 계산 가능
    selfPensionStartAge: 65,       // 자동 계산 가능
    selfNpAutoMode: true,
    selfNpYears: 0,                // autoMode=true 시 자동 계산
    selfNpInputMode: "auto",       // "auto" | "manual"
    selfNpManualMonthly: 0,        // 만원/월 (manual 모드)
    selfCurrentSalary: 8000,       // 만원/년
    // 배우자
    spouseEnabled: false,
    spouseCurrentAge: 38,
    spouseRetireAge: 53,
    spouseLifeExpectancy: 90,
    spousePensionStartAge: 65,
    spouseNpAutoMode: true,
    spouseNpYears: 0,
    spouseNpInputMode: "auto",
    spouseNpManualMonthly: 0,
    spouseCurrentSalary: 0,        // 만원/년
    // 퇴직 후 소득
    postRetireSideIncome: 0,       // 만원/월 (브릿지기간 본인)
    // 자산
    retirementBalance: 5000,
    privatePensionBalance: 3000,
    privatePensionStartAge: ASSUMPTIONS.assetRules.privatePensionStartAge,
    privatePensionWithdrawRate: ASSUMPTIONS.assetRules.privatePensionWithdrawRate,
    cashSavings: 2000,
    monthlyAddSaving: 30,
    hasHouse: true,
    housePrice: 80000,
    houseInflationRate: 3.0,       // 명목 %
    hasMortgage: true,
    mortgageBalance: 20000,
    monthlyMortgagePayment: 150,
    // 시장 가정 (명목 %)
    investmentReturnRate: 6.0,
    inflationRate: 2.5,
    scenarioBandSpread: 2.0,
    salaryGrowthRate: 3.5,         // 명목 %
    // 생활비
    workingLivingCost: 350,
    bridgeLivingCost: 400,
    retirementLivingCost: 300,
    // 자녀
    children: [
      { id: "child-1", birthYear: 2015 },
      { id: "child-2", birthYear: 2018 },
    ],
    childCostMultiplier: 1.0,
    // 이벤트
    downsizeEnabled: false,
    downsizeAge: 65,
    downsizeRatio: 0.6,
    // 세제
    includeSeveranceLumpSum: ASSUMPTIONS.assetRules.includeSeveranceLumpSumDefault,
    applyHealthInsurance: true,
    applyPensionTax: false,
  },
};

const KR_DEFAULTS = PRESETS.krDefault;
const SCENARIO_COLORS = ["#0f172a", "#0ea5e9", "#f59e0b", "#8b5cf6"];
const CURRENT_YEAR = new Date().getFullYear();

// ============================================================
// 자동 계산 헬퍼
// ============================================================

// 출생연도 기반 국민연금 개시 나이 (2026년 기준 법정 수급 개시)
function autoPensionStartAge(currentAge) {
  const birthYear = CURRENT_YEAR - currentAge;
  if (birthYear >= 1969) return 65;
  if (birthYear >= 1965) return 64;
  if (birthYear >= 1961) return 63;
  return 62;
}

// 퇴직 나이 기준 자동 가입연수
function autoNpYears(retireAge, policy = ASSUMPTIONS.krPolicy) {
  return Math.min(policy.maxNpYears, Math.max(0, retireAge - policy.contributionStartAge));
}

// 현재 나이 기반 기대수명 (통계청 2024 단순화)
function autoLifeExpectancy(currentAge) {
  if (currentAge <= 30) return 87;
  if (currentAge <= 40) return 86;
  if (currentAge <= 50) return 85;
  if (currentAge <= 60) return 84;
  return 83;
}

// ============================================================
// 계산 헬퍼
// ============================================================

function npYearsFor(input, person, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;
  if (person === "spouse") {
    if (input.spouseNpAutoMode) return Math.min(policy.maxNpYears, Math.max(0, input.spouseRetireAge - policy.contributionStartAge));
    return Math.min(policy.maxNpYears, Math.max(0, input.spouseNpYears));
  }
  // self
  if (input.selfNpAutoMode) return autoNpYears(input.retireAge, policy);
  return Math.min(policy.maxNpYears, Math.max(0, input.selfNpYears));
}

function estimatedPensionMonthlyFor(input, person, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;
  if (person === "spouse") {
    if (input.spouseNpInputMode === "manual") return input.spouseNpManualMonthly ?? 0;
    const salary = input.spouseCurrentSalary ?? 0;
    const avgMonthly = (policy.pensionAValueMonthly + salary / 12) / 2;
    const years = npYearsFor(input, "spouse", assumptions);
    const replacement = years < 10 ? 0 : policy.pensionReplacementRate * (years / policy.maxNpYears);
    return replacement * avgMonthly;
  }
  // self
  if (input.selfNpInputMode === "manual") return input.selfNpManualMonthly ?? 0;
  const avgMonthly = (policy.pensionAValueMonthly + input.selfCurrentSalary / 12) / 2;
  const years = npYearsFor(input, "self", assumptions);
  const replacement = years < 10 ? 0 : policy.pensionReplacementRate * (years / policy.maxNpYears);
  return replacement * avgMonthly;
}

// 하위 호환용 (인사이트 등에서 사용)
function npYears(input, assumptions = ASSUMPTIONS) { return npYearsFor(input, "self", assumptions); }
function estimatedPensionMonthly(input, assumptions = ASSUMPTIONS) { return estimatedPensionMonthlyFor(input, "self", assumptions); }

function ageFactor(age, assumptions = ASSUMPTIONS) {
  return assumptions.lifeCycle.spendingFactors
    .filter(row => age >= row.fromAge)
    .sort((a, b) => b.fromAge - a.fromAge)[0]?.factor ?? 1.0;
}

function childCostAt(age, assumptions = ASSUMPTIONS) {
  if (age < 0) return 0;
  return assumptions.lifeCycle.childMonthlyCosts.find(row =>
    age >= row.minAge && age <= row.maxAge
  )?.amount ?? 0;
}

function childrenOf(input) {
  if (Array.isArray(input.children)) return input.children.filter(c => c && c.birthYear);
  return [input.child1BirthYear, input.child2BirthYear]
    .filter(Boolean)
    .map((birthYear, idx) => ({ id: `legacy-child-${idx + 1}`, birthYear }));
}

function childCostYearly(input, year, assumptions = ASSUMPTIONS) {
  let cost = 0;
  for (const child of childrenOf(input)) {
    cost += childCostAt(year - child.birthYear, assumptions) * 12;
  }
  return cost * (input.childCostMultiplier ?? 1.0);
}

function childEvents(input) {
  const events = [];
  childrenOf(input).forEach((child, i) => {
    const idx = i + 1;
    const parentAgeAt = (childAge) =>
      input.currentAge + ((child.birthYear + childAge) - CURRENT_YEAR);
    events.push({ age: parentAgeAt(19), label: `자녀${idx} 대학` });
    events.push({ age: parentAgeAt(23), label: `자녀${idx} 독립` });
  });
  return events.filter(e => e.age >= input.currentAge && e.age <= input.selfLifeExpectancy);
}

// 지역가입자 건보료 단순 추정 (만원/년). 실제 산식과 다름.
function healthInsuranceYearly(financial, house, sideIncomeAnnual, assumptions = ASSUMPTIONS) {
  const hi = assumptions.krPolicy.healthInsurance;
  const base = Math.max(0, sideIncomeAnnual) * hi.sideIncomeRate
             + Math.max(0, financial) * hi.financialAssetRate
             + Math.max(0, house) * hi.houseAssetRate;
  return Math.min(base, hi.annualCap);
}

// ============================================================
// 핵심 시뮬레이션 (v4 — 본인/배우자 분리, 명목→실질 변환)
// ============================================================

function calculateScenario(input, returnRateOverride, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;

  // ── 명목 → 실질 변환 ──────────────────────────────────────
  const inflRate = input.inflationRate / 100;
  const toReal = (nomPct) => (1 + nomPct / 100) / (1 + inflRate) - 1;
  const r  = toReal(returnRateOverride ?? input.investmentReturnRate);
  const sg = toReal(input.salaryGrowthRate);
  const hg = toReal(input.houseInflationRate);

  // ── 본인/배우자 국민연금 ───────────────────────────────────
  const selfNpMonthly    = estimatedPensionMonthlyFor(input, "self",   assumptions);
  const spouseNpMonthly  = estimatedPensionMonthlyFor(input, "spouse", assumptions);

  // ── 시뮬레이션 종료 나이 (self 기준) ──────────────────────
  const selfLE   = input.selfLifeExpectancy;
  // 배우자 수명을 본인 나이 축으로 변환
  const spouseAgeOffset = (input.spouseCurrentAge ?? input.currentAge) - input.currentAge;
  const spouseLeInSelfAge = input.spouseEnabled
    ? (input.spouseLifeExpectancy - spouseAgeOffset)
    : selfLE;
  const simEndAge = Math.max(selfLE, spouseLeInSelfAge);

  // ── 초기 자산 ─────────────────────────────────────────────
  let financialRetirement   = input.retirementBalance;
  let financialPrivatePension = input.privatePensionBalance;
  let financialCash         = input.cashSavings;
  let house = input.hasHouse ? input.housePrice : 0;
  let mortgage = input.hasHouse && input.hasMortgage ? input.mortgageBalance : 0;

  let depletionAge = null;
  let bridgeShortfall = 0;
  let totalAssetsAtRetirement = 0;
  let severancePaid = !input.includeSeveranceLumpSum;
  let downsizeDone = false;
  const downsizeEvents = [];
  const years = [];

  // 유족연금 추적
  let selfSurvivorNpBonus   = 0;  // 배우자 사망 시 본인이 받을 추가 NP
  let spouseSurvivorNpBonus = 0;  // 본인 사망 시 배우자가 받을 추가 NP (계산만)
  let prevSelfAlive  = true;
  let prevSpouseAlive = input.spouseEnabled;

  for (let age = input.currentAge; age <= simEndAge; age++) {
    const t = age - input.currentAge;
    const year = CURRENT_YEAR + t;

    // ── 생존 여부 ──
    const selfAlive   = age <= selfLE;
    const spouseAge   = (input.spouseCurrentAge ?? input.currentAge) + t;
    const spouseAlive = input.spouseEnabled && spouseAge <= input.spouseLifeExpectancy;

    // 유족연금: 배우자가 이번 해에 사망했을 때
    if (prevSpouseAlive && !spouseAlive && selfAlive) {
      selfSurvivorNpBonus = spouseNpMonthly * policy.survivorPensionRatio;
    }
    // 본인이 이번 해에 사망했을 때 (배우자가 받을 몫)
    if (prevSelfAlive && !selfAlive && spouseAlive) {
      spouseSurvivorNpBonus = selfNpMonthly * policy.survivorPensionRatio;
    }
    prevSelfAlive  = selfAlive;
    prevSpouseAlive = spouseAlive;

    // ── 근로 소득 ──
    const selfIsWorking   = selfAlive && age < input.retireAge;
    const spouseIsWorking = spouseAlive && spouseAge < (input.spouseRetireAge ?? 75);

    const selfSalaryAnnual   = selfIsWorking   ? input.selfCurrentSalary   * Math.pow(1 + sg, t) : 0;
    const spouseSalaryAnnual = spouseIsWorking ? (input.spouseCurrentSalary ?? 0) * Math.pow(1 + sg, t) : 0;

    // ── DC 적립 (본인 근로기만) ──
    const dcContribAnnual = selfIsWorking
      ? selfSalaryAnnual / assumptions.assetRules.dcAnnualContributionSalaryDivisor : 0;

    // ── 국민연금 (세후) ──
    const selfIsPension   = selfAlive   && age       >= input.selfPensionStartAge;
    const spouseIsPension = spouseAlive && spouseAge >= (input.spousePensionStartAge ?? 65);

    let selfPensionAnnual   = selfIsPension   ? (selfNpMonthly   + (selfAlive ? selfSurvivorNpBonus : 0))  * 12 : 0;
    let spousePensionAnnual = spouseIsPension ? (spouseNpMonthly + spouseSurvivorNpBonus) * 12 : 0;
    if (input.applyPensionTax) {
      if (selfPensionAnnual   > 0) selfPensionAnnual   *= (1 - policy.pensionTaxRate);
      if (spousePensionAnnual > 0) spousePensionAnnual *= (1 - policy.pensionTaxRate);
    }

    // ── 브릿지 소득 (본인 퇴직 후, 연금 개시 전) ──
    const selfIsRetired = selfAlive && !selfIsWorking;
    const selfIsBridge  = selfIsRetired && !selfIsPension;
    const bridgeSideAnnual = selfIsBridge ? input.postRetireSideIncome * 12 : 0;

    // ── 생활비 ──
    const isAnyoneAlive = selfAlive || spouseAlive;
    const baseLivingMonthly = selfIsWorking
      ? input.workingLivingCost
      : selfIsBridge
        ? input.bridgeLivingCost
        : input.retirementLivingCost;
    // 본인 사망 후에도 배우자 생존 시 생활비는 0.7배로 단순화
    const livingScale = (!selfAlive && spouseAlive) ? 0.7 : 1.0;
    const livingAnnual = isAnyoneAlive
      ? baseLivingMonthly * 12 * ageFactor(age, assumptions) * livingScale : 0;

    const childAnnual = isAnyoneAlive ? childCostYearly(input, year, assumptions) : 0;

    // ── 대출 상환 ──
    const mortgagePaid = (input.hasHouse && input.hasMortgage)
      ? Math.min(mortgage, input.monthlyMortgagePayment * 12) : 0;
    mortgage = Math.max(0, mortgage - mortgagePaid);

    // ── 추가저축 (본인 근로기만) ──
    const extraSavingAnnual = selfIsWorking ? input.monthlyAddSaving * 12 : 0;

    // ── 건강보험료 (퇴직 후) ──
    const sideIncomeForHI = bridgeSideAnnual + spouseSalaryAnnual;
    const healthInsAnnual = (selfIsRetired && input.applyHealthInsurance)
      ? healthInsuranceYearly(financialRetirement + financialPrivatePension + financialCash, house, sideIncomeForHI, assumptions)
      : 0;

    // ── 퇴직금 일시금 ──
    if (!severancePaid && age === input.retireAge && selfAlive) {
      const yearsWorked = Math.max(0, input.retireAge - policy.contributionStartAge);
      const grossSeverance = (input.selfCurrentSalary / 12) * yearsWorked;
      // 퇴직소득세 단순 적용 (근속연수공제 후 6.6% 단순 가정)
      const severanceTax = grossSeverance * 0.066;
      financialCash += grossSeverance - severanceTax;
      severancePaid = true;
    }

    // ── 다운사이징 ──
    if (!downsizeDone && input.hasHouse && input.downsizeEnabled && age === input.downsizeAge) {
      const liquidated = house * (1 - input.downsizeRatio);
      financialCash += liquidated;
      house = house * input.downsizeRatio;
      downsizeDone = true;
      downsizeEvents.push({ age, label: "주택 다운사이징", liquidated });
    }

    // ── 개인연금 인출 ──
    const privatePensionAnnual = age >= input.privatePensionStartAge && financialPrivatePension > 0
      ? Math.min(financialPrivatePension, financialPrivatePension * (input.privatePensionWithdrawRate / 100))
      : 0;
    financialPrivatePension -= privatePensionAnnual;

    // ── 현금흐름 집계 ──
    const income = selfSalaryAnnual + spouseSalaryAnnual + selfPensionAnnual + spousePensionAnnual
                 + privatePensionAnnual + bridgeSideAnnual;
    const outflow = livingAnnual + childAnnual + mortgagePaid + healthInsAnnual;
    const cashflowExclSaving = income - outflow;
    const cashflowWithSaving = cashflowExclSaving - extraSavingAnnual;

    // ── 자산 운용 ──
    financialRetirement     = financialRetirement     * (1 + r) + dcContribAnnual;
    financialPrivatePension = financialPrivatePension * (1 + r);
    financialCash           = financialCash           * (1 + r) + extraSavingAnnual + cashflowExclSaving;
    house = input.hasHouse ? house * (1 + hg) : 0;

    const financialTotal = financialRetirement + financialPrivatePension + financialCash;
    const netWorth = financialTotal + house - mortgage;

    if (financialTotal <= 0 && depletionAge === null && age >= input.retireAge) {
      depletionAge = age;
    }

    if (selfIsBridge && cashflowExclSaving < 0) bridgeShortfall += -cashflowExclSaving;
    if (age === input.retireAge) totalAssetsAtRetirement = financialTotal;

    years.push({
      age, year,
      phase: selfIsWorking ? "work" : selfIsBridge ? "bridge" : "pension",
      selfAlive, spouseAlive,
      financialRetirement: Math.round(financialRetirement),
      financialPrivatePension: Math.round(financialPrivatePension),
      financialCash: Math.round(financialCash),
      financialAssets: Math.round(financialTotal),
      houseValue: Math.round(house),
      mortgage: Math.round(mortgage),
      netWorth: Math.round(netWorth),
      selfSalaryMonthly:    Math.round(selfSalaryAnnual   / 12),
      spouseSalaryMonthly:  Math.round(spouseSalaryAnnual / 12),
      selfPensionMonthly:   Math.round(selfPensionAnnual  / 12),
      spousePensionMonthly: Math.round(spousePensionAnnual / 12),
      privatePensionMonthly: Math.round(privatePensionAnnual / 12),
      bridgeSideMonthly:    Math.round(bridgeSideAnnual   / 12),
      livingMonthly:        Math.round(livingAnnual       / 12),
      childMonthly:         Math.round(childAnnual        / 12),
      mortgageMonthly:      Math.round(mortgagePaid       / 12),
      healthInsMonthly:     Math.round(healthInsAnnual    / 12),
      cashflowMonthly:      Math.round(cashflowWithSaving / 12),
    });
  }

  const bridgeYears = Math.max(0, input.selfPensionStartAge - input.retireAge);

  let readinessRatio;
  if (depletionAge === null) {
    const last = years[years.length - 1];
    const margin = Math.max(0, last.financialAssets);
    readinessRatio = Math.min(assumptions.assetRules.readinessMaxRatio,
      100 + (totalAssetsAtRetirement > 0 ? (margin / totalAssetsAtRetirement) * 100 : 0));
  } else {
    const survived = depletionAge - input.retireAge;
    const need = selfLE - input.retireAge;
    readinessRatio = need > 0 ? (survived / need) * 100 : 0;
  }

  const lastYear = years[years.length - 1] || {};

  return {
    yearlyAssetFlow: years,
    assetBucketsAtEnd: {
      retirement:     lastYear.financialRetirement   ?? 0,
      privatePension: lastYear.financialPrivatePension ?? 0,
      cash:           lastYear.financialCash          ?? 0,
      totalFinancial: lastYear.financialAssets        ?? 0,
    },
    bridgeYears,
    bridgeShortfall:        Math.round(bridgeShortfall),
    totalAssetsAtRetirement: Math.round(totalAssetsAtRetirement),
    selfNpMonthly:    Math.round(selfNpMonthly),
    spouseNpMonthly:  Math.round(spouseNpMonthly),
    privatePensionMonthly: Math.round(
      years.find(y => y.privatePensionMonthly > 0)?.privatePensionMonthly ?? 0
    ),
    readinessRatio: Math.round(readinessRatio),
    depletionAge,
    childEventList: childEvents(input),
    downsizeEvents,
    assumptionVersion: assumptions.version,
  };
}

// 수익률 밴드 (명목 % 기준)
function runScenarioBand(input, assumptions = ASSUMPTIONS) {
  const r = input.investmentReturnRate;
  const s = input.scenarioBandSpread;
  return {
    pessimistic: calculateScenario(input, r - s, assumptions),
    mid:         calculateScenario(input, r,     assumptions),
    optimistic:  calculateScenario(input, r + s, assumptions),
  };
}

const INSIGHT_CANDIDATES = [
  { key: "retire+5",  label: "퇴직 +5세",          patch: (i) => ({ retireAge: Math.min(75, i.retireAge + 5) }) },
  { key: "side+50",   label: "브릿지 소득 +50만/월", patch: (i) => ({ postRetireSideIncome: i.postRetireSideIncome + 50 }) },
  { key: "live-50",   label: "생활비 −50만/월",      patch: (i) => ({
                          bridgeLivingCost: Math.max(50, i.bridgeLivingCost - 50),
                          retirementLivingCost: Math.max(50, i.retirementLivingCost - 50),
                       }) },
  { key: "downsize",  label: "주택 다운사이징 60%",  patch: (i) => ({
                          hasHouse: true,
                          downsizeEnabled: true,
                          downsizeAge: Math.min(i.selfLifeExpectancy - 1, i.retireAge + 5),
                          downsizeRatio: 0.6,
                       }) },
  { key: "saving+30", label: "추가저축 +30만/월",    patch: (i) => ({ monthlyAddSaving: i.monthlyAddSaving + 30 }) },
  { key: "private+1", label: "개인연금 인출률 +1%p", patch: (i) => ({ privatePensionWithdrawRate: Math.min(10, i.privatePensionWithdrawRate + 1) }) },
  { key: "spouse+3",  label: "배우자 은퇴 +3세",     patch: (i) => i.spouseEnabled ? ({ spouseRetireAge: Math.min(75, i.spouseRetireAge + 3) }) : ({}) },
];

function findBestInsights(input, baseResult) {
  const baseR = baseResult.readinessRatio;
  const results = INSIGHT_CANDIDATES.map(c => {
    const patched = { ...input, ...c.patch(input) };
    const r = calculateScenario(patched, undefined, ASSUMPTIONS).readinessRatio;
    return { key: c.key, label: c.label, delta: r - baseR, newRatio: r, patch: c.patch };
  });
  return results.filter(r => r.delta > 0.5).slice(0, 3);
}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.innerWidth < 640);
  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);
  return isMobile;
}

function Slider({ label, value, min, max, step, onChange, format, hint }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(String(value));
  const inputRef = useRef(null);
  const numericValue = Number(value);
  const effectiveMin = Number.isFinite(numericValue) ? Math.min(min, numericValue) : min;
  const effectiveMax = Number.isFinite(numericValue) ? Math.max(max, numericValue) : max;

  useEffect(() => { if (!editing) setDraft(String(value)); }, [value, editing]);
  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  const commit = () => {
    const n = Number(draft);
    if (!isNaN(n)) onChange(n);
    setEditing(false);
  };
  const cancel = () => { setDraft(String(value)); setEditing(false); };

  return (
    <div className="mb-3">
      <div className="flex items-baseline justify-between mb-1 gap-2">
        <label className="text-xs text-slate-600 truncate">{label}</label>
        {editing ? (
          <input
            ref={inputRef}
            type="number"
            value={draft}
            step={step}
            onChange={e => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={e => {
              if (e.key === "Enter") commit();
              if (e.key === "Escape") cancel();
            }}
            className="num text-sm font-medium w-24 px-1 py-0.5 border border-slate-300 rounded text-right bg-white focus:outline-none focus:border-slate-500"
          />
        ) : (
          <button
            onClick={() => setEditing(true)}
            className="text-sm font-medium num text-slate-900 hover:bg-slate-100 px-1 rounded -mx-1"
            title="클릭하여 직접 입력"
          >{format ? format(value) : value}</button>
        )}
      </div>
      <input
        type="range"
        min={effectiveMin} max={effectiveMax} step={step}
        value={value}
        onChange={e => onChange(Number(e.target.value))}
        className="w-full"
      />
      {hint && <p className="text-[10px] text-slate-400 mt-0.5">{hint}</p>}
    </div>
  );
}

}

const LEGACY_LS_KEYS = ["retirement-sim-v3-stepwise", "retirement-sim-v2"];

function uid() { return Math.random().toString(36).slice(2, 9); }

function normalizeInput(raw = {}) {
  const legacyChildren = [raw.child1BirthYear, raw.child2BirthYear]
    .filter(Boolean)
    .map((birthYear, idx) => ({ id: `legacy-child-${idx + 1}`, birthYear }));
  const children = Array.isArray(raw.children)
    ? raw.children.filter(c => c && c.birthYear).slice(0, 5).map((c, idx) => ({
        id: c.id || `child-${idx + 1}`,
        birthYear: Number(c.birthYear),
      }))
    : legacyChildren;

  // v3 → v4 마이그레이션: 단일 필드 → 본인/배우자 분리
  const selfCurrentSalary  = raw.selfCurrentSalary  ?? raw.currentSalary       ?? KR_DEFAULTS.selfCurrentSalary;
  const selfLifeExpectancy = raw.selfLifeExpectancy  ?? raw.lifeExpectancy      ?? autoLifeExpectancy(raw.currentAge ?? KR_DEFAULTS.currentAge);
  const selfPensionStartAge = raw.selfPensionStartAge ?? raw.pensionStartAge    ?? autoPensionStartAge(raw.currentAge ?? KR_DEFAULTS.currentAge);
  const selfNpYears        = raw.selfNpYears         ?? raw.npYearsContributed  ?? 0;
  const selfNpAutoMode     = raw.selfNpAutoMode      ?? raw.npYearsAutoMode     ?? true;

  // v3 spouseMonthlyIncome(월)→v4 spouseCurrentSalary(연봉)
  const spouseCurrentSalary = raw.spouseCurrentSalary
    ?? (raw.spouseMonthlyIncome != null ? raw.spouseMonthlyIncome * 12 : KR_DEFAULTS.spouseCurrentSalary);

  const spouseLifeExpectancy  = raw.spouseLifeExpectancy  ?? raw.lifeExpectancy       ?? autoLifeExpectancy(raw.spouseCurrentAge ?? KR_DEFAULTS.spouseCurrentAge);
  const spousePensionStartAge = raw.spousePensionStartAge ?? raw.pensionStartAge      ?? autoPensionStartAge(raw.spouseCurrentAge ?? KR_DEFAULTS.spouseCurrentAge);

  const input = {
    ...KR_DEFAULTS,
    ...raw,
    selfCurrentSalary,
    selfLifeExpectancy,
    selfPensionStartAge,
    selfNpYears,
    selfNpAutoMode,
    selfNpInputMode:     raw.selfNpInputMode     ?? "auto",
    selfNpManualMonthly: raw.selfNpManualMonthly ?? 0,
    spouseCurrentSalary,
    spouseLifeExpectancy,
    spousePensionStartAge,
    spouseNpYears:       raw.spouseNpYears       ?? 0,
    spouseNpAutoMode:    raw.spouseNpAutoMode     ?? true,
    spouseNpInputMode:   raw.spouseNpInputMode    ?? "auto",
    spouseNpManualMonthly: raw.spouseNpManualMonthly ?? 0,
    postRetireSideIncome: raw.postRetireSideIncome ?? raw.sideIncomeSelf ?? KR_DEFAULTS.postRetireSideIncome,
    retirementBalance:   raw.retirementBalance   ?? raw.currentDC ?? KR_DEFAULTS.retirementBalance,
    privatePensionBalance: raw.privatePensionBalance ?? raw.currentPensionSavings ?? KR_DEFAULTS.privatePensionBalance,
    cashSavings:         raw.cashSavings         ?? raw.insuranceValue ?? KR_DEFAULTS.cashSavings,
    monthlyAddSaving:    raw.monthlyAddSaving     ?? raw.monthlyAdditionalSaving ?? KR_DEFAULTS.monthlyAddSaving,
    spouseEnabled:       raw.spouseEnabled        ?? ((raw.spouseMonthlyIncome ?? raw.spouseCurrentSalary ?? 0) > 0),
    spouseCurrentAge:    raw.spouseCurrentAge     ?? KR_DEFAULTS.spouseCurrentAge,
    hasHouse:            raw.hasHouse             ?? ((raw.housePrice ?? KR_DEFAULTS.housePrice) > 0),
    hasMortgage:         raw.hasMortgage          ?? ((raw.mortgageBalance ?? KR_DEFAULTS.mortgageBalance) > 0),
    privatePensionStartAge:    raw.privatePensionStartAge    ?? ASSUMPTIONS.assetRules.privatePensionStartAge,
    privatePensionWithdrawRate: raw.privatePensionWithdrawRate ?? ASSUMPTIONS.assetRules.privatePensionWithdrawRate,
    includeSeveranceLumpSum:   raw.includeSeveranceLumpSum   ?? ASSUMPTIONS.assetRules.includeSeveranceLumpSumDefault,
    children,
  };

  // 명목 % 마이그레이션: v3 이하는 실질 %를 입력했음
  // v4부터 명목 % 입력 — LS_KEY가 바뀌었으므로 LEGACY 로드 시만 변환 필요
  // 단순히 기존 값을 그대로 쓰되, 하위 호환성 이슈 최소화를 위해 정상 범위로 클램핑
  // (실질 3.5% → 명목 3.5%는 약간 낮지만 사용자가 다시 설정할 것)

  const normalized = {
    ...input,
    housePrice:            input.hasHouse ? input.housePrice : 0,
    mortgageBalance:       input.hasHouse && input.hasMortgage ? input.mortgageBalance : 0,
    monthlyMortgagePayment: input.hasHouse && input.hasMortgage ? input.monthlyMortgagePayment : 0,
    downsizeEnabled:       input.hasHouse ? input.downsizeEnabled : false,
  };
  // 레거시 필드 정리
  delete normalized.lifeExpectancy;
  delete normalized.pensionStartAge;
  delete normalized.npYearsContributed;
  delete normalized.npYearsAutoMode;
  delete normalized.currentSalary;
  delete normalized.spouseMonthlyIncome;
  delete normalized.sideIncomeSelf;
  delete normalized.sideIncomeSpouse;
  delete normalized.currentDC;
  delete normalized.currentPensionSavings;
  delete normalized.insuranceValue;
  delete normalized.monthlyAdditionalSaving;
  delete normalized.child1BirthYear;
  delete normalized.child2BirthYear;
  return normalized;
}

function makeScenario(name, input, colorIdx) {
  return {
    id: uid(),
    name,
    color: SCENARIO_COLORS[colorIdx % SCENARIO_COLORS.length],
    input: normalizeInput(input),
  };
}

function loadInitial() {
  const readStored = (key) => {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!Array.isArray(obj.scenarios) || !obj.scenarios.length) return null;
    return {
      activeId: obj.activeId,
      scenarios: obj.scenarios.map((s, idx) => ({
        ...s,
        color: s.color || SCENARIO_COLORS[idx % SCENARIO_COLORS.length],
        input: normalizeInput(s.input),
      })),
    };
  };

  try {
    const current = readStored(LS_KEY);
    if (current) return { ...current, isNew: false };
    for (const key of LEGACY_LS_KEYS) {
      const migrated = readStored(key);
      if (migrated) return { ...migrated, isNew: false };
    }
  } catch {}
  const base = makeScenario("현재", KR_DEFAULTS, 0);
  return { scenarios: [base], activeId: base.id, isNew: true };
}

  const initial = loadInitial();
  const [scenarios, setScenarios] = useState(initial.scenarios);
  const [activeId, setActiveId] = useState(initial.activeId);
  const [advancedMode, setAdvancedMode] = useState(false);

  const isMobile = useIsMobile();

    try { localStorage.setItem(LS_KEY, JSON.stringify({ scenarios, activeId })); } catch {}
  }, [scenarios, activeId]);

  const active = scenarios.find(s => s.id === activeId) || scenarios[0];
  const setInputField = (k) => (v) => {
    setScenarios(prev => prev.map(s =>
      s.id === active.id ? { ...s, input: normalizeInput({ ...s.input, [k]: v }) } : s
    ));
  };
  const setInputPatch = (patch) => {
    setScenarios(prev => prev.map(s =>
      s.id === active.id ? { ...s, input: normalizeInput({ ...s.input, ...patch }) } : s
    ));
  };
  const addChild = () => {
    if (active.input.children.length >= 5) return;
    setInputField("children")([
      ...active.input.children,
      { id: uid(), birthYear: CURRENT_YEAR - Math.max(0, active.input.currentAge - 35) },

      scenarios.length,

    if (scenarios.length <= 1) return;

  const renameScenario = (id) => {
    const cur = scenarios.find(s => s.id === id);

    if (name) setScenarios(prev => prev.map(s => s.id === id ? { ...s, name } : s));
  };

  const resetActive = () => {
    setScenarios(prev => prev.map(s => s.id === activeId ? { ...s, input: normalizeInput(KR_DEFAULTS) } : s));
  };

  const applyInsightAsNewScenario = (ins) => {
    if (scenarios.length >= 4) return;
    const newInput = normalizeInput({ ...active.input, ...ins.patch(active.input) });
    const nextColor = SCENARIO_COLORS[scenarios.length];

    setScenarios(prev => prev.map(s => s.id === active.id ? { ...s, input: normalizeInput(result) } : s));
    // 퇴직 +5세 비교 시나리오 자동 추가
    if (scenarios.length < 4) {
      const later = makeScenario("퇴직 +5세", { ...result, retireAge: Math.min(75, result.retireAge + 5) }, 1);
      setScenarios(prev => [
        ...prev.map(s => s.id === active.id ? { ...s, input: normalizeInput(result) } : s),
        later,

    }
    setShowWizard(false);
  };

  // 결과 계산
  const bandsById = useMemo(() => {
    const m = new Map();
    for (const s of scenarios) m.set(s.id, runScenarioBand(s.input));
    return m;
  }, [scenarios]);

  const activeBand = bandsById.get(active.id);
  const activeResult = activeBand.mid;
  const insights = useMemo(() => findBestInsights(active.input, activeResult), [active.input, activeResult]);

  // 입력 패널 요약값

  // 자산흐름 차트 데이터 결합

            band.optimistic.yearlyAssetFlow[idx]?.netWorth,

        map.set(y.age, row);
      });
    }
    return Array.from(map.values()).sort((a, b) => a.age - b.age);

  const cashflowData = activeResult.yearlyAssetFlow.map(y => ({

                <button onClick={() => renameScenario(s.id)} className="text-[10px] text-slate-400 hover:text-slate-700" title="이름 변경">✎</button>
                {scenarios.length > 1 && (
                  <button onClick={() => removeScenario(s.id)} className="text-[10px] text-slate-400 hover:text-red-500" title="삭제">×</button>

              </div>
            ))}
            {scenarios.length < 4 && (
              <button onClick={addScenario} className="text-xs px-2 py-1 text-slate-500 hover:text-slate-900">+ 시나리오</button>

              )}
              {advancedMode && (
                <Slider label="개인연금 잔액(연금저축/IRP)" value={i.privatePensionBalance} {...UI_RANGES.privatePensionBalance} onChange={setInputField("privatePensionBalance")} format={fmt만원} />
              )}
              <Slider label="현금·투자 금융자산" value={i.cashSavings} {...UI_RANGES.cashSavings} onChange={setInputField("cashSavings")} format={fmt만원} />
              {advancedMode && <>
                <Slider label="추가저축(근로기)" value={i.monthlyAddSaving} {...UI_RANGES.monthlyAddSaving} onChange={setInputField("monthlyAddSaving")} format={v => `${v}만/월`} />
                <Toggle label="주택 보유" value={i.hasHouse} onChange={(v) => setInputPatch({ hasHouse: v })} />
                {i.hasHouse && <>
                  <Slider label="주택 가치" value={i.housePrice} {...UI_RANGES.housePrice} onChange={setInputField("housePrice")} format={fmt만원} />
                  <Toggle label="주택 대출 보유" value={i.hasMortgage} onChange={(v) => setInputPatch({ hasMortgage: v })} />
                  {i.hasMortgage && <>
                    <Slider label="대출 잔액" value={i.mortgageBalance} {...UI_RANGES.mortgageBalance} onChange={setInputField("mortgageBalance")} format={fmt만원} />
                    <Slider label="월 원리금" value={i.monthlyMortgagePayment} {...UI_RANGES.monthlyMortgagePayment} onChange={setInputField("monthlyMortgagePayment")} format={v => `${v}만/월`} />
                  </>}
                </>}
              </>}
            </Section>

            {advancedMode && (
              <Section title="개인연금 인출" summary={`${i.privatePensionStartAge}세 · ${i.privatePensionWithdrawRate.toFixed(1)}%`}>
                <Slider label="인출 시작 나이" value={i.privatePensionStartAge} {...UI_RANGES.privatePensionStartAge} onChange={setInputField("privatePensionStartAge")} format={v => `${v}세`} />
                <Slider label="연간 인출률" value={i.privatePensionWithdrawRate} {...UI_RANGES.privatePensionWithdrawRate} onChange={setInputField("privatePensionWithdrawRate")} format={v => `${v.toFixed(1)}%`} hint="매년 잔액 × 인출률만큼 현금흐름에 반영" />
              </Section>
            )}

            {/* 생활비 */}
            <Section title="생활비 (현재가치)" summary={`${i.bridgeLivingCost}/${i.retirementLivingCost}만`}>
              {advancedMode && (
                <Slider label="근로기" value={i.workingLivingCost} {...UI_RANGES.workingLivingCost} onChange={setInputField("workingLivingCost")} format={v => `${v}만/월`} />
              )}
              <Slider label="브릿지 기간" value={i.bridgeLivingCost} {...UI_RANGES.bridgeLivingCost} onChange={setInputField("bridgeLivingCost")} format={v => `${v}만/월`} />
              <Slider label="연금 수령기" value={i.retirementLivingCost} {...UI_RANGES.retirementLivingCost} onChange={setInputField("retirementLivingCost")} format={v => `${v}만/월`} />
              <p className="text-[10px] text-slate-400">65~74세 0.75배 / 75세+ 0.55배 자동 적용. 배우자만 생존 시 0.7배.</p>
            </Section>

            {advancedMode && (
              <Section title="자녀" summary={`${i.children.length}명`}>
                {i.children.length === 0 && <p className="text-xs text-slate-400 mb-2">자녀 없음</p>}
                {i.children.map((child, idx) => (
                  <div key={child.id} className="flex items-end gap-2 mb-2">
                    <div className="flex-1">
                      <NumberInput label={`자녀 ${idx + 1} 출생연도`} value={child.birthYear} onChange={v => updateChild(child.id, v)} />
                    </div>
                    <button onClick={() => removeChild(child.id)} className="mb-3 px-2 py-1 text-xs rounded border border-slate-200 text-slate-500 hover:text-red-600">삭제</button>
                  </div>
                ))}
                {i.children.length < 5 && (
                  <button onClick={addChild} className="mb-3 px-2 py-1 text-xs rounded border border-slate-200 text-slate-600 hover:bg-slate-50">+ 자녀 추가</button>
                )}
                <Slider label="사교육비 강도" value={i.childCostMultiplier} {...UI_RANGES.childCostMultiplier} onChange={setInputField("childCostMultiplier")} format={v => `${v.toFixed(1)}×`} hint="1.0 = 표준 (0~6:50/초중고:80/대학:150만/월)" />
              </Section>
            )}

            {advancedMode && i.hasHouse && (
              <Section title="이벤트 — 다운사이징" summary={i.downsizeEnabled ? `${i.downsizeAge}세` : "OFF"}>
                <Toggle label="주택 다운사이징 사용" value={i.downsizeEnabled} onChange={setInputField("downsizeEnabled")} />
                {i.downsizeEnabled && <>
                  <Slider label="매각 나이" value={i.downsizeAge} min={i.retireAge} max={i.selfLifeExpectancy - 1} step={UI_RANGES.downsizeAge.step} onChange={setInputField("downsizeAge")} format={v => `${v}세`} />
                  <Slider label="매각 후 보유비율" value={i.downsizeRatio} {...UI_RANGES.downsizeRatio} onChange={setInputField("downsizeRatio")} format={v => `${Math.round(v*100)}%`} hint="0.6 = 60% 가치 주택으로 다운사이즈, 40% 현금화" />
                </>}
              </Section>
            )}

            {/* 시장 가정 */}
            <Section title="시장 가정" summary={`수익률 ${i.investmentReturnRate.toFixed(1)}% / 물가 ${i.inflationRate.toFixed(1)}%`}>
              <Slider label="투자수익률 (명목)" value={i.investmentReturnRate} {...UI_RANGES.investmentReturnRate} onChange={setInputField("investmentReturnRate")} format={v => `${v.toFixed(1)}%`} hint="내부적으로 실질률 변환 후 계산 (차트는 현재가치 기준)" />
              <Slider label="물가상승률 (기준)" value={i.inflationRate} {...UI_RANGES.inflationRate} onChange={setInputField("inflationRate")} format={v => `${v.toFixed(1)}%`} />
              {advancedMode && <>
                <Slider label="수익률 밴드 ±" value={i.scenarioBandSpread} {...UI_RANGES.scenarioBandSpread} onChange={setInputField("scenarioBandSpread")} format={v => `±${v.toFixed(1)}%p`} />
                {i.hasHouse && <Slider label="주택 상승률 (명목)" value={i.houseInflationRate} {...UI_RANGES.houseInflationRate} onChange={setInputField("houseInflationRate")} format={v => `${v.toFixed(1)}%`} />}
              </>}
            </Section>

            {advancedMode && (
              <Section title="세제·건보">
                <Toggle label="건강보험료 적용" value={i.applyHealthInsurance} onChange={setInputField("applyHealthInsurance")} hint="퇴직 후 지역가입자 단순 추정" />
                <Toggle label="연금소득세 5.5%" value={i.applyPensionTax} onChange={setInputField("applyPensionTax")} hint="분리과세 가정" />
                <Toggle label="퇴직금 일시금 별도 반영" value={i.includeSeveranceLumpSum} onChange={setInputField("includeSeveranceLumpSum")} hint="DC 매년 적립과 중복될 수 있어 기본값은 OFF" />
              </Section>
            )}

            <button
              onClick={resetActive}
              className="w-full mt-2 px-3 py-2 text-xs rounded-md text-slate-500 hover:bg-slate-50 border border-slate-200"
            >이 시나리오 기본값으로 리셋</button>
          </div>
        </aside>

        {/* 결과 패널 */}
        <section className="lg:col-span-8 xl:col-span-9 space-y-5">
          {/* 요약 카드 */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <SummaryCard
              label="브릿지 기간"
              value={`${activeResult.bridgeYears}년`}
              color={activeResult.bridgeYears >= 10 ? "red" : activeResult.bridgeYears >= 5 ? "amber" : "green"}
              sub={`${i.retireAge}세 → ${i.selfPensionStartAge}세`}
            />
            <SummaryCard
              label="브릿지 누적 적자"
              value={fmt만원(activeResult.bridgeShortfall)}
              color={activeResult.bridgeShortfall > 30000 ? "red" : activeResult.bridgeShortfall > 10000 ? "amber" : "green"}
              sub="현금흐름 음수 합계"
            />
            <SummaryCard
              label="본인 국민연금"
              value={fmt만원월(activeResult.selfNpMonthly)}
              color="blue"
              sub={`${i.selfPensionStartAge}세 / 가입 ${npYearsFor(i)}년`}
            />
            <SummaryCard
              label={`준비율 (${readinessLabel(activeResult.readinessRatio)})`}
              value={`${activeResult.readinessRatio}%`}
              color={readinessColor(activeResult.readinessRatio)}
              sub={activeResult.depletionAge ? `${activeResult.depletionAge}세 자산소진` : "수명까지 유지"}
            />
          </div>

          {/* 자산흐름 그래프 */}
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <div className="flex items-baseline justify-between mb-2 flex-wrap gap-2">
              <h2 className="text-sm font-semibold">자산 흐름 (순자산)</h2>
              <div className="flex items-center gap-3 text-[11px] text-slate-500 flex-wrap">
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500"></span>근로기</span>
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400"></span>브릿지</span>
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-400"></span>연금기</span>
                <span className="text-slate-300">|</span>
                <span className="text-slate-400">음영 = 활성 시나리오 수익률 ±{i.scenarioBandSpread}%p</span>
              </div>
            </div>
            <div style={{ width: "100%", height: isMobile ? 220 : 360 }}>
              <ResponsiveContainer>
                <ComposedChart data={chartData} margin={{ top: 10, right: 16, bottom: 0, left: 0 }}>
                  <CartesianGrid stroke="#f1f5f9" />
                  <XAxis dataKey="age" tick={{ fontSize: 11 }} />
                  <YAxis tick={{ fontSize: 11 }} tickFormatter={v => fmt만원(v)} width={60} />

                  <ReferenceArea x1={minAge} x2={i.retireAge} fill="#10b981" fillOpacity={0.05} />
                  <ReferenceArea x1={i.retireAge} x2={i.selfPensionStartAge} fill="#ef4444" fillOpacity={0.07} />
                  <ReferenceArea x1={i.selfPensionStartAge} x2={maxAge} fill="#3b82f6" fillOpacity={0.05} />

                  {activeResult.childEventList.map((e, idx) => (
                    <ReferenceLine key={`c${idx}`} x={e.age} stroke="#94a3b8" strokeDasharray="3 3"
                      label={{ value: e.label, position: "top", fontSize: 9, fill: "#64748b" }} />
                  ))}
                  {activeResult.downsizeEvents.map((e, idx) => (
                    <ReferenceLine key={`d${idx}`} x={e.age} stroke="#8b5cf6" strokeDasharray="4 2"
                      label={{ value: "🏠 다운사이즈", position: "top", fontSize: 9, fill: "#8b5cf6" }} />
                  ))}

                  <Tooltip
                    formatter={(v, name) => [fmt만원(v), name]}
                    labelFormatter={(age) => `${age}세`}
                    contentStyle={{ fontSize: 12 }}
                  />
                  <Legend wrapperStyle={{ fontSize: 11 }} />

                  {/* 활성 시나리오 밴드 */}
                  <Area type="monotone" dataKey={`band_${active.id}`} name="수익률 밴드"
                    stroke="none" fill={active.color} fillOpacity={0.10} />

                  {/* 시나리오별 중간 라인 */}
                  {scenarios.map(s => (
                    <Line key={s.id}
                      type="monotone"
                      dataKey={`mid_${s.id}`}
                      name={s.name}
                      stroke={s.color}
                      strokeWidth={s.id === active.id ? 2.5 : 1.5}
                      strokeDasharray={s.id === active.id ? undefined : "5 3"}
                      dot={false}
                    />
                  ))}

                  {scenarios.map(s => {
                    const res = bandsById.get(s.id).mid;
                    if (!res.depletionAge) return null;
                    return (
                      <ReferenceDot key={`dep-${s.id}`} x={res.depletionAge} y={0} r={4}
                        fill={s.color} stroke="#fff" strokeWidth={2} />
                    );
                  })}
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* 시나리오 비교 테이블 */}
          {scenarios.length > 1 && (
            <div className="bg-white rounded-xl border border-slate-200 p-4">
              <h2 className="text-sm font-semibold mb-2">시나리오 비교</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-left text-[11px] text-slate-500 border-b border-slate-100">
                      <th className="py-2 pr-2">시나리오</th>
                      <th className="py-2 px-2 text-right">퇴직</th>
                      <th className="py-2 px-2 text-right">브릿지</th>
                      <th className="py-2 px-2 text-right">누적적자</th>
                      <th className="py-2 px-2 text-right">소진</th>
                      <th className="py-2 px-2 text-right">준비율</th>
                      <th className="py-2 pl-2 text-right">국민연금</th>
                    </tr>
                  </thead>
                  <tbody className="num">
                    {scenarios.map(s => {
                      const res = bandsById.get(s.id).mid;
                      return (
                        <tr key={s.id} className={`border-b border-slate-50 ${s.id === activeId ? 'font-medium' : ''}`}>
                          <td className="py-1.5 pr-2" style={{ color: s.color }}>{s.name}</td>
                          <td className="py-1.5 px-2 text-right">{s.input.retireAge}세</td>
                          <td className="py-1.5 px-2 text-right">{res.bridgeYears}년</td>
                          <td className="py-1.5 px-2 text-right">{fmt만원(res.bridgeShortfall)}</td>
                          <td className="py-1.5 px-2 text-right">{res.depletionAge ? `${res.depletionAge}세` : "—"}</td>
                          <td className="py-1.5 px-2 text-right">{res.readinessRatio}%</td>
                          <td className="py-1.5 pl-2 text-right">{fmt만원월(res.selfNpMonthly)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* 월 현금흐름 */}
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <h2 className="text-sm font-semibold mb-2">월 현금흐름 — <span style={{color: active.color}}>{active.name}</span></h2>
            <div style={{ width: "100%", height: isMobile ? 180 : 300 }}>
              <ResponsiveContainer>
                <ComposedChart data={cashflowData} margin={{ top: 10, right: 16, bottom: 0, left: 0 }} stackOffset="sign">
                  <CartesianGrid stroke="#f1f5f9" />
                  <XAxis dataKey="age" tick={{ fontSize: 11 }} />
                  <YAxis tick={{ fontSize: 11 }} width={50} />
                  <Tooltip formatter={(v) => `${Math.abs(v).toLocaleString()}만`} labelFormatter={(age) => `${age}세`} contentStyle={{ fontSize: 12 }} />
                  <Legend wrapperStyle={{ fontSize: 11 }} />
                  <ReferenceLine y={0} stroke="#94a3b8" />
                  <Bar dataKey="본인 근로"      stackId="a" fill="#10b981" />
                  <Bar dataKey="배우자 근로"    stackId="a" fill="#34d399" />
                  <Bar dataKey="본인 국민연금"  stackId="a" fill="#3b82f6" />
                  <Bar dataKey="배우자 국민연금" stackId="a" fill="#60a5fa" />
                  <Bar dataKey="개인연금 인출"  stackId="a" fill="#8b5cf6" />
                  <Bar dataKey="브릿지 월소득"  stackId="a" fill="#06b6d4" />
                  <Bar dataKey="생활비"        stackId="a" fill="#f59e0b" />
                  <Bar dataKey="양육비"        stackId="a" fill="#a855f7" />
                  <Bar dataKey="대출 상환"      stackId="a" fill="#64748b" />
                  <Bar dataKey="건강보험료"     stackId="a" fill="#ef4444" />
                  <Line type="monotone" dataKey="순현금흐름" stroke="#0f172a" strokeWidth={2} dot={false} />
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* 자동 인사이트 */}
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <h2 className="text-sm font-semibold mb-2">자동 인사이트</h2>
            <ul className="text-sm text-slate-700 space-y-1.5 leading-relaxed">
              <li>• 브릿지 기간 <b>{activeResult.bridgeYears}년</b> 동안 누적 적자: <b className="text-red-600">{fmt만원(activeResult.bridgeShortfall)}</b></li>
              {activeResult.depletionAge ? (
                <li>• <b className="text-red-600">⚠ {activeResult.depletionAge}세 자산소진</b> — 수명({i.selfLifeExpectancy}세)까지 <b>{i.selfLifeExpectancy - activeResult.depletionAge}년</b> 부족</li>
              ) : (
                <li>• <span className="text-emerald-700">✓ 수명({i.selfLifeExpectancy}세)까지 자산이 유지됩니다.</span> 수익률 비관 시나리오에서도 확인 권장.</li>
              )}
              {activeBand.pessimistic.depletionAge && !activeResult.depletionAge && (
                <li>• 비관 시나리오(수익률 −{i.scenarioBandSpread}%p)에서는 <b className="text-amber-600">{activeBand.pessimistic.depletionAge}세 소진</b> — 시장 변동성에 취약합니다.</li>
              )}
              {activeResult.selfNpMonthly > 0 && (
                <li>• 본인 국민연금 예상: <b className="text-blue-700">{fmt만원월(activeResult.selfNpMonthly)}</b>
                  {activeResult.spouseNpMonthly > 0 && <span> / 배우자: <b className="text-blue-500">{fmt만원월(activeResult.spouseNpMonthly)}</b></span>}
                </li>
              )}
              {insights.length > 0 && (
                <li className="pt-2 mt-2 border-t border-slate-100">
                  <div className="text-xs text-slate-500 mb-1.5">▷ 가장 효과적인 개선책 (준비율 변화):</div>
                  <div className="space-y-1">
                    {insights.map(ins => (
                      <div key={ins.key} className="flex items-center justify-between gap-2 text-sm">
                        <span>{ins.label}</span>
                        <div className="flex items-center gap-2 shrink-0">
                          <span className="num text-emerald-600 font-medium">+{Math.round(ins.delta)}%p → {Math.round(ins.newRatio)}%</span>
                          {scenarios.length < 4 && (
                            <button
                              onClick={() => applyInsightAsNewScenario(ins)}
                              className="text-[11px] px-1.5 py-0.5 rounded border border-emerald-200 text-emerald-700 hover:bg-emerald-50 whitespace-nowrap"
                              title="이 조건으로 새 시나리오 추가"
                            >+ 추가</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </li>
              )}
              {scenarios.length > 1 && (
                <li className="pt-2 mt-2 border-t border-slate-100 text-xs text-slate-500">
                  비교 표에서 다른 시나리오와 즉시 대조 가능합니다. <b>+ 시나리오</b>로 최대 4개까지 추가하세요.
                </li>
              )}
            </ul>
          </div>

          <footer className="text-[11px] text-slate-400 pb-8 leading-relaxed">
            ※ 수익률·연봉상승률·주택상승률은 <b>명목 % 입력</b>, 내부적으로 물가상승률 차감 후 실질률로 계산. 차트는 현재가치 기준 표시.
            국민연금은 A값(300만) 단순 추정 — 실제 수령액과 다를 수 있음. 건강보험료/세제는 단순 추정.
            DC는 매년 연봉/12 적립 가정. 퇴직금 일시금은 근속연수 기준 단순 계산 후 6.6% 과세 적용.
            유족연금은 사망 배우자 연금의 50% 단순 가정.
          </footer>
        </section>
      </main>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
