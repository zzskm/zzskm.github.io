// ============================================================
// 세전↔세후 변환 유틸 (입력 UI 레이어 전용 — 시뮬 코어는 net annual 사용)
// ============================================================

function grossToNetAnnual(grossAnnual, tm = ASSUMPTIONS.taxModel) {
  if (!grossAnnual || grossAnnual <= 0) return 0;
  const socialIns = grossAnnual * tm.socialInsuranceRate;
  const taxBase   = Math.max(0, grossAnnual * (1 - tm.earnedIncomeDeductionRate) - socialIns);
  let incomeTax = 0, prev = 0;
  for (const b of tm.incomeBrackets) {
    if (taxBase <= prev) break;
    const slab = Math.min(taxBase, b.upTo) - prev;
    incomeTax += slab * b.rate;
    prev = b.upTo;
    if (taxBase <= b.upTo) break;
  }
  const localTax = incomeTax * tm.localTaxRate;
  return Math.max(0, grossAnnual - socialIns - incomeTax - localTax);
}

function netToGrossAnnual(netAnnual, tm = ASSUMPTIONS.taxModel) {
  if (!netAnnual || netAnnual <= 0) return 0;
  let lo = netAnnual, hi = netAnnual * 2.5;
  for (let iter = 0; iter < 32; iter++) {
    const mid = (lo + hi) / 2;
    (grossToNetAnnual(mid, tm) < netAnnual) ? (lo = mid) : (hi = mid);
  }
  return Math.round((lo + hi) / 2);
}

function basisAnnualToNet(annualInBasis, basis) {
  if (!annualInBasis || annualInBasis <= 0) return 0;
  return basis === "gross" ? grossToNetAnnual(annualInBasis) : annualInBasis;
}
function netToBasisAnnual(netAnnual, basis) {
  if (!netAnnual || netAnnual <= 0) return 0;
  return basis === "gross" ? netToGrossAnnual(netAnnual) : netAnnual;
}

const KR_DEFAULTS = PRESETS.krDefault;
const SCENARIO_COLORS = ["#3b82f6", "#0ea5e9", "#f59e0b", "#8b5cf6"];
const CURRENT_YEAR = new Date().getFullYear();

// ============================================================
// 자동 계산 헬퍼
// ============================================================

// 출생연도 기반 국민연금 개시 나이 (2026년 기준 법정 수급 개시)
function autoPensionStartAge(currentAge) {
  const birthYear = CURRENT_YEAR - currentAge;
  if (birthYear >= 1969) return 65;
  if (birthYear >= 1965) return 64;
  if (birthYear >= 1961) return 63;
  return 62;
}

// 퇴직 나이 기준 자동 가입연수
function autoNpYears(retireAge, policy = ASSUMPTIONS.krPolicy) {
  return Math.min(policy.maxNpYears, Math.max(0, retireAge - policy.contributionStartAge));
}

// 현재 나이 기반 기대수명 (통계청 2024 단순화)
function autoLifeExpectancy(currentAge) {
  if (currentAge <= 30) return 87;
  if (currentAge <= 40) return 86;
  if (currentAge <= 50) return 85;
  if (currentAge <= 60) return 84;
  return 83;
}

// 부부 최대 수명을 본인 나이축으로 환산
function simEndAgeFor(input) {
  const selfLE = input.selfLifeExpectancy ?? 87;
  if (!input.spouseEnabled) return selfLE;
  const offset = (input.spouseCurrentAge ?? input.currentAge) - input.currentAge;
  const spouseLeInSelfAge = (input.spouseLifeExpectancy ?? selfLE) - offset;
  return Math.max(selfLE, spouseLeInSelfAge);
}

// ============================================================
// 계산 헬퍼
// ============================================================

function npYearsFor(input, person, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;
  if (person === "spouse") {
    if (input.spouseNpAutoMode) return Math.min(policy.maxNpYears, Math.max(0, input.spouseRetireAge - policy.contributionStartAge));
    return Math.min(policy.maxNpYears, Math.max(0, input.spouseNpYears));
  }
  // self
  if (input.selfNpAutoMode) return autoNpYears(input.retireAge, policy);
  return Math.min(policy.maxNpYears, Math.max(0, input.selfNpYears));
}

function estimatedPensionMonthlyFor(input, person, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;
  if (person === "spouse") {
    if (input.spouseNpInputMode === "manual") return input.spouseNpManualMonthly ?? 0;
    const salary = input.spouseCurrentSalary ?? 0;
    const avgMonthly = (policy.pensionAValueMonthly + salary / 12) / 2;
    const years = npYearsFor(input, "spouse", assumptions);
    const replacement = years < 10 ? 0 : policy.pensionReplacementRate * (years / policy.maxNpYears);
    return replacement * avgMonthly;
  }
  // self
  if (input.selfNpInputMode === "manual") return input.selfNpManualMonthly ?? 0;
  const avgMonthly = (policy.pensionAValueMonthly + input.selfCurrentSalary / 12) / 2;
  const years = npYearsFor(input, "self", assumptions);
  const replacement = years < 10 ? 0 : policy.pensionReplacementRate * (years / policy.maxNpYears);
  return replacement * avgMonthly;
}

// 하위 호환용 (인사이트 등에서 사용)
function npYears(input, assumptions = ASSUMPTIONS) { return npYearsFor(input, "self", assumptions); }
function estimatedPensionMonthly(input, assumptions = ASSUMPTIONS) { return estimatedPensionMonthlyFor(input, "self", assumptions); }

function ageFactor(age, assumptions = ASSUMPTIONS) {
  return assumptions.lifeCycle.spendingFactors
    .filter(row => age >= row.fromAge)
    .sort((a, b) => b.fromAge - a.fromAge)[0]?.factor ?? 1.0;
}

function childCostAt(age, assumptions = ASSUMPTIONS) {
  if (age < 0) return 0;
  return assumptions.lifeCycle.childMonthlyCosts.find(row =>
    age >= row.minAge && age <= row.maxAge
  )?.amount ?? 0;
}

function childrenOf(input) {
  if (Array.isArray(input.children)) return input.children.filter(c => c && c.birthYear);
  return [input.child1BirthYear, input.child2BirthYear]
    .filter(Boolean)
    .map((birthYear, idx) => ({ id: `legacy-child-${idx + 1}`, birthYear }));
}

function childCostYearly(input, year, assumptions = ASSUMPTIONS) {
  let cost = 0;
  for (const child of childrenOf(input)) {
    cost += childCostAt(year - child.birthYear, assumptions) * 12;
  }
  return cost * (input.childCostMultiplier ?? 1.0);
}

function childEvents(input) {
  const events = [];
  childrenOf(input).forEach((child, i) => {
    const idx = i + 1;
    const parentAgeAt = (childAge) =>
      input.currentAge + ((child.birthYear + childAge) - CURRENT_YEAR);
    events.push({ age: parentAgeAt(19), label: `자녀${idx} 대학` });
    events.push({ age: parentAgeAt(23), label: `자녀${idx} 독립` });
  });
  const endAge = simEndAgeFor(input);
  return events.filter(e => e.age >= input.currentAge && e.age <= endAge);
}

// 연령별 의료비 1인 기준 (만원/월), 의료물가 초과 상승 반영
function medicalCostMonthly(age, yearsFromNow, assumptions = ASSUMPTIONS) {
  const lc = assumptions.lifeCycle;
  const base = [...(lc.medicalMonthlyByAge ?? [])]
    .filter(r => age >= r.fromAge)
    .sort((a, b) => b.fromAge - a.fromAge)[0]?.amount ?? 0;
  const premium = (lc.medicalInflationRealPremium ?? 0) / 100;
  return base * Math.pow(1 + premium, yearsFromNow);
}

// 지역가입자 건보료 단순 추정 (만원/년). 실제 산식과 다름.
function healthInsuranceYearly(financial, house, sideIncomeAnnual, assumptions = ASSUMPTIONS) {
  const hi = assumptions.krPolicy.healthInsurance;
  const base = Math.max(0, sideIncomeAnnual) * hi.sideIncomeRate
             + Math.max(0, financial) * hi.financialAssetRate
             + Math.max(0, house) * hi.houseAssetRate;
  return Math.min(base, hi.annualCap);
}

// ============================================================
// 핵심 시뮬레이션 (v4 — 본인/배우자 분리, 명목→실질 변환)
// ============================================================

function calculateScenario(input, returnRateOverride, assumptions = ASSUMPTIONS) {
  const policy = assumptions.krPolicy;

  // ── 명목 → 실질 변환 ──────────────────────────────────────
  const inflRate = input.inflationRate / 100;
  const toReal = (nomPct) => (1 + nomPct / 100) / (1 + inflRate) - 1;
  // returnRateOverride가 함수이면 연도별 실질수익률 함수; 숫자이면 고정
  const rateFn = typeof returnRateOverride === "function"
    ? returnRateOverride
    : () => toReal(returnRateOverride ?? input.investmentReturnRate);
  const sg = toReal(input.salaryGrowthRate);
  const hg = toReal(input.houseInflationRate);

  // ── 본인/배우자 국민연금 ───────────────────────────────────
  const selfNpMonthly    = estimatedPensionMonthlyFor(input, "self",   assumptions);
  const spouseNpMonthly  = estimatedPensionMonthlyFor(input, "spouse", assumptions);

  // ── 시뮬레이션 종료 나이 (self 기준) ──────────────────────
  const selfLE   = input.selfLifeExpectancy;
  const simEndAge = simEndAgeFor(input);

  // ── 초기 자산 (2-bucket: 저축성 / 투자성) ───────────────────
  let financialSavings     = input.savingsBalance;      // 저축성 (예금·MMF, 스트레스 미적용)
  let financialInvestments = input.investmentBalance;   // 투자성 (DC/IRP·주식·ETF, 스트레스 적용)

  // ── 주거 모드 초기화 (cascade로 변경 가능 — mutable 로컬 변수) ──
  let simHousingMode = input.housingMode ?? "own";
  const isOwn    = () => simHousingMode === "own";
  const isRent   = () => simHousingMode === "monthly_rent";
  const isJeonse = () => simHousingMode === "jeonse";

  let house    = isOwn() ? input.housePrice : 0;
  let mortgage = isOwn() && input.hasMortgage ? input.mortgageBalance : 0;

  // 주거비 (현재가치 기준 real)
  let curMaintenance = input.housingMaintenance ?? 0;   // 만/월
  let curMonthlyRent = input.monthlyRent ?? 0;          // 만/월
  let curDeposit     = input.deposit ?? 0;              // 만원 (보증금)

  // 주거비 인플레이션 파라미터
  const hInfl    = assumptions.housingInflation;
  const hScen    = hInfl.scenarios[input.housingInflationScenario ?? hInfl.defaultScenario] ?? hInfl.scenarios.realistic;
  const hRentReal  = (1 + hScen.rentAnnual)  / (1 + inflRate) - 1;
  const hMaintReal = (1 + hScen.maintAnnual) / (1 + inflRate) - 1;
  const jeonseBumpMid  = (hScen.jeonseBumpRange[0] + hScen.jeonseBumpRange[1]) / 2;
  const jeonseShockMid = hScen.jeonseShockRange ? (hScen.jeonseShockRange[0] + hScen.jeonseShockRange[1]) / 2 : 0;
  // real 2-year equivalent bump
  const jeonseBumpReal  = (1 + jeonseBumpMid)  / Math.pow(1 + inflRate, hInfl.jeonseRenewalYears) - 1;
  const jeonseShockReal = (1 + jeonseShockMid) / (1 + inflRate) - 1;
  let jeonseYearsSinceRenewal = 0;
  let yearsSinceShock = 0;

  let depletionAge = null;
  let bridgeShortfall = 0;
  let totalAssetsAtRetirement = 0;
  let severancePaid = !input.includeSeveranceLumpSum;
  let downsizeDone = false;
  const downsizeEvents = [];
  const years = [];

  // C5: 인출 전략 — 4% SWR 기준값은 퇴직 시점에 확정
  const strategy = input.withdrawalStrategy === "unified" ? "bucket" : (input.withdrawalStrategy ?? "bucket");
  let swrAnnual = 0;   // 4pct 전략용 고정 인출액 (퇴직 시 확정)

  // 유족연금 추적
  let selfSurvivorNpBonus   = 0;  // 배우자 사망 시 본인이 받을 추가 NP
  let spouseSurvivorNpBonus = 0;  // 본인 사망 시 배우자가 받을 추가 NP (계산만)
  let prevSelfAlive  = true;
  let prevSpouseAlive = input.spouseEnabled;

  for (let age = input.currentAge; age <= simEndAge; age++) {
    const t = age - input.currentAge;
    const year = CURRENT_YEAR + t;

    // ── 생존 여부 ──
    const selfAlive   = age <= selfLE;
    const spouseAge   = (input.spouseCurrentAge ?? input.currentAge) + t;
    const spouseAlive = input.spouseEnabled && spouseAge <= input.spouseLifeExpectancy;

    // 유족연금: 배우자가 이번 해에 사망했을 때
    if (prevSpouseAlive && !spouseAlive && selfAlive) {
      selfSurvivorNpBonus = spouseNpMonthly * policy.survivorPensionRatio;
    }
    // 본인이 이번 해에 사망했을 때 (배우자가 받을 몫)
    if (prevSelfAlive && !selfAlive && spouseAlive) {
      spouseSurvivorNpBonus = selfNpMonthly * policy.survivorPensionRatio;
    }
    prevSelfAlive  = selfAlive;
    prevSpouseAlive = spouseAlive;

    // ── 근로 소득 ──
    const selfIsWorking   = selfAlive && age < input.retireAge;
    const spouseIsWorking = spouseAlive && spouseAge < (input.spouseRetireAge ?? 75);

    const selfSalaryAnnual   = selfIsWorking   ? input.selfCurrentSalary   * Math.pow(1 + sg, t) : 0;
    const spouseSalaryAnnual = spouseIsWorking ? (input.spouseCurrentSalary ?? 0) * Math.pow(1 + sg, t) : 0;

    // ── DC 적립 (본인 근로기만) ──
    const dcContribAnnual = selfIsWorking
      ? selfSalaryAnnual / assumptions.assetRules.dcAnnualContributionSalaryDivisor : 0;

    // ── 국민연금 (세후) ──
    const selfIsPension   = selfAlive   && age       >= input.selfPensionStartAge;
    const spouseIsPension = spouseAlive && spouseAge >= (input.spousePensionStartAge ?? 65);

    let selfPensionAnnual   = selfIsPension   ? (selfNpMonthly   + (selfAlive ? selfSurvivorNpBonus : 0))  * 12 : 0;
    let spousePensionAnnual = spouseIsPension ? (spouseNpMonthly + spouseSurvivorNpBonus) * 12 : 0;

    // ── 브릿지 소득 (본인 퇴직 후, 연금 개시 전) ──
    const selfIsRetired = selfAlive && !selfIsWorking;
    const selfIsBridge  = selfIsRetired && !selfIsPension;
    const bridgeSideAnnual = selfIsBridge ? input.postRetireSideIncome * 12 : 0;

    // ── 생활비 ──
    const isAnyoneAlive = selfAlive || spouseAlive;
    const baseLivingMonthly = selfIsWorking
      ? input.workingLivingCost
      : selfIsBridge
        ? input.bridgeLivingCost
        : input.retirementLivingCost;
    // 본인 사망 후에도 배우자 생존 시 생활비는 0.7배로 단순화
    const livingScale = (!selfAlive && spouseAlive) ? 0.7 : 1.0;
    const livingAnnual = isAnyoneAlive
      ? baseLivingMonthly * 12 * ageFactor(age, assumptions) * livingScale : 0;

    const childAnnual = isAnyoneAlive ? childCostYearly(input, year, assumptions) : 0;

    // ── 대출 상환 (자가 모드만) ──
    const mortgagePaid = (isOwn() && input.hasMortgage)
      ? Math.min(mortgage, input.monthlyMortgagePayment * 12) : 0;
    mortgage = Math.max(0, mortgage - mortgagePaid);

    // ── 추가저축 (본인 근로기만) ──
    const extraSavingAnnual = selfIsWorking ? input.monthlyAddSaving * 12 : 0;

    // ── 주거비 인플레이션 동학 ──
    const elderlyBonus = (age >= hInfl.elderlyAge) ? hInfl.elderlyExtraRate : 0;

    // 관리비: 모든 모드, 실질 성장
    curMaintenance *= (1 + hMaintReal + elderlyBonus);

    // 월세: 실질 성장
    if (isRent()) {
      curMonthlyRent *= (1 + hRentReal + elderlyBonus);
    }

    // 전세: 2년 주기 보증금 점프 + 충격
    let jeonseTopUpAnnual = 0;
    if (isJeonse()) {
      jeonseYearsSinceRenewal++;
      if (jeonseYearsSinceRenewal >= hInfl.jeonseRenewalYears) {
        const bump = curDeposit * (jeonseBumpReal + elderlyBonus * hInfl.jeonseRenewalYears);
        curDeposit += bump;
        jeonseTopUpAnnual += bump;
        jeonseYearsSinceRenewal = 0;
      }
      yearsSinceShock++;
      if (hScen.jeonseShockYears && yearsSinceShock >= hScen.jeonseShockYears) {
        const shock = curDeposit * jeonseShockReal;
        curDeposit += shock;
        jeonseTopUpAnnual += shock;
        yearsSinceShock = 0;
      }
    }

    // ── 건강보험료 (퇴직 후) ──
    const sideIncomeForHI = bridgeSideAnnual + spouseSalaryAnnual;
    const healthInsAnnual = (selfIsRetired && input.applyHealthInsurance)
      ? healthInsuranceYearly(financialSavings + financialInvestments, house, sideIncomeForHI, assumptions)
      : 0;

    // ── 노년기 의료비 ──
    const selfMedical   = selfAlive   ? medicalCostMonthly(age,      t, assumptions) * 12 : 0;
    const spouseMedical = spouseAlive ? medicalCostMonthly(spouseAge, t, assumptions) * 12 : 0;
    const medicalAnnual = (input.applyMedicalCost !== false)
      ? (selfMedical + spouseMedical) * (input.medicalCostMultiplier ?? 1.0) : 0;

    // ── 퇴직금 일시금 ──
    if (!severancePaid && age === input.retireAge && selfAlive) {
      const yearsWorked = Math.max(0, input.retireAge - policy.contributionStartAge);
      const grossSeverance = (input.selfCurrentSalary / 12) * yearsWorked;
      // 퇴직소득세 단순 적용 (근속연수공제 후 6.6% 단순 가정)
      const severanceTax = grossSeverance * 0.066;
      financialSavings += grossSeverance - severanceTax;
      severancePaid = true;
    }

    // ── 수동 다운사이징 (자가 모드만) ──
    if (!downsizeDone && isOwn() && input.downsizeEnabled && age === input.downsizeAge) {
      const liquidated = house * (1 - input.downsizeRatio);
      financialSavings += liquidated;
      house = house * input.downsizeRatio;
      downsizeDone = true;
      downsizeEvents.push({ age, label: "주택 다운사이징", liquidated });
    }

    // ── 주거비 집계 ──
    const maintAnnual = isAnyoneAlive ? curMaintenance * 12 : 0;
    const rentAnnual  = (isAnyoneAlive && isRent()) ? curMonthlyRent * 12 : 0;

    // ── 현금흐름 집계 ──
    const income = selfSalaryAnnual + spouseSalaryAnnual + selfPensionAnnual + spousePensionAnnual
                 + bridgeSideAnnual;
    const outflow = livingAnnual + childAnnual + mortgagePaid + healthInsAnnual + medicalAnnual
                  + maintAnnual + rentAnnual + jeonseTopUpAnnual;
    const cashflowExclSaving = income - outflow;
    const cashflowWithSaving = cashflowExclSaving - extraSavingAnnual;

    // ── 자산 운용 (C5: 인출 전략 분기, 2-bucket) ──
    const rInv = rateFn(age);                          // 투자성 — 스트레스 적용
    const rSav = toReal(input.savingsReturnRate);      // 저축성 — 스트레스 미적용, 고정

    // 먼저 모든 버킷에 수익률 적용
    financialInvestments = financialInvestments * (1 + rInv) + dcContribAnnual;
    financialSavings     = financialSavings     * (1 + rSav);
    house = isOwn() ? house * (1 + hg) : 0;

    // 퇴직 시점 4pct SWR 기준값 확정
    if (strategy === "4pct" && age === input.retireAge) {
      swrAnnual = (financialSavings + financialInvestments) * 0.04;
    }

    // 2-bucket 인출 헬퍼: 저축성 → 투자성 순으로 deficit 충당
    function withdrawFromBuckets(deficit) {
      const fromSav = Math.min(Math.max(0, financialSavings), deficit);
      financialSavings -= fromSav;
      const rem = deficit - fromSav;
      if (rem > 0) {
        const fromInv = Math.min(Math.max(0, financialInvestments), rem);
        financialInvestments -= fromInv;
        const leftover = rem - fromInv;
        if (leftover > 0) financialSavings -= leftover; // 음수로 소진 감지
      }
    }

    // 전략별 현금흐름 적용
    if (strategy === "bucket") {
      // Bucket: 잉여 → 저축성, 부족 → 저축성 → 투자성 순 인출
      const net = extraSavingAnnual + cashflowExclSaving;
      if (net >= 0) {
        financialSavings += net;
      } else {
        withdrawFromBuckets(-net);
      }

    } else if (strategy === "4pct") {
      // 4% 룰: 퇴직 후 매년 swrAnnual 인출. 근로기는 bucket과 동일
      if (age < input.retireAge) {
        financialSavings += extraSavingAnnual + cashflowExclSaving;
      } else {
        const totalFinancial = financialSavings + financialInvestments;
        const netNeed = Math.max(0, outflow - income);
        const actualWithdrawal = Math.min(Math.max(netNeed, swrAnnual), totalFinancial);
        withdrawFromBuckets(actualWithdrawal);
        // 잉여 소득은 저축성에 추가
        const surplusIncome = Math.max(0, income - outflow);
        financialSavings += extraSavingAnnual + surplusIncome;
      }

    } else if (strategy === "vpw") {
      // VPW: 잔여 기대연수 기반 비율 인출
      financialSavings += extraSavingAnnual;
      if (age >= input.retireAge) {
        const remaining = Math.max(1, simEndAge - age);
        const vpwRate = rInv > 0.0001
          ? rInv / (1 - Math.pow(1 + rInv, -remaining))
          : 1 / remaining;
        const totalFinancial = financialSavings + financialInvestments;
        const actualNeed = Math.max(0, outflow - income);
        const withdrawal = Math.max(actualNeed, Math.min(vpwRate * totalFinancial, totalFinancial));
        const net = income - outflow;
        if (net >= 0) {
          financialSavings += net;
        } else {
          withdrawFromBuckets(-net);
        }
      } else {
        financialSavings += cashflowExclSaving;
      }

    } else {
      // fallback: unified
      financialSavings += extraSavingAnnual + cashflowExclSaving;
    }

    const financialTotal = financialSavings + financialInvestments;

    // ── 자동 주거 다운그레이드 cascade (퇴직 후, 금융자산 임계값 미만) ──
    const THRESHOLD = assumptions.assetRules.housingLiquidationThreshold;
    if (age >= input.retireAge) {
      // Step 1: 자가 → 전세
      if (isOwn() && house > 0 && financialTotal < THRESHOLD) {
        const houseAfterMortgage = Math.max(0, house - mortgage);
        const newDeposit = houseAfterMortgage * 0.7;
        const cashOut    = houseAfterMortgage * 0.3;
        curDeposit = newDeposit;
        financialSavings += cashOut;
        house = 0; mortgage = 0;
        simHousingMode = "jeonse";
        jeonseYearsSinceRenewal = 0; yearsSinceShock = 0;
        downsizeEvents.push({ age, label: "자가→전세 전환 (자동)", liquidated: cashOut, deposit: newDeposit });
      }
      // Step 2: 전세 → 월세
      const financialTotalPostCascade1 = financialSavings + financialInvestments;
      if (isJeonse() && curDeposit > 0 && financialTotalPostCascade1 < THRESHOLD) {
        const fallbackDeposit = assumptions.assetRules.fallbackDepositOnRent;
        const remainDeposit = Math.min(curDeposit, fallbackDeposit);
        const recovered = curDeposit - remainDeposit;
        curDeposit = remainDeposit;
        financialSavings += recovered;
        simHousingMode = "monthly_rent";
        if (!curMonthlyRent || curMonthlyRent <= 0) {
          curMonthlyRent = assumptions.assetRules.fallbackMonthlyRent;
        }
        downsizeEvents.push({ age, label: "전세→월세 전환 (자동)", liquidated: recovered, depositRemaining: remainDeposit });
      }
    }

    const financialTotalFinal = financialSavings + financialInvestments;
    const netWorth = financialTotalFinal + house - mortgage + curDeposit;

    if (financialTotalFinal <= 0 && depletionAge === null && age >= input.retireAge) {
      depletionAge = age;
    }

    if (selfIsBridge && cashflowExclSaving < 0) bridgeShortfall += -cashflowExclSaving;
    if (age === input.retireAge) totalAssetsAtRetirement = financialTotalFinal;

    years.push({
      age, year,
      phase: selfIsWorking ? "work" : selfIsBridge ? "bridge" : "pension",
      selfAlive, spouseAlive,
      financialSavings: Math.round(financialSavings),
      financialInvestments: Math.round(financialInvestments),
      financialAssets: Math.round(financialTotalFinal),
      houseValue: Math.round(house),
      mortgage: Math.round(mortgage),
      deposit: Math.round(curDeposit),
      housingMode: simHousingMode,
      netWorth: Math.round(netWorth),
      maintMonthly:  Math.round(curMaintenance),
      rentMonthly:   Math.round(isRent() ? curMonthlyRent : 0),
      selfSalaryMonthly:    Math.round(selfSalaryAnnual   / 12),
      spouseSalaryMonthly:  Math.round(spouseSalaryAnnual / 12),
      selfPensionMonthly:   Math.round(selfPensionAnnual  / 12),
      spousePensionMonthly: Math.round(spousePensionAnnual / 12),
      bridgeSideMonthly:    Math.round(bridgeSideAnnual   / 12),
      livingMonthly:        Math.round(livingAnnual       / 12),
      childMonthly:         Math.round(childAnnual        / 12),
      mortgageMonthly:      Math.round(mortgagePaid       / 12),
      healthInsMonthly:     Math.round(healthInsAnnual    / 12),
      medicalMonthly:       Math.round(medicalAnnual      / 12),
      maintMonthlyOut:      Math.round(maintAnnual        / 12),
      rentMonthlyOut:       Math.round((rentAnnual + jeonseTopUpAnnual) / 12),
      extraSavingMonthly:   Math.round(extraSavingAnnual / 12),
      cashflowMonthly:      Math.round(cashflowWithSaving / 12),
    });
  }

  const bridgeYears = Math.max(0, input.selfPensionStartAge - input.retireAge);

  let readinessRatio;
  if (depletionAge === null) {
    const last = years[years.length - 1];
    const margin = Math.max(0, last.financialAssets);
    readinessRatio = Math.min(assumptions.assetRules.readinessMaxRatio,
      100 + (totalAssetsAtRetirement > 0 ? (margin / totalAssetsAtRetirement) * 100 : 0));
  } else {
    const survived = depletionAge - input.retireAge;
    const need = simEndAge - input.retireAge;  // 부부 최대 수명 기준
    readinessRatio = need > 0 ? (survived / need) * 100 : 0;
  }

  const lastYear = years[years.length - 1] || {};

  return {
    yearlyAssetFlow: years,
    assetBucketsAtEnd: {
      savings:        lastYear.financialSavings     ?? 0,
      investments:    lastYear.financialInvestments ?? 0,
      totalFinancial: lastYear.financialAssets      ?? 0,
    },
    bridgeYears,
    bridgeShortfall:        Math.round(bridgeShortfall),
    totalAssetsAtRetirement: Math.round(totalAssetsAtRetirement),
    selfNpMonthly:    Math.round(selfNpMonthly),
    spouseNpMonthly:  Math.round(spouseNpMonthly),
    readinessRatio: Math.round(readinessRatio),
    depletionAge,
    simEndAge,
    childEventList: childEvents(input),
    downsizeEvents,
    assumptionVersion: assumptions.version,
  };
}

// C1: 시퀀스 리스크 프리셋 정의
// ============================================================

const STRESS_PRESETS = {
  none:   { label: "없음",              color: "none" },
  mild:   { label: "경미 (-5%p, 3년)", color: "#f59e0b",
            desc: "퇴직 직후 3년간 수익률 -5%p. 2001년 닷컴 버블 붕괴 수준." },
  severe: { label: "중간 (-10%p, 5년)", color: "#ef4444",
            desc: "퇴직 직후 5년간 수익률 -10%p. 2008년 금융위기 장기 침체 수준." },
  "2008": { label: "2008 (−30%, 회복)", color: "#7c3aed",
            desc: "첫해 -30%p 폭락 후 2년간 +10%p 반등, 이후 정상. 최악의 시나리오." },
};

// 스트레스 프리셋을 age → realRate 함수로 변환
function buildStressRateFn(stressKey, r, retireAge, inflRate) {
  const baseReal  = (1 + r / 100) / (1 + inflRate) - 1;
  if (!stressKey || stressKey === "none") return () => baseReal;

  if (stressKey === "mild") {
    const shockReal = (1 + Math.max(-30, r - 5) / 100) / (1 + inflRate) - 1;
    return (age) => (age >= retireAge && age < retireAge + 3) ? shockReal : baseReal;
  }
  if (stressKey === "severe") {
    const shockReal = (1 + Math.max(-30, r - 10) / 100) / (1 + inflRate) - 1;
    return (age) => (age >= retireAge && age < retireAge + 5) ? shockReal : baseReal;
  }
  if (stressKey === "2008") {
    const crashReal   = (1 + Math.max(-50, r - 30) / 100) / (1 + inflRate) - 1;
    const recovReal   = (1 + (r + 10) / 100) / (1 + inflRate) - 1;
    return (age) => {
      if (age === retireAge)                          return crashReal;   // 첫해 폭락
      if (age > retireAge && age <= retireAge + 2)   return recovReal;   // 2년 반등
      return baseReal;
    };
  }
  return () => baseReal;
}

// 수익률 밴드 (명목 % 기준)
function runScenarioBand(input, assumptions = ASSUMPTIONS) {
  const r = input.investmentReturnRate;
  const s = input.scenarioBandSpread;
  const inflRate = input.inflationRate / 100;

  // C1: 선택된 stressTest 프리셋으로 sequenceShock 계산
  const stressKey = input.stressTest ?? "severe";
  const stressRateFn = buildStressRateFn(stressKey, r, input.retireAge, inflRate);
  const hasStress = stressKey !== "none";

  return {
    pessimistic:    calculateScenario(input, r - s, assumptions),
    mid:            calculateScenario(input, r,     assumptions),
    optimistic:     calculateScenario(input, r + s, assumptions),
    sequenceShock:  hasStress
      ? calculateScenario(input, stressRateFn, assumptions)
      : null,
    stressKey,  // UI에서 라벨 표시용
  };
}

function validateInput(input) {
  const warnings = [];
  if (input.retireAge <= input.currentAge)
    warnings.push({ key: "retire_age", level: "error", msg: `퇴직 나이(${input.retireAge}세)가 현재 나이(${input.currentAge}세) 이하입니다.` });
  if (input.selfPensionStartAge <= input.retireAge)
    warnings.push({ key: "pension_start", level: "warn", msg: `국민연금 개시(${input.selfPensionStartAge}세)가 퇴직(${input.retireAge}세) 이전 또는 동시입니다. 브릿지 기간이 0이 됩니다.` });
  if (input.selfLifeExpectancy <= input.retireAge)
    warnings.push({ key: "life_exp", level: "error", msg: `기대수명(${input.selfLifeExpectancy}세)이 퇴직 나이(${input.retireAge}세) 이하입니다.` });
  if (input.housingMode === "own" && input.hasMortgage && input.mortgageBalance > 0 && input.monthlyMortgagePayment <= 0)
    warnings.push({ key: "mortgage", level: "warn", msg: "대출 잔액이 있으나 월 원리금이 0입니다. 대출이 상환되지 않습니다." });
  if ((input.investmentBalance + input.savingsBalance) <= 0 && input.selfCurrentSalary <= 0)
    warnings.push({ key: "no_asset", level: "warn", msg: "금융자산과 소득이 모두 0입니다. 자산 항목을 확인해주세요." });
  if (input.investmentReturnRate > 0 && input.inflationRate >= input.investmentReturnRate)
    warnings.push({ key: "real_return", level: "warn", msg: `물가상승률(${input.inflationRate}%)이 투자수익률(${input.investmentReturnRate}%)보다 높습니다. 투자수익이 물가를 따라가지 못합니다.` });
  if (input.spouseEnabled && input.spouseCurrentAge != null && input.spouseLifeExpectancy != null
      && input.spouseLifeExpectancy <= input.spouseCurrentAge)
    warnings.push({ key: "spouse_life", level: "error", msg: `배우자 기대수명(${input.spouseLifeExpectancy}세)이 현재 나이(${input.spouseCurrentAge}세) 이하입니다.` });
  // 생활비 대비 소득 비율 검증
  const retireMonthlyIncome = (input.postRetireSideIncome ?? 0);
  if (input.retirementLivingCost > 0 && retireMonthlyIncome > 0
      && input.retirementLivingCost > retireMonthlyIncome * 3)
    warnings.push({ key: "living_income_ratio", level: "warn", msg: `은퇴 생활비(${input.retirementLivingCost}만/월)가 브릿지 소득(${retireMonthlyIncome}만/월)의 3배를 초과합니다. 자산 인출이 빠를 수 있습니다.` });
  // 자가 모드: 대출 잔액 > 주택 가치 경고
  if (input.housingMode === "own" && input.hasMortgage
      && input.mortgageBalance > 0 && input.housePrice > 0
      && input.mortgageBalance > input.housePrice * 0.9)
    warnings.push({ key: "mortgage_ratio", level: "warn", msg: `대출 잔액(${(input.mortgageBalance/10000).toFixed(1)}억)이 주택 시세(${(input.housePrice/10000).toFixed(1)}억)의 90%를 초과합니다.` });
  // 전세/월세 모드: 보증금이 0인 경우
  if ((input.housingMode === "jeonse" || input.housingMode === "monthly_rent")
      && (input.deposit ?? 0) === 0 && input.housingMode === "jeonse")
    warnings.push({ key: "jeonse_no_deposit", level: "warn", msg: "전세 모드인데 보증금이 0입니다. 보증금을 입력해주세요." });
  return warnings;
}

function findBestInsights(input, baseResult) {
  const baseR = baseResult.readinessRatio;
  const results = INSIGHT_CANDIDATES.map(c => {
    const patched = { ...input, ...c.patch(input) };
    const r = calculateScenario(patched, undefined, ASSUMPTIONS).readinessRatio;
    return { key: c.key, label: c.label, why: c.why, delta: r - baseR, newRatio: r, patch: c.patch };
  });
  return results.filter(r => r.delta > 0.5).slice(0, 3);
}

// ±버튼 장누름 연속 증감 헬퍼
function useHoldRepeat(action, { initialDelay = 500, intervalMs = 80 } = {}) {
  const timeoutRef = useRef(null);
  const intervalRef = useRef(null);
  const actionRef = useRef(action);
  useEffect(() => { actionRef.current = action; }, [action]);
  const stop = () => {
    if (timeoutRef.current) { clearTimeout(timeoutRef.current); timeoutRef.current = null; }
    if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
  };
  const start = () => {
    stop();
    actionRef.current();
    timeoutRef.current = setTimeout(() => {
      intervalRef.current = setInterval(() => actionRef.current(), intervalMs);
    }, initialDelay);
  };
  useEffect(() => stop, []);
  return { start, stop };
}

function Slider({ label, value, min, max, step, onChange, format, hint, changed, showAnnual }) {
  const [draft, setDraft] = useState(String(value));
  const [focused, setFocused] = useState(false);
  const numericValue = Number(value);
  const effectiveMin = Number.isFinite(numericValue) ? Math.min(min, numericValue) : min;
  const effectiveMax = Number.isFinite(numericValue) ? Math.max(max, numericValue) : max;

  // 외부 value 변화 시 draft 동기화 (편집 중이 아닐 때)
  useEffect(() => { if (!focused) setDraft(String(value)); }, [value, focused]);

  // step의 소수 자릿수 산출 (부동소수 오차 방지)
  const stepDecimals = (() => {
    const s = String(step);
    const i = s.indexOf(".");
    return i >= 0 ? s.length - i - 1 : 0;
  })();
  const clamp = (n) => Math.min(max, Math.max(min, n));
  const round = (n) => Number(n.toFixed(stepDecimals));

  const commit = () => {
    setFocused(false);
    const n = Number(draft);
    if (isNaN(n)) { setDraft(String(value)); return; }
    const next = clamp(round(n));
    if (next !== numericValue) onChange(next);
    else setDraft(String(next));
  };
  const bump = (delta) => {
    const next = clamp(round(numericValue + delta));
    if (next !== numericValue) onChange(next);
  };
  const dec = useHoldRepeat(() => bump(-step));
  const inc = useHoldRepeat(() => bump(+step));

  const atMin = numericValue <= min;
  const atMax = numericValue >= max;
  const display = format ? format(value) : null;

  const btnClass = "w-8 h-8 shrink-0 rounded-md border border-slate-300 text-slate-700 text-base leading-none flex items-center justify-center bg-white hover:bg-slate-50 active:bg-slate-100 disabled:opacity-30 disabled:cursor-not-allowed select-none touch-manipulation";

  return (
    <div className="mb-3">
      <div className="flex items-baseline justify-between mb-1 gap-2">
        <label className={`text-xs truncate ${changed ? "text-slate-900 font-medium" : "text-slate-600"}`}>
          {label}{changed && <span className="ml-1 text-[9px] text-amber-500 font-semibold align-middle">●</span>}
        </label>
        {display != null && (
          <span className={`text-xs num shrink-0 ${changed ? "text-amber-700 font-medium" : "text-slate-500"}`}>{display}</span>
        )}
      </div>
      <div className="flex items-center gap-1.5 mb-1.5">
        <button
          type="button"
          disabled={atMin}
          onPointerDown={(e) => { e.preventDefault(); dec.start(); }}
          onPointerUp={dec.stop}
          onPointerLeave={dec.stop}
          onPointerCancel={dec.stop}
          className={btnClass}
          aria-label="감소"
        >−</button>
        <input
          type="number"
          value={draft}
          step={step}
          min={min}
          max={max}
          inputMode="decimal"
          onFocus={(e) => { setFocused(true); e.currentTarget.select(); }}
          onChange={e => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e => {
            if (e.key === "Enter") { e.currentTarget.blur(); }
            else if (e.key === "Escape") { setDraft(String(value)); e.currentTarget.blur(); }
          }}
          className="num text-sm font-medium flex-1 min-w-0 px-2 py-1.5 border border-slate-300 rounded text-right bg-white focus:outline-none focus:border-slate-500"
        />
        <button
          type="button"
          disabled={atMax}
          onPointerDown={(e) => { e.preventDefault(); inc.start(); }}
          onPointerUp={inc.stop}
          onPointerLeave={inc.stop}
          onPointerCancel={inc.stop}
          className={btnClass}
          aria-label="증가"
        >+</button>
      </div>
      <input
        type="range"
        min={effectiveMin} max={effectiveMax} step={step}
        value={value}
        onChange={e => onChange(Number(e.target.value))}
        className="w-full"
      />
      {hint && <p className="text-[10px] text-slate-400 mt-0.5">{hint}</p>}
      {showAnnual && Number(value) > 0 && (
        <p className="text-[10px] text-slate-400 mt-0.5">연 {Math.round(Number(value) * 12).toLocaleString()}만원</p>
      )}
    </div>
  );
}

function readinessColor(ratio) {
  if (ratio < 80) return "red";
  if (ratio < 110) return "amber";
  if (ratio < 150) return "green";
  return "blue";
}
function readinessLabel(ratio) {
  if (ratio < 80) return "위험";
  if (ratio < 110) return "경계";
  if (ratio < 150) return "안정";
  return "매우 안정";
}

// ============================================================
// Verdict 시스템 — 결론·진단의 공통 기반
// ============================================================

function getVerdict(result) {
  if (!result.depletionAge) {
    const margin = result.assetBucketsAtEnd?.totalFinancial ?? 0;
    if (margin > 50000) return { icon: "\u{1F389}", text: "잔존 자산 여유 큼",     tone: "emerald", weight: "strong" };
    if (margin > 10000) return { icon: "✓",    text: "안정적으로 유지 가능",  tone: "emerald", weight: "ok" };
    return                       { icon: "✓",    text: "겨우 유지",            tone: "amber",   weight: "tight" };
  }
  const shortage = result.simEndAge - result.depletionAge;
  if (shortage > 15) return     { icon: "⚠⚠", text: `${result.depletionAge}세 큰 폭 부족`, tone: "red",   weight: "critical" };
  if (shortage > 5)  return     { icon: "⚠",       text: `${result.depletionAge}세 자산 고갈`,  tone: "red",   weight: "warn"     };
  return                          { icon: "⚠",       text: `${result.depletionAge}세 막바지 부족`, tone: "amber", weight: "marginal" };
}

function diagnoseRootCause(input, result) {
  if (!result.depletionAge) return null;
  if (result.bridgeShortfall > result.totalAssetsAtRetirement * 0.5)
    return `브릿지 기간 ${result.bridgeYears}년 동안 자산을 ${fmt만원(result.bridgeShortfall)} 인출`;
  if (input.medicalCostMultiplier >= 1.5)
    return "노년기 의료비 부담이 큼 (배율 ≥1.5×)";
  if ((input.investmentReturnRate ?? 0) - (input.inflationRate ?? 0) < 1)
    return "실질 투자수익률이 1%p 미만";
  if (input.children?.length >= 3)
    return "다자녀 양육·교육비 부담";
  if (input.housingMode !== "own" && (input.monthlyRent ?? 0) > 0)
    return "월세 부담이 지속됨";
  return "전반적 소득 대비 지출 균형 부족";
}

function ResultBanner({ input, result, npMonthly }) {
  const v = getVerdict(result);
  const cause = diagnoseRootCause(input, result);
  const toneMap = {
    emerald: "bg-emerald-50 border-emerald-200 text-emerald-700",
    amber:   "bg-amber-50 border-amber-200 text-amber-700",
    red:     "bg-red-50 border-red-200 text-red-700",
  };
  const toneClass = toneMap[v.tone] || toneMap.amber;
  const parts = toneClass.split(" ");
  return (
    <div className={`rounded-xl border p-4 ${parts[0]} ${parts[1]}`}>
      <div className="flex items-baseline gap-3 flex-wrap">
        <div className="text-3xl font-bold num">{result.readinessRatio}%</div>
        <div className={`text-sm font-semibold ${parts[2]}`}>{v.icon} {v.text}</div>
      </div>
      <div className="mt-1 text-xs text-slate-600">
        본인 국민연금 {fmt만원월(npMonthly)} · 시뮬 종료 {result.simEndAge}세
      </div>
      {cause && (
        <div className="mt-2 text-xs text-slate-700 border-t border-slate-200 pt-2">
          <span className="font-medium">주된 원인:</span> {cause}
        </div>
      )}
    </div>
  );
}

          {num("monthlyMortgagePayment", "월 원리금", 0, 500, 10, "만/월")}
        </>}
      </>}
      {/* 전세 전용 */}
      {draft.housingMode === "jeonse" && num("deposit", "전세 보증금", 0, 200000, 1000, "만원")}
      {/* 월세 전용 */}
      {draft.housingMode === "monthly_rent" && <>
        {num("deposit", "보증금", 0, 100000, 1000, "만원")}
        {num("monthlyRent", "월세", 0, 300, 5, "만/월")}
      </>}
      {/* 공통: 관리비 */}
      {num("housingMaintenance", "월 관리비 (공통)", 0, 100, 1, "만/월")}
    </div>,
    // 4: 생활비·시장
    <div key="step4">
      <p className="text-sm text-slate-500 mb-4">은퇴 후 생활비와 시장 가정을 설정하세요.</p>
      {num("bridgeLivingCost", "브릿지 기간 월 생활비", 50, 800, 10, "만/월")}
      {num("retirementLivingCost", "연금 수령기 월 생활비", 50, 600, 10, "만/월")}
      {num("investmentReturnRate", "투자수익률", 0, 12, 0.5, "%")}
      {num("inflationRate", "물가상승률 (기준)", 0, 8, 0.5, "%")}
    </div>,
  ];

  const isLast = step === WIZARD_STEPS.length - 1;

  const handleComplete = () => {
    // 자녀 배열 생성 (사용자가 직접 입력한 현재 나이 기반)
    const children = Array.from({ length: draft.childCount }, (_, idx) => ({
      id: `child-${idx + 1}`,
      birthYear: CURRENT_YEAR - (draft.childAges?.[idx] ?? 10),
    }));
    const result = {
      ...KR_DEFAULTS,
      currentAge: draft.currentAge,
      retireAge:  draft.retireAge,
      selfLifeExpectancy:  autoLifeExpectancy(draft.currentAge),
      selfPensionStartAge: autoPensionStartAge(draft.currentAge),
      selfCurrentSalary:   draft.selfCurrentSalary,
      selfSalaryBasis:     draft.selfSalaryBasis ?? "gross",
      spouseEnabled:       draft.spouseEnabled,
      spouseCurrentAge:    draft.spouseCurrentAge,
      spouseRetireAge:     draft.spouseRetireAge,
      spouseLifeExpectancy:  autoLifeExpectancy(draft.spouseCurrentAge),
      spousePensionStartAge: autoPensionStartAge(draft.spouseCurrentAge),
      spouseCurrentSalary: draft.spouseCurrentSalary,
      spouseSalaryBasis:   draft.spouseSalaryBasis ?? "gross",
      savingsBalance:      draft.savingsBalance,
      investmentBalance:   draft.investmentBalance,
      housingMode:         draft.housingMode ?? "own",
      housingMaintenance:  draft.housingMaintenance ?? 20,
      housePrice:          draft.housingMode === "own" ? draft.housePrice : 0,
      hasMortgage:         draft.housingMode === "own" && draft.hasMortgage,
      mortgageBalance:     draft.housingMode === "own" && draft.hasMortgage ? draft.mortgageBalance : 0,
      monthlyMortgagePayment: draft.housingMode === "own" && draft.hasMortgage ? draft.monthlyMortgagePayment : 0,
      deposit:             draft.housingMode !== "own" ? (draft.deposit ?? 0) : 0,
      monthlyRent:         draft.housingMode === "monthly_rent" ? (draft.monthlyRent ?? 0) : 0,
      bridgeLivingCost:    draft.bridgeLivingCost,
      retirementLivingCost: draft.retirementLivingCost,
      investmentReturnRate: draft.investmentReturnRate,
      inflationRate:        draft.inflationRate,
      children,
    };
    onComplete(result);
  };

  return (
    <div className="wizard-overlay">
      <div className="wizard-card" role="dialog" aria-modal="true" aria-labelledby="wizard-title">
        {/* 헤더 */}
        <div className="flex items-center justify-between mb-5">
          <div>
            <h2 id="wizard-title" className="text-base font-semibold">빠른 설정 마법사</h2>
            <p className="text-xs text-slate-400">{step + 1} / {WIZARD_STEPS.length} 단계 — {WIZARD_STEPS[step]}</p>
          </div>
          <button onClick={onClose} aria-label="빠른 설정 닫기" className="text-slate-400 hover:text-slate-700 text-lg leading-none">×</button>
        </div>
        {/* 진행 바 */}
        <div className="flex gap-1 mb-5">
          {WIZARD_STEPS.map((s, i) => (
            <div key={s} className={`h-1 flex-1 rounded-full transition-all ${i <= step ? 'bg-slate-900' : 'bg-slate-200'}`} />
          ))}
        </div>
        {/* 내용 */}
        {steps[step]}
        {/* 버튼 */}
        <div className="flex justify-between mt-5 pt-4 border-t border-slate-100">
          <button
            onClick={() => step > 0 ? setStep(s => s - 1) : onClose()}
            className="px-4 py-2 text-sm rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50"
          >{step === 0 ? "건너뛰기" : "이전"}</button>
          <button
            onClick={() => isLast ? handleComplete() : setStep(s => s + 1)}
            className="px-5 py-2 text-sm rounded-lg bg-slate-900 text-white font-medium hover:bg-slate-700"
          >{isLast ? "완료" : "다음"}</button>
        </div>
      </div>
    </div>
  );
}

const LS_KEY = "retirement-sim-v5";
const LEGACY_LS_KEYS = ["retirement-sim-v4", "retirement-sim-v3-stepwise", "retirement-sim-v2"];

function uid() { return Math.random().toString(36).slice(2, 9); }

function normalizeInput(raw = {}) {
  const legacyChildren = [raw.child1BirthYear, raw.child2BirthYear]
    .filter(Boolean)
    .map((birthYear, idx) => ({ id: `legacy-child-${idx + 1}`, birthYear }));
  const children = Array.isArray(raw.children)
    ? raw.children.filter(c => c && c.birthYear).slice(0, 5).map((c, idx) => ({
        id: c.id || `child-${idx + 1}`,
        birthYear: Number(c.birthYear),
      }))
    : legacyChildren;

  // v3 → v4 마이그레이션: 단일 필드 → 본인/배우자 분리
  const selfCurrentSalary  = raw.selfCurrentSalary  ?? raw.currentSalary       ?? KR_DEFAULTS.selfCurrentSalary;
  const selfLifeExpectancy = raw.selfLifeExpectancy  ?? raw.lifeExpectancy      ?? autoLifeExpectancy(raw.currentAge ?? KR_DEFAULTS.currentAge);
  const selfPensionStartAge = raw.selfPensionStartAge ?? raw.pensionStartAge    ?? autoPensionStartAge(raw.currentAge ?? KR_DEFAULTS.currentAge);
  const selfNpYears        = raw.selfNpYears         ?? raw.npYearsContributed  ?? 0;
  const selfNpAutoMode     = raw.selfNpAutoMode      ?? raw.npYearsAutoMode     ?? true;

  // v3 spouseMonthlyIncome(월)→v4 spouseCurrentSalary(연봉)
  const spouseCurrentSalary = raw.spouseCurrentSalary
    ?? (raw.spouseMonthlyIncome != null ? raw.spouseMonthlyIncome * 12 : KR_DEFAULTS.spouseCurrentSalary);

  const spouseLifeExpectancy  = raw.spouseLifeExpectancy  ?? raw.lifeExpectancy       ?? autoLifeExpectancy(raw.spouseCurrentAge ?? KR_DEFAULTS.spouseCurrentAge);
  const spousePensionStartAge = raw.spousePensionStartAge ?? raw.pensionStartAge      ?? autoPensionStartAge(raw.spouseCurrentAge ?? KR_DEFAULTS.spouseCurrentAge);

  const input = {
    ...KR_DEFAULTS,
    ...raw,
    selfCurrentSalary,
    selfLifeExpectancy,
    selfPensionStartAge,
    selfNpYears,
    selfNpAutoMode,
    selfNpInputMode:     raw.selfNpInputMode     ?? "auto",
    selfNpManualMonthly: raw.selfNpManualMonthly ?? 0,
    spouseCurrentSalary,
    spouseLifeExpectancy,
    spousePensionStartAge,
    spouseNpYears:       raw.spouseNpYears       ?? 0,
    spouseNpAutoMode:    raw.spouseNpAutoMode     ?? true,
    spouseNpInputMode:   raw.spouseNpInputMode    ?? "auto",
    spouseNpManualMonthly: raw.spouseNpManualMonthly ?? 0,
    postRetireSideIncome: raw.postRetireSideIncome ?? raw.sideIncomeSelf ?? KR_DEFAULTS.postRetireSideIncome,
    // v4→v5 bucket rename: retirementBalance→investmentBalance, cashSavings→savingsBalance
    // 개인연금(privatePensionBalance)은 투자성 자산으로 통합
    investmentBalance:   raw.investmentBalance
      ?? (raw.retirementBalance != null ? raw.retirementBalance + (raw.privatePensionBalance ?? 0) : undefined)
      ?? raw.currentDC
      ?? KR_DEFAULTS.investmentBalance,
    savingsBalance:      raw.savingsBalance
      ?? raw.cashSavings
      ?? raw.insuranceValue
      ?? KR_DEFAULTS.savingsBalance,
    savingsReturnRate:   raw.savingsReturnRate    ?? KR_DEFAULTS.savingsReturnRate,
    monthlyAddSaving:    raw.monthlyAddSaving     ?? raw.monthlyAdditionalSaving ?? KR_DEFAULTS.monthlyAddSaving,
    spouseEnabled:       raw.spouseEnabled        ?? ((raw.spouseMonthlyIncome ?? raw.spouseCurrentSalary ?? 0) > 0),
    spouseCurrentAge:    raw.spouseCurrentAge     ?? KR_DEFAULTS.spouseCurrentAge,
    // PR4: housingMode (hasHouse 레거시 마이그레이션)
    housingMode:         raw.housingMode          ?? (raw.hasHouse === false ? "monthly_rent" : "own"),
    housingMaintenance:  raw.housingMaintenance   ?? KR_DEFAULTS.housingMaintenance,
    housingInflationScenario: raw.housingInflationScenario ?? KR_DEFAULTS.housingInflationScenario,
    deposit:             raw.deposit              ?? KR_DEFAULTS.deposit,
    monthlyRent:         raw.monthlyRent          ?? KR_DEFAULTS.monthlyRent,
    hasMortgage:         raw.hasMortgage          ?? ((raw.mortgageBalance ?? KR_DEFAULTS.mortgageBalance) > 0),
    includeSeveranceLumpSum:   raw.includeSeveranceLumpSum   ?? ASSUMPTIONS.assetRules.includeSeveranceLumpSumDefault,
    medicalCostMultiplier:     raw.medicalCostMultiplier     ?? 1.0,
    applyMedicalCost:          raw.applyMedicalCost          ?? true,
    // C5: 인출 전략
    withdrawalStrategy:        (raw.withdrawalStrategy === "unified" ? "bucket" : raw.withdrawalStrategy) ?? "bucket",
    // C1: 시퀀스 리스크 스트레스 테스트
    stressTest:                raw.stressTest                ?? "severe",
    // PR3: 소득 입력 표시 모드 (net annual은 selfCurrentSalary에 저장, 이건 UI 전용)
    selfSalaryBasis:           raw.selfSalaryBasis           ?? "gross",
    spouseSalaryBasis:         raw.spouseSalaryBasis         ?? "gross",
    children,
  };

  // 명목 % 마이그레이션: v3 이하는 실질 %를 입력했음
  // v4부터 명목 % 입력 — LS_KEY가 바뀌었으므로 LEGACY 로드 시만 변환 필요
  // 단순히 기존 값을 그대로 쓰되, 하위 호환성 이슈 최소화를 위해 정상 범위로 클램핑
  // (실질 3.5% → 명목 3.5%는 약간 낮지만 사용자가 다시 설정할 것)

  const isOwn = input.housingMode === "own";
  const normalized = {
    ...input,
    housePrice:            isOwn ? input.housePrice : 0,
    mortgageBalance:       isOwn && input.hasMortgage ? input.mortgageBalance : 0,
    monthlyMortgagePayment: isOwn && input.hasMortgage ? input.monthlyMortgagePayment : 0,
    downsizeEnabled:       isOwn ? input.downsizeEnabled : false,
    // 자가 아닌 모드에서 자가 전용 필드 무효화
    deposit:               isOwn ? 0 : input.deposit,
    monthlyRent:           input.housingMode === "monthly_rent" ? input.monthlyRent : 0,
  };
  // 레거시 필드 정리
  delete normalized.hasHouse;
  delete normalized.lifeExpectancy;
  delete normalized.pensionStartAge;
  delete normalized.npYearsContributed;
  delete normalized.npYearsAutoMode;
  delete normalized.currentSalary;
  delete normalized.spouseMonthlyIncome;
  delete normalized.sideIncomeSelf;
  delete normalized.sideIncomeSpouse;
  delete normalized.currentDC;
  delete normalized.currentPensionSavings;
  delete normalized.insuranceValue;
  delete normalized.monthlyAdditionalSaving;
  delete normalized.child1BirthYear;
  delete normalized.child2BirthYear;
  // v4→v5 제거된 필드
  delete normalized.retirementBalance;
  delete normalized.cashSavings;
  delete normalized.privatePensionBalance;
  delete normalized.privatePensionStartAge;
  delete normalized.privatePensionWithdrawRate;
  delete normalized.applyPensionTax;
  return normalized;
}

function makeScenario(name, input, colorIdx) {
  return {
    id: uid(),
    name,
    color: SCENARIO_COLORS[colorIdx % SCENARIO_COLORS.length],
    input: normalizeInput(input),
  };
}

function loadInitial() {
  const readStored = (key) => {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!Array.isArray(obj.scenarios) || !obj.scenarios.length) return null;
    return {
      activeId: obj.activeId,
      scenarios: obj.scenarios.map((s, idx) => ({
        ...s,
        color: s.color || SCENARIO_COLORS[idx % SCENARIO_COLORS.length],
        input: normalizeInput(s.input),
      })),
    };
  };

  try {
    const current = readStored(LS_KEY);
    if (current) return { ...current, isNew: false };
    for (const key of LEGACY_LS_KEYS) {
      const migrated = readStored(key);
      if (migrated) return { ...migrated, isNew: false, wasLegacyMigrated: key === "retirement-sim-v4" };
    }
  } catch {}
  const base = makeScenario(`퇴직 ${KR_DEFAULTS.retireAge}세`, KR_DEFAULTS, 0);
  return { scenarios: [base], activeId: base.id, isNew: true };
}

function App() {
  const initial = loadInitial();
  const [scenarios, setScenarios] = useState(initial.scenarios);
  const [activeId, setActiveId] = useState(initial.activeId);
  const [advancedMode, setAdvancedMode] = useState(false);
  const [showWizard, setShowWizard] = useState(() => initial.isNew);
  const [wizardSeen, setWizardSeen] = useState(() => {
    try { return localStorage.getItem("retirement-sim-wizard-seen") === "1"; } catch { return false; }
  });
  const [showSeqShock, setShowSeqShock] = useState(false);
  const [showAssumptions, setShowAssumptions] = useState(false); // C7
  const [activePresetId, setActivePresetId] = useState(null);
  const debugMode = useDebugMode(); // C9
  const [mobileView, setMobileView] = useState("results"); // "results" | "inputs"
  const isMobile = useIsMobile();
  const [toast, setToast] = useState(() => initial.wasLegacyMigrated ? "v7 업데이트: 개인연금이 투자성 자산에 통합되었습니다. 자산 항목을 다시 확인해주세요." : null);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 6000);
    return () => clearTimeout(t);
  }, [toast]);

  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ scenarios, activeId })); } catch {}
  }, [scenarios, activeId]);

  const active = scenarios.find(s => s.id === activeId) || scenarios[0];
  const setInputField = (k) => (v) => {
    setScenarios(prev => prev.map(s => {
      if (s.id !== active.id) return s;
      const newInput = normalizeInput({ ...s.input, [k]: v });
      const update = { ...s, input: newInput };
      if (k === "retireAge") update.name = `퇴직 ${v}세`;
      return update;
    }));
  };
  const setInputPatch = (patch) => {
    setScenarios(prev => prev.map(s =>
      s.id === active.id ? { ...s, input: normalizeInput({ ...s.input, ...patch }) } : s
    ));
  };
  const addChild = () => {
    if (active.input.children.length >= 5) return;
    setInputField("children")([
      ...active.input.children,
      { id: uid(), birthYear: CURRENT_YEAR - Math.max(0, active.input.currentAge - 35) },
    ]);
  };
  const updateChild = (id, birthYear) => {
    setInputField("children")(active.input.children.map(c => c.id === id ? { ...c, birthYear } : c));
  };
  const removeChild = (id) => {
    setInputField("children")(active.input.children.filter(c => c.id !== id));
  };

  const addScenario = () => {
    if (scenarios.length >= 3) return;
    // 활성 시나리오의 퇴직나이 기준으로 +5, -5 순으로 비교 시나리오 생성 (고정 ±5)
    const base = active.input.retireAge;
    const offsets = [5, -5];
    const off = offsets[scenarios.length - 1] ?? 5;
    const minRetire = Math.max(active.input.currentAge + 1, 25);
    const newRetire = Math.min(75, Math.max(minRetire, base + off));
    const sign = off >= 0 ? "+" : "−";
    const next = makeScenario(
      `퇴직 ${newRetire}세`,
      { ...active.input, retireAge: newRetire },
      scenarios.length,
    );
    setScenarios(prev => [...prev, next]);
    setActiveId(next.id);
  };

  const removeScenario = (id) => {
    if (scenarios.length <= 1) return;
    const removing = scenarios.find(s => s.id === id);
    setScenarios(prev => {
      const next = prev.filter(s => s.id !== id);
      // 프리셋 시나리오 모두 삭제되면 프리셋 상태 초기화
      if (removing?.origin?.startsWith("preset:") && !next.some(s => s.origin?.startsWith("preset:"))) {
        setActivePresetId(null);
      }
      return next;
    });
    if (activeId === id) setActiveId(scenarios[0].id);
  };

  const resetActive = () => {
    setScenarios(prev => prev.map(s => s.id === activeId ? { ...s, input: normalizeInput(KR_DEFAULTS) } : s));
  };

  const applyPreset = (preset) => {
    // 기존 프리셋 시나리오 제거 (origin이 "preset:"으로 시작하는 것들)
    const manual = scenarios.filter(s => !s.origin || !s.origin.startsWith("preset:"));
    const baseInput = active.input;
    const generated = preset.generate(baseInput);
    // 총 시나리오 수를 SCENARIO_COLORS 수(4) 이하로 제한
    const maxNew = Math.max(0, SCENARIO_COLORS.length - manual.length);
    const trimmed = generated.slice(0, maxNew);
    if (trimmed.length === 0) return;
    const newScenarios = trimmed.map((g, idx) => ({
      id: uid(),
      name: g.suffix,
      color: SCENARIO_COLORS[(manual.length + idx) % SCENARIO_COLORS.length],
      input: normalizeInput({ ...baseInput, ...g.patch }),
      origin: `preset:${preset.id}`,
    }));
    setScenarios([...manual, ...newScenarios]);
    setActivePresetId(preset.id);
  };

  const clearPreset = () => {
    setScenarios(prev => prev.filter(s => !s.origin || !s.origin.startsWith("preset:")));
    setActivePresetId(null);
  };

  const applyInsightAsNewScenario = (ins) => {
    if (scenarios.length >= 4) return;
    const newInput = normalizeInput({ ...active.input, ...ins.patch(active.input) });
    const nextColor = SCENARIO_COLORS[scenarios.length];
    const newId = uid();
    setScenarios(prev => [...prev, { id: newId, name: ins.label, color: nextColor, input: newInput }]);
    setActiveId(newId);
  };

  const handleWizardComplete = (result) => {
    const updatedName = `퇴직 ${result.retireAge}세`;
    setScenarios(prev => prev.map(s => s.id === active.id ? { ...s, name: updatedName, input: normalizeInput(result) } : s));
    // 퇴직 +5세 비교 시나리오 자동 추가
    if (scenarios.length < 4) {
      const later = makeScenario(`퇴직 ${Math.min(75, result.retireAge + 5)}세`, { ...result, retireAge: Math.min(75, result.retireAge + 5) }, 1);
      setScenarios(prev => [
        ...prev.map(s => s.id === active.id ? { ...s, name: updatedName, input: normalizeInput(result) } : s),
        later,
      ]);
    }
    setShowWizard(false);
    try { localStorage.setItem("retirement-sim-wizard-seen", "1"); } catch {}
    setWizardSeen(true);
  };

  // 결과 계산
  const bandsById = useMemo(() => {
    const m = new Map();
    for (const s of scenarios) m.set(s.id, runScenarioBand(s.input));
    return m;
  }, [scenarios]);

  const activeBand = bandsById.get(active.id);
  const activeResult = activeBand.mid;
  const insights = useMemo(() => findBestInsights(active.input, activeResult), [active.input, activeResult]);

  // 기본값 대비 변경 여부 헬퍼 (슬라이더 강조 표시용)
  const normalizedDefaults = useMemo(() => normalizeInput(KR_DEFAULTS), []);
  const changedFrom = (field) => {
    const cur = i[field]; const def = normalizedDefaults[field];
    if (typeof def === "number") return Math.abs(cur - def) > 0.001;
    return cur !== def;
  };

  const i = active.input;

  // C9: 입력 정합성 검증
  const validationWarnings = useMemo(() => validateInput(i), [i]);

  // C9: 디버그 콘솔 로그
  useEffect(() => {
    if (!debugMode) return;
    const bEnd = activeResult.assetBucketsAtEnd;
    const bTotal = bEnd.savings + bEnd.investments;
    const yaf = activeResult.yearlyAssetFlow;
    const lastY = yaf[yaf.length - 1] ?? {};
    const retireY = yaf.find(y => y.age === i.retireAge) ?? {};
    const warnings = validateInput(i);

    console.group(`[RetireSim Debug] 시나리오: ${active.name}`);
    console.table({
      준비율: activeResult.readinessRatio + "%",
      자산소진: activeResult.depletionAge ? activeResult.depletionAge + "세" : "없음",
      시뮬종료나이: activeResult.simEndAge + "세",
      퇴직시금융자산: fmt만원(activeResult.totalAssetsAtRetirement),
      브릿지인출: fmt만원(activeResult.bridgeShortfall),
      본인연금월: fmt만원월(activeResult.selfNpMonthly),
      배우자연금월: fmt만원월(activeResult.spouseNpMonthly),
      인출전략: i.withdrawalStrategy,
      스트레스테스트: i.stressTest,
      주거모드: i.housingMode,
      "종료_저축성": fmt만원(bEnd.savings) + (bTotal > 0 ? ` (${Math.round(bEnd.savings/bTotal*100)}%)` : ""),

            {/* 이벤트 타임라인 strip */}
            {(activeResult.childEventList.length > 0 || activeResult.downsizeEvents.length > 0) && (
              <div className="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-[11px] text-slate-500 border-t border-slate-100 pt-2">
                <span className="font-medium text-slate-400 mr-1">이벤트</span>
                {activeResult.childEventList.map((e, idx) => (
                  <span key={`tc${idx}`} className="inline-flex items-center gap-1">
                    <span className="text-slate-300">│</span>
                    <span className="text-[10px] font-medium text-slate-700">{e.age}세</span>
                    <span>{e.label}</span>
                  </span>
                ))}
                {activeResult.downsizeEvents.map((e, idx) => (
                  <span key={`td${idx}`} className="inline-flex items-center gap-1">
                    <span className="text-slate-300">│</span>
                    <span className="text-[10px] font-medium text-violet-700">{e.age}세</span>
                    <span className="text-violet-600">🏠 다운사이징</span>
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* 자산 구성 변화 차트 */}
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <div className="flex items-baseline justify-between mb-2 flex-wrap gap-2">
              <h2 className="text-sm font-semibold">자산 구성 변화 — <span style={{color: active.color}}>{active.name}</span></h2>
              <div className="flex items-center gap-3 text-[11px] text-slate-500 flex-wrap">
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-slate-400"></span>저축성</span>
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-500"></span>투자성</span>
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-400"></span>주택</span>
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-teal-400"></span>보증금</span>
                <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span>대출</span>
              </div>
            </div>
            <div style={{ width: "100%", height: isMobile ? 200 : 320 }} role="img" aria-label="자산 구성 변화 차트">
              <ResponsiveContainer>
                <ComposedChart data={bucketData} margin={{ top: 10, right: 16, bottom: 0, left: 0 }} stackOffset="sign">
                  <CartesianGrid stroke="#f1f5f9" />
                  <XAxis dataKey="age" tick={{ fontSize: 11 }} />
                  <YAxis tick={{ fontSize: 11 }} tickFormatter={v => fmt만원(v)} width={60} />
                  <Tooltip
                    content={({ active, payload, label }) => {
                      if (!active || !payload) return null;
                      const items = payload.filter(p => p.value !== 0);
                      if (items.length === 0) return null;
                      return (
                        <div className="bg-white border border-slate-200 rounded-lg shadow-lg p-2 text-xs">
                          <div className="font-semibold text-slate-700 mb-1">{label}세</div>
                          {items.map(p => (
                            <div key={p.dataKey} className="flex justify-between gap-4">
                              <span style={{color: p.color}}>{p.dataKey}</span>
                              <span className="num">{fmt만원(Math.abs(p.value))}</span>
                            </div>
                          ))}
                        </div>
                      );
                    }}
                  />
                  <Legend wrapperStyle={{ fontSize: 11 }} />
                  <Area type="monotone" dataKey="저축성 자산"  stackId="b" stroke="#64748b" fill="#94a3b8" fillOpacity={0.8} />
                  <Area type="monotone" dataKey="투자성 자산"  stackId="b" stroke="#2563eb" fill="#3b82f6" fillOpacity={0.8} />
                  <Area type="monotone" dataKey="주택"         stackId="b" stroke="#d97706" fill="#f59e0b" fillOpacity={0.8} />
                  <Area type="monotone" dataKey="보증금"       stackId="b" stroke="#0d9488" fill="#2dd4bf" fillOpacity={0.8} />
                  <Area type="monotone" dataKey="대출"         stackId="b" stroke="#dc2626" fill="#ef4444" fillOpacity={0.7} />
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* 시나리오 비교 카드 */}
          {scenarios.length > 1 && (
            <div className="space-y-2">
              <h2 className="text-sm font-semibold">시나리오 비교</h2>
              <div className="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1">
                {scenarios.map(s => {
                  const res = bandsById.get(s.id)?.mid;
                  if (!res) return null;
                  return (
                    <ExploreCard
                      key={s.id}
                      scenario={s}
                      result={res}
                      isActive={s.id === activeId}
                      onActivate={() => setActiveId(s.id)}
                    />
                  );
                })}
              </div>
            </div>
          )}

          {/* 월 현금흐름 */}
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <h2 className="text-sm font-semibold mb-2">월 현금흐름 — <span style={{color: active.color}}>{active.name}</span></h2>
            <div style={{ width: "100%", height: isMobile ? 180 : 300 }} role="img" aria-label="월 현금흐름 차트">
              <ResponsiveContainer>
                <ComposedChart data={cashflowData} margin={{ top: 10, right: 16, bottom: 0, left: 0 }} stackOffset="sign">
                  <CartesianGrid stroke="#f1f5f9" />
                  <XAxis dataKey="age" tick={{ fontSize: 11 }} />
                  <YAxis tick={{ fontSize: 11 }} width={50} />
                  <Tooltip
                    content={({ active, payload, label }) => {
                      if (!active || !payload) return null;
                      const items = payload.filter(p => p.value !== 0 && p.dataKey !== "순현금흐름");
                      const cfLine = payload.find(p => p.dataKey === "순현금흐름");
                      return (
                        <div className="bg-white border border-slate-200 rounded-lg shadow-lg p-2 text-xs">
                          <div className="font-semibold text-slate-700 mb-1">{label}세</div>
                          {items.map(p => (
                            <div key={p.dataKey} className="flex justify-between gap-4">
                              <span style={{color: p.color}}>{p.dataKey}</span>
                              <span className="num">{Math.abs(p.value).toLocaleString()}만</span>
                            </div>
                          ))}
                          {cfLine && (
                            <div className="flex justify-between gap-4 border-t border-slate-100 mt-1 pt-1 font-semibold">
                              <span>순현금흐름</span>
                              <span className="num">{cfLine.value.toLocaleString()}만</span>
                            </div>
                          )}
                        </div>
                      );
                    }}
                  />
                  <Legend wrapperStyle={{ fontSize: 11 }} />
                  <ReferenceLine y={0} stroke="#94a3b8" />
                  <Bar dataKey="본인 근로"      stackId="a" fill="#10b981" />
                  <Bar dataKey="배우자 근로"    stackId="a" fill="#34d399" />
                  <Bar dataKey="본인 국민연금"  stackId="a" fill="#3b82f6" />
                  <Bar dataKey="배우자 국민연금" stackId="a" fill="#60a5fa" />
                  <Bar dataKey="브릿지 월소득"  stackId="a" fill="#06b6d4" />
                  <Bar dataKey="생활비"        stackId="a" fill="#f59e0b" />
                  <Bar dataKey="양육비"        stackId="a" fill="#a855f7" />
                  <Bar dataKey="대출 상환"      stackId="a" fill="#64748b" />
                  <Bar dataKey="건강보험료"     stackId="a" fill="#ef4444" />
                  <Bar dataKey="의료비"        stackId="a" fill="#dc2626" />
                  <Bar dataKey="관리비·주거"    stackId="a" fill="#78716c" />
                  <Bar dataKey="추가저축"      stackId="a" fill="#0ea5e9" />
                  <Line type="monotone" dataKey="순현금흐름" stroke="#0f172a" strokeWidth={2} dot={false} />
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </div>

          {insights.length > 0 && (
            <ActionSuggestions
              insights={insights}
              onExplore={applyInsightAsNewScenario}
              scenarioCount={scenarios.length}
            />
          )}

          {/* 자동 인사이트 */}
          <details className="bg-white rounded-xl border border-slate-200">
            <summary className="text-sm font-semibold p-4 cursor-pointer select-none">자동 인사이트 (상세)</summary>
            <div className="px-4 pb-4">
            <ul className="text-sm text-slate-700 space-y-1.5 leading-relaxed">
              <li>• 브릿지 기간 <b>{activeResult.bridgeYears}년</b> 동안 자산에서 인출 필요: <b className="text-red-600">{fmt만원(activeResult.bridgeShortfall)}</b> <span className="text-xs text-slate-500">(생활비 충당을 위한 금융자산 인출액)</span></li>
              {activeResult.depletionAge ? (
                <li>• <b className="text-red-600">⚠ {activeResult.depletionAge}세 자산소진</b> — 수명({activeResult.simEndAge}세)까지 <b>{activeResult.simEndAge - activeResult.depletionAge}년</b> 부족{i.spouseEnabled ? " (부부 최대 수명 기준)" : ""}</li>
              ) : (
                <li>• <span className="text-emerald-700">✓ 수명({activeResult.simEndAge}세)까지 자산이 유지됩니다.</span>{i.spouseEnabled ? " (부부 최대 수명 기준)" : ""} 수익률 비관 시나리오에서도 확인 권장.</li>
              )}
              {activeBand.pessimistic.depletionAge && !activeResult.depletionAge && (
                <li>• 비관 시나리오(수익률 −{i.scenarioBandSpread}%p)에서는 <b className="text-amber-600">{activeBand.pessimistic.depletionAge}세 소진</b> — 시장 변동성에 취약합니다.</li>
              )}
              {activeBand.sequenceShock && i.stressTest !== "none" && (
                activeBand.sequenceShock.depletionAge
                  ? <li>• <b className="text-red-700">⚡ {STRESS_PRESETS[i.stressTest]?.label}</b>: <b className="text-red-700">{activeBand.sequenceShock.depletionAge}세 자산소진</b> (준비율 {activeBand.sequenceShock.readinessRatio}%) — {STRESS_PRESETS[i.stressTest]?.desc}</li>
                  : !activeResult.depletionAge && <li>• <span className="text-emerald-700">충격({STRESS_PRESETS[i.stressTest]?.label}) 시나리오에서도 자산이 유지됩니다.</span> (준비율 {activeBand.sequenceShock.readinessRatio}%)</li>
              )}
              {activeResult.selfNpMonthly > 0 && (
                <li>• 본인 국민연금 예상: <b className="text-blue-700">{fmt만원월(activeResult.selfNpMonthly)}</b>
                  {activeResult.spouseNpMonthly > 0 && <span> / 배우자: <b className="text-blue-500">{fmt만원월(activeResult.spouseNpMonthly)}</b></span>}
                </li>
              )}
              {insights.length > 0 && (
                <li className="pt-2 mt-2 border-t border-slate-100">
                  <div className="text-xs text-slate-500 mb-1.5">▷ 가장 효과적인 개선책 (준비율 변화):</div>
                  <div className="space-y-1">
                    {insights.map(ins => (
                      <div key={ins.key} className="flex items-center justify-between gap-2 text-sm">
                        <span>{ins.label}</span>
                        <div className="flex items-center gap-2 shrink-0">
                          <span className="num text-emerald-600 font-medium">+{Math.round(ins.delta)}%p → {Math.round(ins.newRatio)}%</span>
                          {scenarios.length < 4 && (
                            <button
                              onClick={() => applyInsightAsNewScenario(ins)}
                              className="text-[11px] px-1.5 py-0.5 rounded border border-emerald-200 text-emerald-700 hover:bg-emerald-50 whitespace-nowrap"
                              title="이 조건으로 새 시나리오 추가"
                            >+ 추가</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </li>
              )}
              {i.withdrawalStrategy !== "bucket" && (
                <li className="pt-2 mt-2 border-t border-slate-100 text-xs text-slate-500">
                  인출 전략: <b className="text-slate-700">{{ bucket: "버킷 전략", "4pct": "4% 룰 (SWR)", vpw: "VPW" }[i.withdrawalStrategy]}</b> 적용 중 (고급 {'>'} 인출 전략에서 변경)
                </li>
              )}
              {scenarios.length > 1 && (
                <li className={`${i.withdrawalStrategy !== "bucket" ? "" : "pt-2 mt-2 border-t border-slate-100"} text-xs text-slate-500`}>
                  탭의 <b className="text-slate-700">+ 비교</b> 버튼으로 퇴직나이 +5/+10세 시나리오를 추가해 즉시 비교할 수 있습니다.
                </li>
              )}
            </ul>
            </div>
          </details>

          <footer className="text-[11px] text-slate-400 pb-8 leading-relaxed">
            ※ 수익률·연봉상승률·주택상승률은 모두 연 % 기준 입력. 차트는 현재가치(오늘 돈) 기준 표시.
            국민연금은 A값(300만) 단순 추정. 건강보험료/세제는 단순 추정. DC는 매년 연봉/12 적립 가정.
            퇴직금 일시금은 근속연수 기준 단순 계산 후 6.6% 과세 적용. 유족연금은 사망 배우자 연금의 50% 단순 가정.
            <b>노년기 의료비</b>: 50대 15만 → 65세 30만 → 75세 60만 → 85세 100만/월 기준, 의료물가는 일반물가보다 +1.5%p 상승 가정.
            <b>시퀀스 리스크</b>: 경미(-5%p,3년) / 중간(-10%p,5년) / 2008(-30%→반등) 프리셋 중 선택. 차트 토글로 표시.
            <b>인출 전략</b>: 버킷=저축성→투자성 순 인출. 4% 룰=퇴직자산×4% 고정. VPW=잔여기대연수 기반 비율 인출.
            <b>준비율·자산유지</b>는 본인·배우자 최대 수명 기준. <b>디버그</b>: URL에 ?debug=1 추가 시 상세 로그.
          </footer>
        </section>
      </main>

      {/* 모바일 FAB — 입력 모드에서 결과로 빠르게 이동 */}
      {isMobile && mobileView === "inputs" && (
        <button
          onClick={() => setMobileView("results")}
          className="fixed bottom-5 right-5 z-30 bg-slate-900 text-white rounded-full px-5 py-3 text-sm font-semibold shadow-lg flex items-center gap-2 active:scale-95 transition-transform"
        >
          결과 보기 →
        </button>
      )}
    </div>
  );
}

try {
  createRoot(document.getElementById("root")).render(<App />);
  window.dispatchEvent(new Event("retirement-sim-ready"));
} catch (error) {
  console.error("Retirement simulator failed to start", error);
  window.showBootError?.();
}
</script>
</body>
</html>
