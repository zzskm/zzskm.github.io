
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dev Support팀 일일업무_학습일지</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='54' font-size='56'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
  :root{
    --bg:#e8e8e8; --surface:#f4f4f4; --surface-2:#ececec;
    --line:rgba(38,38,38,0.18); --line-strong:rgba(38,38,38,0.4);
    --ink:#262626; --ink-mute:rgba(38,38,38,0.62); --ink-faint:rgba(38,38,38,0.42);
    --blue:#4F81BD;
    --shade:#D9D9D9;
    --sans:"Pretendard Variable",Pretendard,system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);}
  body{font-family:var(--sans);font-weight:400;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;font-size:15px;min-height:100vh;}
  .shell{max-width:960px;margin:0 auto;padding:32px 24px 80px;}

  .topbar{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .mast .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.16em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:4px;}
  .mast h1{font-size:18px;font-weight:600;letter-spacing:-0.01em;}
  .savestate{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:0.04em;}
  .savestate.flash{color:var(--ink);}

  .meta-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--ink-faint);text-transform:uppercase;}
  .field input[type=date],
  .field input[type=time],
  .field input[type=text]{
    font-family:var(--mono);font-size:14px;color:var(--ink);background:var(--surface);
    border:1px solid var(--line);border-radius:6px;padding:8px 10px;letter-spacing:0.02em;
    min-width:0;
  }
  .field input[type=text].sans{font-family:var(--sans);}
  .field input:focus{outline:none;border-color:var(--line-strong);}
  .weeklabel{font-family:var(--mono);font-size:15px;color:var(--ink);padding:8px 12px;background:var(--surface);border:1px solid var(--line);border-radius:6px;letter-spacing:0.04em;}
  .weekrange{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:4px;letter-spacing:0.04em;}
  .weeknav{display:flex;gap:4px;align-items:stretch;}
  .weeknav-btn{
    font-family:var(--sans);font-size:13px;font-weight:500;
    padding:8px 12px;border:1px solid var(--line);border-radius:6px;
    background:var(--surface);color:var(--ink);cursor:pointer;
    letter-spacing:0.01em;white-space:nowrap;
    box-sizing:border-box;min-height:38px;
  }
  .weeknav-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
  .field.name-field input{width:200px;max-width:100%;}
  .lunch-range{display:flex;gap:6px;align-items:center;}
  .lunch-range .ctp{width:110px;}
  .lunch-range .dash{color:var(--ink-faint);font-family:var(--mono);font-size:13px;}

  /* custom time picker (30-min steps; replaces native type=time UI) */
  .ctp{display:inline-block;position:relative;vertical-align:middle;}
  .ctp__trigger{
    display:flex;align-items:center;justify-content:center;gap:4px;width:100%;
    font-family:var(--mono);font-size:14px;color:var(--ink);letter-spacing:0.06em;
    background:var(--surface);border:1px solid var(--line);border-radius:6px;
    padding:8px 10px;cursor:pointer;text-align:center;
  }
  .ctp__trigger:hover{border-color:var(--line-strong);}
  .ctp__trigger:focus{outline:none;border-color:var(--line-strong);}
  .ctp__trigger.is-open{border-color:var(--ink);}
  .ctp__icon{font-size:12px;color:var(--ink-faint);line-height:1;}
  .ctp--compact .ctp__trigger{font-size:12px;padding:2px 4px;border-radius:4px;background:var(--bg);}
  .ctp--compact{width:88px;}
  .timehelper .ctp--compact{width:90px;}
  .ctp-panel{
    position:fixed;z-index:1000;min-width:148px;
    background:var(--surface);border:1px solid var(--line-strong);
    border-radius:8px;box-shadow:0 8px 24px rgba(38,38,38,0.14);
    padding:6px 4px;
  }
  .ctp-panel[hidden]{display:none;}
  .ctp-panel__cols{display:flex;gap:4px;}
  .ctp-panel__col{
    flex:1;max-height:200px;overflow-y:auto;
    display:flex;flex-direction:column;gap:2px;
    scrollbar-width:thin;
  }
  .ctp-panel__opt{
    font-family:var(--mono);font-size:13px;line-height:1;
    padding:6px 10px;border:none;border-radius:4px;
    background:transparent;color:var(--ink);cursor:pointer;
    text-align:center;letter-spacing:0.04em;
  }
  .ctp-panel__opt:hover{background:var(--shade);}
  .ctp-panel__opt.is-selected{background:var(--blue);color:#fff;}
  .ctp-panel__sep{
    min-height:6px;padding:0;pointer-events:none;user-select:none;
  }

  /* preview that mimics docx — header table (blue top/bottom only) */
  .header-table{
    width:100%;
    display:grid;grid-template-columns: 82fr 18fr;
    border-top:3px solid var(--blue);
    border-bottom:3px solid var(--blue);
    background:var(--surface);margin-bottom:10px;
  }
  .header-table .cell{padding:14px 14px;font-weight:700;display:flex;align-items:center;}
  .header-table .cell.title{font-size:15px;}
  .header-table .cell.week{font-family:var(--mono);justify-content:flex-end;font-size:14px;letter-spacing:0.04em;}

  /* body table */
  table.sheet{width:100%;border-collapse:collapse;background:var(--surface);
    border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);margin-bottom:10px;}
  table.sheet th, table.sheet td{
    border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);
    border-left:1px solid var(--ink);border-right:1px solid var(--ink);
    padding:8px 10px;vertical-align:top;
  }
  /* remove outer left/right */
  table.sheet th:first-child, table.sheet td:first-child{border-left:0;}
  table.sheet th:last-child,  table.sheet td:last-child{border-right:0;}
  table.sheet thead th{background:var(--shade);font-weight:600;font-size:13px;text-align:center;letter-spacing:0.04em;}
  .date-cell{width:130px;text-align:center;font-family:var(--mono);font-size:13px;letter-spacing:0.02em;vertical-align:middle !important;}

  .lines{display:flex;flex-direction:column;gap:4px;min-height:134px;}
  .line-row{
    display:grid;grid-template-columns:200px 1fr auto;gap:8px;align-items:center;
    font-family:var(--sans);font-size:14px;line-height:1.5;color:var(--ink);
    padding:2px 0;min-height:34px;
  }
  .line-row .time{display:flex;gap:3px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--ink-mute);}
  .line-row .time .ctp{flex-shrink:0;}
  .line-row .time .dash{color:var(--ink-faint);}
  .line-row .text{
    min-width:0;word-break:break-word;cursor:text;
    font-family:var(--sans);font-size:13px;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:4px;
    padding:4px 8px;min-height:26px;line-height:1.5;
  }
  .line-row .text:hover{border-color:var(--line-strong);}
  .line-row .text.has-link{color:#1a4fad;text-decoration:underline;}
  .line-row .text.placeholder{color:var(--ink-faint);font-style:italic;}
  .line-row .actions-inline{display:flex;gap:4px;}
  .line-row .iconbtn{
    font-family:var(--sans);font-size:12px;line-height:1;
    padding:3px 6px;border:1px solid var(--line);background:var(--surface);color:var(--ink-mute);
    border-radius:4px;cursor:pointer;
  }
  .line-row .iconbtn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
  .line-row .edit-mid{display:flex;gap:6px;align-items:center;min-width:0;}
  .line-row .edit-mid input[type=text]{
    font-family:var(--sans);font-size:13px;color:var(--ink);
    background:var(--bg);border:1px solid var(--line-strong);border-radius:4px;
    padding:4px 8px;min-width:0;
  }
  .line-row .edit-mid input.edit-text{flex:2;}
  .line-row .edit-mid input.edit-url{flex:1;}
  .line-row .edit-mid input:focus{outline:none;border-color:var(--ink);}
  .iconbtn.disabled{opacity:0.35;pointer-events:none;cursor:default;}
  .lines-empty{color:var(--ink-faint);font-style:italic;font-size:13px;padding:4px 0;}
  .lines-empty .empty-import-btn{
    margin-top:6px;font-family:var(--sans);font-size:12px;font-weight:500;
    padding:5px 9px;border:1px solid var(--line);border-radius:4px;
    background:var(--surface);color:var(--ink);cursor:pointer;
  }
  .lines-empty .empty-import-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}

  .transfer-modal-backdrop{
    position:fixed;inset:0;z-index:2000;
    display:flex;align-items:center;justify-content:center;
    padding:20px;background:rgba(38,38,38,0.32);
  }
  .transfer-modal-backdrop[hidden]{display:none;}
  .transfer-modal{
    width:min(560px,100%);background:var(--surface);border:1px solid var(--line-strong);
    border-radius:12px;box-shadow:0 18px 60px rgba(38,38,38,0.22);
    padding:18px;
  }
  .transfer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
  .transfer-head h2{font-size:16px;font-weight:600;letter-spacing:-0.01em;margin-top:2px;}
  .modal-close{
    font-size:22px;line-height:1;border:1px solid var(--line);background:var(--surface);
    border-radius:6px;padding:0 8px;cursor:pointer;color:var(--ink-mute);
  }
  .modal-close:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
  .transfer-summary{
    font-family:var(--sans);font-size:13px;line-height:1.55;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:12px;
    word-break:break-word;
  }
  .transfer-mode{
    display:flex;gap:8px;align-items:center;margin-bottom:12px;
    font-family:var(--sans);font-size:13px;color:var(--ink);
  }
  .transfer-mode label{
    display:flex;gap:6px;align-items:center;padding:7px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);cursor:pointer;
  }
  .transfer-mode label:has(input:checked){border-color:var(--ink);background:var(--ink);color:var(--bg);}
  .transfer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
  .transfer-day-btn{
    min-height:62px;text-align:left;border:1px solid var(--line);border-radius:8px;
    background:var(--surface);color:var(--ink);padding:10px;cursor:pointer;
    font-family:var(--sans);line-height:1.35;
  }
  .transfer-day-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
  .transfer-day-btn:disabled{opacity:0.38;cursor:default;background:var(--surface-2);color:var(--ink-faint);}
  .transfer-day-btn strong{display:block;font-size:13px;margin-bottom:4px;}
  .transfer-day-btn span{display:block;font-family:var(--mono);font-size:11px;color:currentColor;opacity:0.72;}
  .transfer-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}

  .timehelper{
    display:flex;gap:6px;align-items:center;flex-wrap:wrap;
    margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
  }
  .timehelper .ctp{flex-shrink:0;}
  .timehelper input[type=text]{
    font-family:var(--sans);font-size:13px;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:4px;
    padding:4px 8px;flex:1;min-width:120px;
  }
  .timehelper input:focus{outline:none;border-color:var(--line-strong);}
  .timehelper .dash{color:var(--ink-faint);font-family:var(--mono);font-size:13px;}
  .timehelper button{
    font-family:var(--sans);font-size:12px;font-weight:500;
    padding:5px 12px;border:1px solid var(--ink);border-radius:4px;
    background:var(--surface);color:var(--ink);cursor:pointer;
  }
  .timehelper button:hover{background:var(--ink);color:var(--bg);}

  .footer-note{display:none;}

  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .actions .field{flex:1;min-width:260px;}
  .filename-wrap{display:flex;gap:4px;align-items:stretch;}
  .filename-wrap input{flex:1;}
  .auto-btn{
    font-family:var(--mono);font-size:11px;
    padding:0 10px;border:1px solid var(--line);background:var(--surface);color:var(--ink-mute);
    border-radius:6px;cursor:pointer;letter-spacing:0.04em;
  }
  .auto-btn:hover{color:var(--ink);border-color:var(--ink);}
  .auto-btn.active{color:var(--ink-faint);border-color:var(--line);}

  .btn{
    font-family:var(--sans);font-size:13px;font-weight:500;
    padding:10px 18px;border:1px solid var(--ink);border-radius:6px;
    background:var(--surface);color:var(--ink);cursor:pointer;
    transition:background .15s ease, color .15s ease;
    letter-spacing:0.01em;white-space:nowrap;
  }
  .btn:hover{background:var(--ink);color:var(--bg);}
  .btn.ghost{border-color:var(--line);color:var(--ink-mute);}
  .btn.ghost:hover{background:transparent;color:var(--ink);border-color:var(--ink);}

  .hint{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:14px;letter-spacing:0.04em;}

  @media (max-width:640px){
    .shell{padding:20px 14px 60px;}
    .date-cell{width:88px;font-size:12px;}
    textarea{font-size:13.5px;min-height:124px;}
    .timehelper .ctp--compact{width:80px;}
  }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="mast">
      <div class="eyebrow">Dev Support</div>
      <h1>일일업무 · 학습일지</h1>
    </div>
    <div class="savestate" id="saveState">저장 대기</div>
  </div>

  <div class="meta-row">
    <div class="field">
      <label>주차 이동</label>
      <div class="weeknav">
        <button class="weeknav-btn" id="prevWeekBtn" title="이전 주차">← 이전</button>
        <button class="weeknav-btn" id="todayWeekBtn" title="오늘 기준 주차">오늘</button>
        <button class="weeknav-btn" id="nextWeekBtn" title="다음 주차">다음 →</button>
      </div>
    </div>
    <div class="field">
      <label>주차 <span class="weekrange" id="weekRange">—</span></label>
      <span class="weeklabel" id="weekLabel">—</span>
    </div>
    <div class="field name-field">
      <label>이름</label>
      <input type="text" class="sans" id="nameInput" placeholder="예: 홍길동" />
    </div>
    <div class="field">
      <label>업무 시작</label>
      <span id="workStartTime" class="ctp"></span>
    </div>
    <div class="field">
      <label>점심 시간</label>
      <div class="lunch-range">
        <span id="lunchStart" class="ctp"></span>
        <span class="dash">–</span>
        <span id="lunchEnd" class="ctp"></span>
      </div>
    </div>
  </div>

  <div class="header-table">
    <div class="cell title">Dev Support팀 일일업무_학습일지</div>
    <div class="cell week" id="weekLabelCell">—</div>
  </div>

  <table class="sheet">
    <thead>
      <tr><th style="width:130px;">날짜</th><th>내용</th></tr>
    </thead>
    <tbody id="daysBody"></tbody>
  </table>

  <div class="footer-note">
  </div>

  <div class="actions">
    <div class="field">
      <label>내보낼 파일명</label>
      <div class="filename-wrap">
        <input type="text" class="sans" id="filenameInput" />
        <button class="auto-btn" id="autoBtn" title="이름·주차에서 자동 생성">↻ 자동</button>
      </div>
    </div>
    <button class="btn" id="exportBtn">📥 .docx 내보내기</button>
    <button class="btn ghost" id="saveHtmlBtn">💾 HTML 저장</button>
    <button class="btn ghost" id="resetBtn">🗑 현재 주차 비우기</button>
  </div>

  <p class="hint">입력 내용은 자동으로 브라우저에 저장됩니다. 내보내기 전에 탭을 닫아도 보존돼요.</p>
  <p class="hint">💾 <b>HTML 저장</b>으로 이 페이지를 받아두면 로컬에서도 그대로 사용할 수 있어요.</p>
</div>

<div class="transfer-modal-backdrop" id="transferModal" hidden>
  <div class="transfer-modal" role="dialog" aria-modal="true" aria-labelledby="transferTitle">
    <div class="transfer-head">
      <div>
        <div class="eyebrow">Dev Support</div>
        <h2 id="transferTitle">로그 이동/복사</h2>
      </div>
      <button type="button" class="modal-close" id="transferCloseBtn" aria-label="닫기">×</button>
    </div>
    <div class="transfer-summary" id="transferSummary"></div>
    <div class="transfer-mode" aria-label="이동 또는 복사 선택">
      <label><input type="radio" name="transferMode" value="copy" checked /> 복사</label>
      <label><input type="radio" name="transferMode" value="move" /> 이동</label>
    </div>
    <div class="transfer-grid" id="transferTargetGrid"></div>
    <div class="transfer-actions">
      <button type="button" class="btn ghost" id="transferCancelBtn">취소</button>
    </div>
  </div>
</div>

<script>
(() => {
  const STORAGE_KEY = "devsupport_log_v2";
  const DAY_LABELS = ["월","화","수","목","금"];

  const $weekLabel = document.getElementById("weekLabel");
  const $weekLabelCell = document.getElementById("weekLabelCell");
  const $weekRange = document.getElementById("weekRange");
  const $daysBody = document.getElementById("daysBody");
  const $saveState = document.getElementById("saveState");
  const $nameInput = document.getElementById("nameInput");
  const $filenameInput = document.getElementById("filenameInput");
  const $autoBtn = document.getElementById("autoBtn");
  const $prevWeekBtn = document.getElementById("prevWeekBtn");
  const $todayWeekBtn = document.getElementById("todayWeekBtn");
  const $nextWeekBtn = document.getElementById("nextWeekBtn");
  const $transferModal = document.getElementById("transferModal");
  const $transferCloseBtn = document.getElementById("transferCloseBtn");
  const $transferCancelBtn = document.getElementById("transferCancelBtn");
  const $transferSummary = document.getElementById("transferSummary");
  const $transferTargetGrid = document.getElementById("transferTargetGrid");

  // ───── date helpers
  const pad2 = n => String(n).padStart(2,"0");
  const toISO = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const parseISO = s => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };

  function mondayOf(date){
    const d = new Date(date);
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    d.setDate(d.getDate() + diff);
    return d;
  }
  function fridayOf(monday){
    const d = new Date(monday);
    d.setDate(d.getDate() + 4);
    return d;
  }
  function nthFridayOfMonth(friday){
    let n = 1;
    const m = friday.getMonth();
    const cur = new Date(friday);
    cur.setDate(cur.getDate() - 7);
    while (cur.getMonth() === m){
      n++;
      cur.setDate(cur.getDate() - 7);
    }
    return n;
  }
  function weekLabelFor(monday){
    const f = fridayOf(monday);
    return `${f.getFullYear()}-${pad2(f.getMonth()+1)}-${nthFridayOfMonth(f)}주`;
  }
  function rangeLabelFor(monday){
    const f = fridayOf(monday);
    return `${monday.getMonth()+1}/${monday.getDate()} ~ ${f.getMonth()+1}/${f.getDate()}`;
  }
  function sanitize(s){ return (s || "").replace(/[\/\\:*?"<>|]/g, "_"); }

  // ───── line parsing / migration helpers
  const TIME_LINE_RE = /^(\d{1,2}:\d{2})\s*[-–~]\s*(\d{1,2}:\d{2})\s*(.*)$/;
  function parseContentToLines(content){
    const out = [];
    (content || "").split(/\r?\n/).forEach(raw => {
      const line = raw.replace(/\s+$/,"");
      if (!line){ out.push({ start:"", end:"", text:"", url:"" }); return; }
      const m = line.match(TIME_LINE_RE);
      if (m){
        out.push({ start: m[1], end: m[2], text: (m[3] || "").trim(), url: "" });
      } else {
        out.push({ start:"", end:"", text: line, url:"" });
      }
    });
    // trim trailing empty
    while (out.length && !out[out.length-1].start && !out[out.length-1].text) out.pop();
    return out;
  }
  function normalizeLines(arr){
    if (!Array.isArray(arr)) return [];
    return arr.map(l => ({
      start: l.start || "",
      end: l.end || "",
      text: l.text || "",
      url: l.url || ""
    }));
  }
  function isValidUrl(u){
    if (!u) return false;
    return /^(https?:|mailto:|tel:|ftp:|\/)/i.test(u) || /^www\./i.test(u);
  }
  function normalizeUrl(u){
    if (!u) return "";
    if (/^www\./i.test(u)) return "https://" + u;
    return u;
  }

  function daysFromMonday(monday){
    return DAY_LABELS.map((wk, i) => {
      const d = new Date(monday);
      d.setDate(d.getDate() + i);
      return {
        iso: toISO(d),
        label: `${d.getMonth()+1}/${d.getDate()}(${wk})`
      };
    });
  }
  const TIME_STEP_MINUTES = 30;
  const TIME_STEP_SECONDS = TIME_STEP_MINUTES * 60;

  function normalizeTimeToStep(hhmm, stepMinutes = TIME_STEP_MINUTES){
    if (!hhmm) return "";
    const [h, m] = hhmm.split(":").map(Number);
    if (!Number.isFinite(h) || !Number.isFinite(m)) return "";
    const total = h * 60 + m;
    const rounded = Math.round(total / stepMinutes) * stepMinutes;
    const normalized = ((rounded % 1440) + 1440) % 1440;
    return `${pad2(Math.floor(normalized / 60))}:${pad2(normalized % 60)}`;
  }

  function addMinutes(hhmm, minutes){
    const base = formatTimeHm(hhmm);
    if (!base) return "";
    const [h, m] = base.split(":").map(Number);
    const total = (((h * 60 + m + minutes) % 1440) + 1440) % 1440;
    return `${pad2(Math.floor(total / 60))}:${pad2(total % 60)}`;
  }

  function addOneHour(hhmm){
    return addMinutes(hhmm, 60);
  }

  function normalizeTimeRange(start, end){
    const s = formatTimeHm(start || "");
    const e = formatTimeHm(end || "");
    if (!s && !e) return { start: "", end: "" };
    if (s && (!e || e <= s)) return { start: s, end: addOneHour(s) };
    return { start: s, end: e };
  }

  // ───── custom time picker
  function formatTimeHm(hhmm){
    if (!hhmm) return "";
    const [h, m] = String(hhmm).split(":").map(Number);
    if (!Number.isFinite(h) || h < 0 || h > 23 || !Number.isFinite(m) || m < 0 || m > 59) return "";
    return `${pad2(h)}:${pad2(m)}`;
  }

  function ctpBuildHoursFrom(fromHhmm){
    const t = formatTimeHm(fromHhmm);
    if (!t) return Array.from({ length: 24 }, (_, h) => pad2(h));
    const startHour = Number(t.split(":")[0]);
    return Array.from({ length: 24 }, (_, i) => pad2((startHour + i) % 24));
  }

  const CTP_MINUTE_FINE = [];
  for (let m = 5; m < 60; m += 5) CTP_MINUTE_FINE.push(pad2(m));

  const ctpPanel = document.createElement("div");
  ctpPanel.className = "ctp-panel";
  ctpPanel.hidden = true;
  ctpPanel.setAttribute("role", "listbox");
  ctpPanel.innerHTML = '<div class="ctp-panel__cols"><div class="ctp-panel__col" data-ctp-col="h"></div><div class="ctp-panel__col" data-ctp-col="m"></div></div>';
  document.body.appendChild(ctpPanel);
  const ctpColH = ctpPanel.querySelector('[data-ctp-col="h"]');
  const ctpColM = ctpPanel.querySelector('[data-ctp-col="m"]');
  let ctpOpenPicker = null;

  function ctpParse(hhmm){
    const n = formatTimeHm(hhmm || "");
    if (!n) return { h: "09", m: "00" };
    const [h, m] = n.split(":");
    return { h, m };
  }

  function prevLineStartForDay(dayIdx, lineIdx){
    const lines = state.days[dayIdx]?.lines || [];
    for (let i = lineIdx - 1; i >= 0; i--){
      if (lines[i].start) return lines[i].start;
    }
    return state.workStartTime || "09:00";
  }

  function lastLineStartForDay(dayIdx){
    const lines = state.days[dayIdx]?.lines || [];
    for (let i = lines.length - 1; i >= 0; i--){
      if (lines[i].start) return lines[i].start;
    }
    return state.workStartTime || "09:00";
  }

  function ctpClose(){
    ctpPanel.hidden = true;
    if (ctpOpenPicker){
      ctpOpenPicker._trigger.classList.remove("is-open");
      ctpOpenPicker = null;
    }
  }

  function ctpPosition(anchor){
    const r = anchor.getBoundingClientRect();
    const pw = ctpPanel.offsetWidth || 148;
    let left = r.left;
    let top = r.bottom + 4;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (top + 220 > window.innerHeight - 8) top = r.top - 4 - (ctpPanel.offsetHeight || 200);
    ctpPanel.style.left = `${Math.max(8, left)}px`;
    ctpPanel.style.top = `${Math.max(8, top)}px`;
  }

  function ctpRenderHourCol(colEl, hours, selected, onSelect){
    colEl.innerHTML = "";
    hours.forEach(v => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ctp-panel__opt" + (v === selected ? " is-selected" : "");
      btn.textContent = v;
      btn.setAttribute("role", "option");
      btn.setAttribute("aria-selected", v === selected ? "true" : "false");
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        onSelect(v);
      });
      colEl.appendChild(btn);
    });
    const sel = colEl.querySelector(".is-selected");
    if (sel) sel.scrollIntoView({ block: "nearest" });
  }

  function ctpRenderMinuteCol(colEl, selected, onSelect){
    colEl.innerHTML = "";
    const addOpt = (v) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ctp-panel__opt" + (v === selected ? " is-selected" : "");
      btn.textContent = v;
      btn.setAttribute("role", "option");
      btn.setAttribute("aria-selected", v === selected ? "true" : "false");
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        onSelect(v);
      });
      colEl.appendChild(btn);
    };
    addOpt("00");
    addOpt("30");
    const sep = document.createElement("div");
    sep.className = "ctp-panel__sep";
    sep.textContent = "";
    sep.setAttribute("aria-hidden", "true");
    colEl.appendChild(sep);
    CTP_MINUTE_FINE.forEach(addOpt);
    const sel = colEl.querySelector(".is-selected");
    if (sel) sel.scrollIntoView({ block: "nearest" });
  }

  function ctpOpen(picker){
    ctpClose();
    ctpOpenPicker = picker;
    picker._trigger.classList.add("is-open");
    const { h, m } = ctpParse(picker.value);
    const getHours = () => ctpBuildHoursFrom(
      typeof picker._hourFrom === "function" ? picker._hourFrom() : ""
    );

    const apply = (newH, newM) => {
      const next = `${newH}:${newM}`;
      if (picker.value !== next){
        picker.value = next;
        picker.dispatchEvent(new Event("change", { bubbles: true }));
      }
      ctpRenderHourCol(ctpColH, getHours(), newH, nh => apply(nh, newM));
      ctpRenderMinuteCol(ctpColM, newM, nm => apply(newH, nm));
    };

    ctpRenderHourCol(ctpColH, getHours(), h, nh => apply(nh, m));
    ctpRenderMinuteCol(ctpColM, m, nm => apply(h, nm));
    ctpPanel.hidden = false;
    ctpPosition(picker._trigger);
    requestAnimationFrame(() => ctpPosition(picker._trigger));
  }

  document.addEventListener("click", (e) => {
    if (ctpPanel.hidden) return;
    if (ctpPanel.contains(e.target)) return;
    if (ctpOpenPicker && ctpOpenPicker._trigger.contains(e.target)) return;
    ctpClose();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape"){
      if ($transferModal && !$transferModal.hidden) closeTransferModal();
      ctpClose();
    }
  });
  window.addEventListener("resize", ctpClose);
  window.addEventListener("scroll", ctpClose, true);

  function createTimePicker(options = {}){
    const { compact = false, hourFrom = null } = options;
    const root = document.createElement("span");
    root.className = "ctp" + (compact ? " ctp--compact" : "");
    root._hourFrom = typeof hourFrom === "function" ? hourFrom : null;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "ctp__trigger";
    btn.setAttribute("aria-haspopup", "listbox");
    const label = document.createElement("span");
    label.className = "ctp__label";
    const icon = document.createElement("span");
    icon.className = "ctp__icon";
    icon.textContent = "▾";
    icon.setAttribute("aria-hidden", "true");
    btn.append(label, icon);
    root.appendChild(btn);
    root._trigger = btn;

    let _value = "";
    Object.defineProperty(root, "value", {
      get(){ return _value; },
      set(v){
        _value = formatTimeHm(v || "");
        const p = ctpParse(_value);
        label.textContent = _value ? `${p.h} : ${p.m}` : "-- : --";
      }
    });

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (ctpOpenPicker === root && !ctpPanel.hidden) ctpClose();
      else ctpOpen(root);
    });

    return root;
  }

  function mountTimePicker(host, options = {}){
    const picker = createTimePicker(options);
    if (host.id) picker.id = host.id;
    if (host.className){
      host.className.split(/\s+/).forEach(c => {
        if (c && c !== "ctp") picker.classList.add(c);
      });
    }
    host.replaceWith(picker);
    return picker;
  }

  const $workStartTime = mountTimePicker(document.getElementById("workStartTime"), {
    hourFrom: () => ""
  });
  const $lunchStart = mountTimePicker(document.getElementById("lunchStart"), {
    hourFrom: () => $workStartTime.value || state.workStartTime || "09:00"
  });
  const $lunchEnd = mountTimePicker(document.getElementById("lunchEnd"), {
    hourFrom: () => $lunchStart.value || state.lunchStart || "12:00"
  });

  // ───── state
  let state = {
    weekStart: toISO(mondayOf(new Date())),
    days: [],
    weeksByStart: {},
    name: "",
    workStartTime: "09:00",
    lunchStart: "12:00",
    lunchEnd: "13:00",
    filename: "",
    userEditedFilename: false
  };

  // ───── filename
  function buildDefaultFilename(){
    const wk = weekLabelFor(parseISO(state.weekStart)).replace(/-/g, "_");
    const nm = sanitize((state.name || "").trim()) || "이름";
    return `Dev Support팀 일일 업무_학습일지_${wk}_${nm}.docx`;
  }
  function refreshFilename(force){
    if (force || !state.userEditedFilename){
      state.filename = buildDefaultFilename();
      $filenameInput.value = state.filename;
    }
    updateAutoBtn();
  }
  function updateAutoBtn(){
    $autoBtn.classList.toggle("active", !state.userEditedFilename);
    $autoBtn.title = state.userEditedFilename ? "이름·주차에서 자동 생성" : "자동 모드 사용 중";
  }

  // ───── week storage helpers
  function isEmptyLine(l){
    return !l || (!l.start && !l.end && !l.text && !l.url);
  }
  function stripTrailingEmpty(arr){
    const out = normalizeLines(arr);
    while (out.length && isEmptyLine(out[out.length-1])) out.pop();
    return out;
  }
  function snapshotCurrentWeek(){
    if (!state.weekStart) return;
    state.weeksByStart[state.weekStart] = state.days.map(d => ({
      iso: d.iso, label: d.label, lines: stripTrailingEmpty(d.lines)
    }));
  }
  function loadWeekFromStore(mondayIso){
    const monday = parseISO(mondayIso);
    const dayMeta = daysFromMonday(monday);
    const stored = state.weeksByStart[mondayIso] || [];
    const prevByIso = Object.fromEntries(stored.map(x => {
      // backward compat: if stored has `content` (legacy v2) parse it
      if (x.lines) return [x.iso, normalizeLines(x.lines)];
      if (typeof x.content === "string") return [x.iso, parseContentToLines(x.content)];
      return [x.iso, []];
    }));
    state.days = dayMeta.map(d => ({
      iso: d.iso,
      label: d.label,
      lines: prevByIso[d.iso] || []
    }));
  }
  function goToWeek(newMondayIso){
    exitActiveEditor(true);
    snapshotCurrentWeek();
    state.weekStart = newMondayIso;
    loadWeekFromStore(newMondayIso);
    renderDays();
    renderLabel();
    refreshFilename(false);
    save();
  }

  // ───── render
  function rebuildDays(){
    loadWeekFromStore(state.weekStart);
    renderDays();
    renderLabel();
  }

  function formatTimeLabel(line){
    if (line.start && line.end) return `${line.start}–${line.end}`;
    if (line.start) return line.start;
    return "";
  }

  // Single-editor coordinator: only one line is in edit mode across the entire page
  let activeEditor = null; // { commit: fn, cancel: fn }
  function exitActiveEditor(commit){
    if (!activeEditor) return;
    const ed = activeEditor;
    activeEditor = null;
    if (commit) ed.commit(); else ed.cancel();
  }

  let transferContext = null;
  function cloneTransferLine(line){
    return {
      start: line.start || "",
      end: line.end || "",
      text: (line.text || "").trim(),
      url: (line.url || "").trim()
    };
  }
  function isTransferableLine(line){
    return !!(line && line.start && line.end && (line.text || "").trim());
  }
  function describeTransferLine(line){
    return `${formatTimeLabel(line)} ${(line.text || "").trim()}`.trim();
  }
  function transferModeLabel(mode){
    return mode === "move" ? "이동" : "복사";
  }
  function getTransferMode(){
    const checked = document.querySelector('input[name="transferMode"]:checked');
    return checked ? checked.value : "copy";
  }
  function closeTransferModal(){
    $transferModal.hidden = true;
    transferContext = null;
  }
  function openTransferModal(dayIdx, lineIdx, targetDayIdx){
    exitActiveEditor(true);
    ctpClose();

    const kind = lineIdx == null ? "empty" : "line";
    if (kind === "line"){
      if (dayIdx == null || lineIdx == null || !state.days[dayIdx] || !state.days[dayIdx].lines[lineIdx]){
        alert("옮길 로그를 찾을 수 없습니다.");
        return;
      }
      const sourceLine = state.days[dayIdx].lines[lineIdx];
      if (!isTransferableLine(sourceLine)){
        alert("시간과 내용이 모두 있는 로그만 이동/복사할 수 있습니다.");
        return;
      }
      if (state.days.length < 2){
        alert("이동/복사할 대상 날짜가 없습니다.");
        return;
      }
      transferContext = { kind, sourceDayIdx: dayIdx, lineIdx, targetDayIdx: null };
    } else {
      if (targetDayIdx == null || !state.days[targetDayIdx]){
        alert("가져올 대상 날짜를 찾을 수 없습니다.");
        return;
      }
      const hasSource = state.days.some((d, i) => i !== targetDayIdx && (d.lines || []).some(isTransferableLine));
      if (!hasSource){
        alert("가져올 수 있는 로그가 현재 주차에 없습니다.");
        return;
      }
      transferContext = { kind, sourceDayIdx: null, lineIdx: null, targetDayIdx };
    }

    $transferModal.hidden = false;
    updateTransferSummary();
    renderTransferTargets();
  }
  function updateTransferSummary(){
    if (!transferContext) return;
    const mode = transferModeLabel(getTransferMode());
    if (transferContext.kind === "line"){
      const source = state.days[transferContext.sourceDayIdx];
      const line = source.lines[transferContext.lineIdx];
      $transferSummary.textContent = `원본: ${source.label} ${describeTransferLine(line)}\n작업: ${mode}\n대상 날짜를 선택하면 로그가 대상 날짜의 마지막 줄 뒤에 추가됩니다.`;
    } else {
      const target = state.days[transferContext.targetDayIdx];
      $transferSummary.textContent = `대상: ${target.label}\n작업: ${mode}\n선택한 날짜의 시간/내용이 있는 로그만 가져옵니다.`;
    }
  }
  function renderTransferTargets(){
    if (!$transferTargetGrid || !transferContext) return;
    $transferTargetGrid.innerHTML = "";

    const candidates = transferContext.kind === "line"
      ? state.days
          .map((d, idx) => ({ d, idx }))
          .filter(item => item.idx !== transferContext.sourceDayIdx)
      : state.days
          .map((d, idx) => ({ d, idx }))
          .filter(item => item.idx !== transferContext.targetDayIdx && (item.d.lines || []).some(isTransferableLine));

    if (candidates.length === 0){
      const empty = document.createElement("div");
      empty.className = "lines-empty";
      empty.textContent = transferContext.kind === "line" ? "선택할 대상 날짜가 없습니다." : "선택할 가져오기 날짜가 없습니다.";
      $transferTargetGrid.appendChild(empty);
      return;
    }

    candidates.forEach(({ d, idx }) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "transfer-day-btn";
      const validCount = (d.lines || []).filter(isTransferableLine).length;
      if (transferContext.kind === "empty" && validCount === 0) btn.disabled = true;
      const strong = document.createElement("strong");
      strong.textContent = d.label;
      const span = document.createElement("span");
      span.textContent = `${d.iso} · 가져올 수 있는 로그 ${validCount}개`;
      btn.append(strong, span);
      btn.addEventListener("click", () => applyTransferToSelectedDay(idx));
      $transferTargetGrid.appendChild(btn);
    });
  }
  function applyTransferToSelectedDay(selectedDayIdx){
    if (!transferContext) return;
    const mode = getTransferMode();
    if (transferContext.kind === "line"){
      transferLineToTarget(transferContext.sourceDayIdx, transferContext.lineIdx, selectedDayIdx, mode);
    } else {
      transferAllLinesFromSource(selectedDayIdx, transferContext.targetDayIdx, mode);
    }
  }
  function transferLineToTarget(sourceDayIdx, lineIdx, targetDayIdx, mode){
    const source = state.days[sourceDayIdx];
    const target = state.days[targetDayIdx];
    const line = source.lines[lineIdx];
    if (!isTransferableLine(line)){
      alert("시간과 내용이 모두 있는 로그만 이동/복사할 수 있습니다.");
      return;
    }
    target.lines = target.lines || [];
    target.lines.push(cloneTransferLine(line));
    if (mode === "move"){
      source.lines.splice(lineIdx, 1);
    }
    closeTransferModal();
    renderDays();
    scheduleSave();
  }
  function transferAllLinesFromSource(sourceDayIdx, targetDayIdx, mode){
    const source = state.days[sourceDayIdx];
    const target = state.days[targetDayIdx];
    const validIndices = [];
    const linesToTransfer = [];
    (source.lines || []).forEach((line, idx) => {
      if (isTransferableLine(line)){
        validIndices.push(idx);
        linesToTransfer.push(cloneTransferLine(line));
      }
    });
    if (linesToTransfer.length === 0){
      alert("시간과 내용이 모두 있는 로그만 가져올 수 있습니다.");
      return;
    }
    target.lines = target.lines || [];
    target.lines.push(...linesToTransfer);
    if (mode === "move"){
      const validIndexSet = new Set(validIndices);
      source.lines = (source.lines || []).filter((_, idx) => !validIndexSet.has(idx));
    }
    closeTransferModal();
    renderDays();
    scheduleSave();
  }

  function renderLinesContainer(dayIdx, container, onLineTimeChanged){
    container.innerHTML = "";
    const day = state.days[dayIdx];
    day.lines = day.lines || [];
    if (day.lines.length === 0){
      const empty = document.createElement("div");
      empty.className = "lines-empty";
      empty.textContent = "아래에서 시간/내용 입력 후 + 추가 하세요.";
      container.appendChild(empty);
      const importBtn = document.createElement("button");
      importBtn.type = "button";
      importBtn.className = "empty-import-btn";
      importBtn.textContent = "다른 날짜에서 가져오기";
      importBtn.addEventListener("click", () => openTransferModal(null, null, dayIdx));
      container.appendChild(importBtn);
      return;
    }
    day.lines.forEach((line, li) => {
      const row = buildLineRow(dayIdx, li, container, onLineTimeChanged);
      container.appendChild(row);
    });
  }

  function buildLineRow(dayIdx, li, container, onLineTimeChanged){
    const line = state.days[dayIdx].lines[li];
    const row = document.createElement("div");
    row.className = "line-row";

    // ── time column (always editable inputs)
    const timeEl = document.createElement("div");
    timeEl.className = "time";
    const sIn = createTimePicker({
      compact: true,
      hourFrom: () => prevLineStartForDay(dayIdx, li)
    });
    sIn.value = formatTimeHm(line.start || "");
    const tDash = document.createElement("span"); tDash.className = "dash"; tDash.textContent = "–";
    const eIn = createTimePicker({
      compact: true,
      hourFrom: () => sIn.value || prevLineStartForDay(dayIdx, li)
    });
    eIn.value = formatTimeHm(line.end || "");
    sIn.addEventListener("change", () => {
      const currentLine = state.days[dayIdx].lines[li];
      const { start, end } = normalizeTimeRange(sIn.value, currentLine.end);
      currentLine.start = start;
      currentLine.end = end;
      sIn.value = start;
      eIn.value = end;
      scheduleSave();
    });
    eIn.addEventListener("change", () => {
      const currentLine = state.days[dayIdx].lines[li];
      const { start, end } = normalizeTimeRange(currentLine.start, eIn.value);
      currentLine.start = start;
      currentLine.end = end;
      sIn.value = start;
      eIn.value = end;
      if (typeof onLineTimeChanged === "function") {
        onLineTimeChanged(end);
      }
      scheduleSave();
    });
    timeEl.append(sIn, tDash, eIn);

    // ── middle (text display) + right (actions)
    const textEl = document.createElement("div");
    textEl.className = "text";
    const actions = document.createElement("div");
    actions.className = "actions-inline";

    const renderDisplay = () => {
      textEl.classList.remove("has-link", "placeholder");
      const ln = state.days[dayIdx].lines[li];
      const hasLink = isValidUrl(ln.url);
      if (ln.text){
        textEl.textContent = ln.text;
        if (hasLink) textEl.classList.add("has-link");
        textEl.title = hasLink ? `클릭하여 편집 · 링크: ${normalizeUrl(ln.url)}` : "클릭하여 편집";
      } else {
        textEl.textContent = "내용 입력...";
        textEl.classList.add("placeholder");
        textEl.title = "클릭하여 편집";
      }
      // actions
      actions.innerHTML = "";
      const openBtn = document.createElement("a");
      openBtn.className = "iconbtn" + (hasLink ? "" : " disabled");
      if (hasLink){
        openBtn.href = normalizeUrl(ln.url);
        openBtn.target = "_blank";
        openBtn.rel = "noopener noreferrer";
        openBtn.title = "링크 열기";
      } else {
        openBtn.title = "링크 없음";
      }
      openBtn.textContent = "↗";
      openBtn.style.textDecoration = "none";
      actions.appendChild(openBtn);

      const transferBtn = document.createElement("button");
      transferBtn.className = "iconbtn";
      transferBtn.type = "button";
      transferBtn.textContent = "이동";
      transferBtn.title = "이동/복사";
      transferBtn.addEventListener("click", () => {
        exitActiveEditor(true);
        openTransferModal(dayIdx, li);
      });
      actions.appendChild(transferBtn);

      const delBtn = document.createElement("button");
      delBtn.className = "iconbtn";
      delBtn.type = "button";
      delBtn.textContent = "✕";
      delBtn.title = "삭제";
      delBtn.addEventListener("click", () => {
        exitActiveEditor(true);
        state.days[dayIdx].lines.splice(li, 1);
        renderLinesContainer(dayIdx, container, onLineTimeChanged);
        scheduleSave();
      });
      actions.appendChild(delBtn);
    };

    textEl.addEventListener("click", () => {
      // exit any other active editor first (commit it), then enter this one
      exitActiveEditor(true);
      enterEditMode(dayIdx, li, row, textEl, actions, renderDisplay, container);
    });

    renderDisplay();
    row.append(timeEl, textEl, actions);
    return row;
  }

  function enterEditMode(dayIdx, lineIdx, row, textEl, actionsEl, renderDisplay, container){
    const line = state.days[dayIdx].lines[lineIdx];

    // swap middle cell: replace text div with input pair
    const mid = document.createElement("div");
    mid.className = "edit-mid";
    const tI = document.createElement("input"); tI.type = "text"; tI.className = "edit-text"; tI.placeholder = "내용"; tI.value = line.text || "";
    const uI = document.createElement("input"); uI.type = "text"; uI.className = "edit-url";  uI.placeholder = "링크 (선택)"; uI.value = line.url || "";
    mid.append(tI, uI);
    row.replaceChild(mid, textEl);

    // swap right cell: replace actions with save/cancel
    const newActions = document.createElement("div");
    newActions.className = "actions-inline";
    const okBtn = document.createElement("button"); okBtn.className = "iconbtn"; okBtn.type = "button"; okBtn.textContent = "✓"; okBtn.title = "저장";
    const cancelBtn = document.createElement("button"); cancelBtn.className = "iconbtn"; cancelBtn.type = "button"; cancelBtn.textContent = "↶"; cancelBtn.title = "취소";
    newActions.append(okBtn, cancelBtn);
    row.replaceChild(newActions, actionsEl);

    tI.focus();
    tI.setSelectionRange(tI.value.length, tI.value.length);

    const restoreDisplay = () => {
      if (mid.parentNode === row) row.replaceChild(textEl, mid);
      if (newActions.parentNode === row) row.replaceChild(actionsEl, newActions);
      renderDisplay();
    };

    const commit = () => {
      state.days[dayIdx].lines[lineIdx] = {
        start: state.days[dayIdx].lines[lineIdx].start || "",
        end:   state.days[dayIdx].lines[lineIdx].end   || "",
        text: (tI.value || "").trim(),
        url:  (uI.value || "").trim()
      };
      restoreDisplay();
      scheduleSave();
    };
    const cancel = () => {
      restoreDisplay();
    };

    activeEditor = { commit, cancel };

    okBtn.addEventListener("click", () => exitActiveEditor(true));
    cancelBtn.addEventListener("click", () => exitActiveEditor(false));
    [tI, uI].forEach(inp => inp.addEventListener("keydown", ev => {
      if (ev.key === "Enter"){ ev.preventDefault(); exitActiveEditor(true); }
      else if (ev.key === "Escape"){ ev.preventDefault(); exitActiveEditor(false); }
    }));
  }


  function renderDays(){
    $daysBody.innerHTML = "";
    state.days.forEach((d, i) => {
      const tr = document.createElement("tr");

      const tdDate = document.createElement("td");
      tdDate.className = "date-cell";
      tdDate.textContent = d.label;

      const tdContent = document.createElement("td");
      const linesContainer = document.createElement("div");
      linesContainer.className = "lines";
      tdContent.appendChild(linesContainer);

      // time helper
      const helper = document.createElement("div");
      helper.className = "timehelper";
      const defaultStart = normalizeTimeToStep(state.workStartTime || "09:00");
      const startI = createTimePicker({
        compact: true,
        hourFrom: () => lastLineStartForDay(i)
      });
      startI.value = defaultStart;
      const dash = document.createElement("span"); dash.className = "dash"; dash.textContent = "–";
      const endI = createTimePicker({
        compact: true,
        hourFrom: () => startI.value || lastLineStartForDay(i)
      });
      endI.value = addOneHour(defaultStart);
      const textI = document.createElement("input"); textI.type = "text"; textI.placeholder = "내용";
      const urlI = document.createElement("input"); urlI.type = "text"; urlI.placeholder = "링크 (선택)";
      const addBtn = document.createElement("button"); addBtn.textContent = "+ 추가";

      const syncHelperFromLineEnd = (lineEnd) => {
        const nextStart = formatTimeHm(lineEnd);
        if (!nextStart) return;
        startI.value = nextStart;
        endI.value = addOneHour(nextStart);
      };

      startI.addEventListener("change", () => {
        const { start, end } = normalizeTimeRange(startI.value, endI.value);
        startI.value = start;
        endI.value = end;
      });

      endI.addEventListener("change", () => {
        const { start, end } = normalizeTimeRange(startI.value, endI.value);
        startI.value = start;
        endI.value = end;
      });

      renderLinesContainer(i, linesContainer, syncHelperFromLineEnd);

      const pushLine = (obj) => {
        state.days[i].lines = state.days[i].lines || [];
        state.days[i].lines.push(obj);
      };
      const doAdd = () => {
        exitActiveEditor(true);
        const { start, end } = normalizeTimeRange(startI.value, endI.value);
        const t = textI.value.trim();
        const u = urlI.value.trim();
        if (!start || !end) return;
        startI.value = start;
        endI.value = end;
        pushLine({ start, end, text: t, url: u });
        // shift defaults — jump over lunch if next slot would land before/in lunch
        let nextStart = end;
        let nextEnd = addOneHour(nextStart);
        const ls = normalizeTimeToStep(state.lunchStart || "12:00");
        const le = normalizeTimeToStep(state.lunchEnd   || "13:00");
        if (ls < le && nextStart < le && nextEnd > ls){
          if (nextStart <= ls) {
            const dayLines = state.days[i].lines;
            const lastLine = dayLines[dayLines.length - 1];
            if (lastLine && lastLine.end !== ls) {
              lastLine.end = ls;
            }
            pushLine({ start: ls, end: le, text: "점심식사", url: "" });
          }
          nextStart = le;
          nextEnd = addOneHour(le);
        }
        startI.value = nextStart;
        endI.value = nextEnd;
        textI.value = "";
        urlI.value = "";
        textI.focus();
        renderLinesContainer(i, linesContainer, syncHelperFromLineEnd);
        scheduleSave();
      };
      addBtn.addEventListener("click", doAdd);
      const onEnter = ev => { if (ev.key === "Enter"){ ev.preventDefault(); doAdd(); } };
      textI.addEventListener("keydown", onEnter);
      urlI.addEventListener("keydown", onEnter);

      helper.append(startI, dash, endI, textI, urlI, addBtn);
      tdContent.appendChild(helper);

      tr.appendChild(tdDate);
      tr.appendChild(tdContent);
      $daysBody.appendChild(tr);
    });
  }

  function renderLabel(){
    const monday = parseISO(state.weekStart);
    const label = weekLabelFor(monday);
    $weekLabel.textContent = label;
    $weekLabelCell.textContent = label;
    if ($weekRange) $weekRange.textContent = rangeLabelFor(monday);
  }

  // ───── persistence
  let saveTimer = null;
  function scheduleSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 400);
  }
  function save(){
    snapshotCurrentWeek();
    const payload = {
      schema: 3,
      name: state.name,
      workStartTime: state.workStartTime,
      lunchStart: state.lunchStart,
      lunchEnd: state.lunchEnd,
      weekStart: state.weekStart,
      weeksByStart: state.weeksByStart,
      filename: state.filename,
      userEditedFilename: state.userEditedFilename,
      savedAt: new Date().toISOString()
    };
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      const t = new Date();
      $saveState.textContent = `저장됨 ${pad2(t.getHours())}:${pad2(t.getMinutes())}:${pad2(t.getSeconds())}`;
      $saveState.classList.add("flash");
      setTimeout(() => $saveState.classList.remove("flash"), 600);
    } catch(e){
      $saveState.textContent = "저장 실패";
    }
  }
  function load(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const obj = JSON.parse(raw);
      if (obj && (obj.schema === 2 || obj.schema === 3) && obj.weekStart && obj.weeksByStart){
        state.weekStart = obj.weekStart;
        // migrate week storage to lines-based shape
        const wbs = obj.weeksByStart || {};
        const migrated = {};
        Object.keys(wbs).forEach(k => {
          migrated[k] = (wbs[k] || []).map(x => {
            if (x.lines) return { iso: x.iso, label: x.label, lines: normalizeLines(x.lines) };
            if (typeof x.content === "string"){
              return { iso: x.iso, label: x.label, lines: parseContentToLines(x.content) };
            }
            return { iso: x.iso, label: x.label, lines: [] };
          });
        });
        state.weeksByStart = migrated;
        state.name = obj.name || "";
        state.workStartTime = obj.workStartTime || "09:00";
        state.lunchStart = obj.lunchStart || "12:00";
        state.lunchEnd = obj.lunchEnd || "13:00";
        state.filename = obj.filename || "";
        state.userEditedFilename = !!obj.userEditedFilename;
        return true;
      }
    } catch(e){}
    return false;
  }

  // ───── events
  function shiftWeek(deltaDays){
    const m = parseISO(state.weekStart);
    m.setDate(m.getDate() + deltaDays);
    goToWeek(toISO(m));
  }
  $prevWeekBtn.addEventListener("click", () => shiftWeek(-7));
  $nextWeekBtn.addEventListener("click", () => shiftWeek(7));
  $todayWeekBtn.addEventListener("click", () => {
    const iso = toISO(mondayOf(new Date()));
    if (iso !== state.weekStart) goToWeek(iso);
  });

  $nameInput.addEventListener("input", () => {
    state.name = $nameInput.value;
    refreshFilename(false);
    scheduleSave();
  });

  $workStartTime.addEventListener("change", () => {
    state.workStartTime = normalizeTimeToStep($workStartTime.value) || "09:00";
    $workStartTime.value = state.workStartTime;
    renderDays();
    scheduleSave();
  });

  $lunchStart.addEventListener("change", () => {
    state.lunchStart = normalizeTimeToStep($lunchStart.value) || "12:00";
    $lunchStart.value = state.lunchStart;
    scheduleSave();
  });
  $lunchEnd.addEventListener("change", () => {
    state.lunchEnd = normalizeTimeToStep($lunchEnd.value) || "13:00";
    $lunchEnd.value = state.lunchEnd;
    scheduleSave();
  });

  $filenameInput.addEventListener("input", () => {
    state.filename = $filenameInput.value;
    state.userEditedFilename = true;
    updateAutoBtn();
    scheduleSave();
  });

  $autoBtn.addEventListener("click", () => {
    state.userEditedFilename = false;
    refreshFilename(true);
    save();
  });

  $transferCloseBtn.addEventListener("click", closeTransferModal);
  $transferCancelBtn.addEventListener("click", closeTransferModal);
  document.querySelectorAll('input[name="transferMode"]').forEach(input => {
    input.addEventListener("change", () => {
      updateTransferSummary();
      renderTransferTargets();
    });
  });
  $transferModal.addEventListener("click", (e) => {
    if (e.target === $transferModal) closeTransferModal();
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    const m = parseISO(state.weekStart), f = fridayOf(m);
    if (!confirm(`${toISO(m)} ~ ${toISO(f)} 주차 내용을 비웁니다.\n계속할까요?`)) return;
    state.days.forEach(d => d.lines = []);
    renderDays();
    save();
  });

  document.getElementById("saveHtmlBtn").addEventListener("click", () => {
    const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "devsupport_log.html";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  // ───── export to .docx
  document.getElementById("exportBtn").addEventListener("click", () => {
    save();
    if (typeof docx === "undefined"){
      alert("docx 라이브러리를 불러오지 못했습니다. 네트워크를 확인해주세요.");
      return;
    }
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      WidthType, AlignmentType, BorderStyle, HeightRule, VerticalAlign,
      ExternalHyperlink, UnderlineType
    } = docx;

    const wkLabel = weekLabelFor(parseISO(state.weekStart));

    const BLUE  = { style: BorderStyle.SINGLE, size: 18, color: "4F81BD" };
    const BLACK = { style: BorderStyle.SINGLE, size: 4,  color: "000000" };
    const NONE  = { style: BorderStyle.NONE,   size: 0,  color: "auto" };

    const FONT = "맑은 고딕";

    const runOpts = (opts={}) => {
      const o = {
        font: { name: FONT, eastAsia: FONT, hAnsi: FONT, cs: "Arial" },
        bold: !!opts.bold,
        size: opts.size || 22,
      };
      if (opts.color) o.color = opts.color;
      if (opts.charSpacing != null) o.characterSpacing = opts.charSpacing;
      return o;
    };
    const para = (text, opts = {}) => new Paragraph({
      alignment: opts.align || AlignmentType.LEFT,
      spacing: { before: 0, after: 0, line: 240, lineRule: "auto" },
      children: [ new TextRun({ text: text || "", ...runOpts(opts) }) ]
    });
    const multiPara = (text) => {
      const lines = (text || "").split(/\r?\n/);
      return lines.map(l => para(l));
    };

    // Build a paragraph for one structured line, with optional hyperlink on text portion
    const linePara = (line) => {
      const children = [];
      const timeLabel = line.start && line.end
        ? `${line.start}-${line.end}`
        : (line.start || "");
      if (timeLabel){
        children.push(new TextRun({ text: timeLabel + (line.text ? " " : ""), ...runOpts({ bold: true }) }));
      }
      if (line.text){
        if (isValidUrl(line.url)){
          const link = normalizeUrl(line.url);
          children.push(new ExternalHyperlink({
            link: link,
            children: [
              new TextRun({
                text: line.text,
                ...runOpts({ bold: true, color: "0000FF" }),
                underline: { type: UnderlineType.SINGLE, color: "0000FF" }
              })
            ]
          }));
        } else {
          children.push(new TextRun({ text: line.text, ...runOpts({ bold: true }) }));
        }
      }
      if (children.length === 0){
        children.push(new TextRun({ text: "", ...runOpts() }));
      }
      return new Paragraph({
        alignment: AlignmentType.BOTH,
        spacing: { before: 0, after: 0, line: 240, lineRule: "auto" },
        children
      });
    };

    // ── Header table
    const headerCell = (children, opts={}) => new TableCell({
      width: { size: opts.width, type: WidthType.DXA },
      verticalAlign: VerticalAlign.CENTER,
      borders: { top: BLUE, bottom: BLUE, left: NONE, right: NONE },
      children: Array.isArray(children) ? children : [children],
    });

    const headerTable = new Table({
      width: { size: 10000, type: WidthType.DXA },
      columnWidths: [8222, 1778],
      borders: {
        top: BLUE, bottom: BLUE, left: NONE, right: NONE,
        insideHorizontal: NONE, insideVertical: NONE
      },
      rows: [
        new TableRow({
          height: { value: 948, rule: HeightRule.ATLEAST },
          children: [
            headerCell(
              para("Dev Support팀 일일업무_학습일지", { bold: true, size: 24, charSpacing: -6 }),
              { width: 8222 }
            ),
            headerCell(
              para(wkLabel, { bold: true, size: 22, charSpacing: -6, align: AlignmentType.RIGHT }),
              { width: 1778 }
            ),
          ]
        })
      ]
    });

    // ── Body table
    const bodyCell = (children, opts={}) => new TableCell({
      width: { size: opts.width, type: WidthType.DXA },
      verticalAlign: VerticalAlign.CENTER,
      shading: opts.shade ? { fill: opts.shade } : undefined,
      borders: {
        top: BLACK, bottom: BLACK, left: NONE, right: NONE,
      },
      children: Array.isArray(children) ? children : [children],
    });

    const bodyRows = [
      new TableRow({
        tableHeader: true,
        height: { value: 425, rule: HeightRule.ATLEAST },
        children: [
          bodyCell(para("날짜", { bold: true, align: AlignmentType.CENTER }),
            { width: 2786, shade: "D9D9D9" }),
          bodyCell(para("내용", { bold: true, align: AlignmentType.CENTER }),
            { width: 7498, shade: "D9D9D9" }),
        ]
      }),
      ...state.days.map(d => {
        const lines = (d.lines && d.lines.length) ? d.lines : [{ start:"", end:"", text:"", url:"" }];
        return new TableRow({
          height: { value: 1941, rule: HeightRule.ATLEAST },
          children: [
            bodyCell(para(d.label, { bold: true, align: AlignmentType.CENTER }), { width: 2786 }),
            bodyCell(lines.map(linePara), { width: 7498 }),
          ]
        });
      })
    ];

    const bodyTable = new Table({
      width: { size: 10284, type: WidthType.DXA },
      columnWidths: [2786, 7498],
      borders: {
        top: BLACK, bottom: BLACK, left: NONE, right: NONE,
        insideHorizontal: BLACK, insideVertical: BLACK
      },
      rows: bodyRows
    });

    // ── Footer table
    const footerTable = new Table({
      width: { size: 10194, type: WidthType.DXA },
      columnWidths: [10194],
      borders: {
        top: BLACK, bottom: BLACK, left: NONE, right: NONE,
        insideHorizontal: NONE, insideVertical: NONE
      },
      rows: [
        new TableRow({
          height: { value: 570, rule: HeightRule.ATLEAST },
          children: [
            new TableCell({
              width: { size: 10194, type: WidthType.DXA },
              verticalAlign: VerticalAlign.CENTER,
              shading: { fill: "D9D9D9" },
              borders: { top: BLACK, bottom: BLACK, left: NONE, right: NONE },
              children: [
                para("사내 '팀 매칭' 또는 타 회사 채용 공고 링크 (주 1회 이상 지원 필수)",
                  { bold: true, color: "0000FF", align: AlignmentType.CENTER }),
                para("사내 '팀 매칭' 시도를 위한 소속 부서원 내지 부서장과 커피미팅 (월 1회 이상 시도 필수)",
                  { bold: true, color: "0000FF", align: AlignmentType.CENTER }),
              ]
            })
          ]
        })
      ]
    });

    const blankPara = () => new Paragraph({ children: [ new TextRun({ text: "" }) ] });

    const doc = new Document({
      styles: {
        default: {
          document: { run: { font: { name: FONT, eastAsia: FONT, hAnsi: FONT }, size: 22 } }
        }
      },
      sections: [{
        properties: {
          page: {
            size: { width: 11906, height: 16838 },
            margin: { top: 284, right: 1077, bottom: 851, left: 851, header: 510, footer: 0, gutter: 0 }
          }
        },
        children: [
          headerTable,
          blankPara(),
          bodyTable,
          blankPara(),
          footerTable,
        ]
      }]
    });

    let filename = (state.filename || "").trim();
    if (!filename) filename = buildDefaultFilename();
    if (!/\.docx$/i.test(filename)) filename += ".docx";

    Packer.toBlob(doc).then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }).catch(err => {
      console.error(err);
      alert(".docx 생성 중 오류: " + err.message);
    });
  });

  // ───── init
  function init(){
    const loaded = load();
    if (!loaded){
      state.weekStart = toISO(mondayOf(new Date()));
      state.weeksByStart = {};
    }
    state.weekStart = toISO(mondayOf(parseISO(state.weekStart)));
    $nameInput.value = state.name || "";
    $workStartTime.value = normalizeTimeToStep(state.workStartTime || "09:00");
    $lunchStart.value = normalizeTimeToStep(state.lunchStart || "12:00");
    $lunchEnd.value = normalizeTimeToStep(state.lunchEnd || "13:00");
    rebuildDays();
    if (state.userEditedFilename && state.filename){
      $filenameInput.value = state.filename;
      updateAutoBtn();
    } else {
      refreshFilename(true);
    }
    if (loaded && (state.days.some(d => d.lines && d.lines.length) || state.name)){
      $saveState.textContent = "복원됨";
    }
  }
  init();
})();
</script>
</body>
</html>
