<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Happy retirement sun">
  <defs>
    <radialGradient id="sun" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- 따뜻한 햇살 (황혼의 빛, 노년의 평온) -->
  <g stroke="#f59e0b" stroke-width="3.2" stroke-linecap="round">
    <line x1="32" y1="3"  x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="61"/>
    <line x1="3"  y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="61" y2="32"/>
    <line x1="11" y1="11" x2="16" y2="16"/>
    <line x1="48" y1="48" x2="53" y2="53"/>
    <line x1="53" y1="11" x2="48" y2="16"/>
    <line x1="16" y1="48" x2="11" y2="53"/>
  </g>
  <!-- 태양 본체 -->
  <circle cx="32" cy="32" r="18" fill="url(#sun)" stroke="#f59e0b" stroke-width="1"/>
  <!-- 행복한 눈 (살짝 감긴 웃는 눈) -->
  <path d="M 23 28 Q 26 25 29 28" stroke="#7c2d12" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M 35 28 Q 38 25 41 28" stroke="#7c2d12" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- 미소 -->
  <path d="M 24 36 Q 32 44 40 36" stroke="#7c2d12" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- 발그레한 볼 -->
  <circle cx="22" cy="34" r="2" fill="#fb7185" opacity="0.55"/>
  <circle cx="42" cy="34" r="2" fill="#fb7185" opacity="0.55"/>
</svg>
