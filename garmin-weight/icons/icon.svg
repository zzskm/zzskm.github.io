<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 라이트 페이퍼 배경, 둥근 사각형 -->
  <rect width="512" height="512" rx="96" fill="#e8e8e8"/>

  <!-- 체중계 본체 윤곽 (rounded square) -->
  <rect x="76" y="120" width="360" height="320" rx="48"
        fill="#f4f4f4" stroke="#262626" stroke-width="14"/>

  <!-- 상단 다이얼 영역 (반원 게이지) -->
  <!-- 호: 중심(256, 296), 반지름 130, 200° → -20° (왼쪽 아래에서 오른쪽 아래) -->
  <path d="M 134 348 A 130 130 0 1 1 378 348"
        fill="none" stroke="#262626" stroke-width="10" stroke-linecap="round"/>
  <!-- accent 호 (현재 측정 위치 표시 — 좌측 1/3) -->
  <path d="M 134 348 A 130 130 0 0 1 256 218"
        fill="none" stroke="#4F81BD" stroke-width="12" stroke-linecap="round"/>

  <!-- 눈금 -->
  <g stroke="#262626" stroke-width="6" stroke-linecap="round">
    <line x1="134" y1="348" x2="146" y2="338"/>
    <line x1="166" y1="278" x2="180" y2="290"/>
    <line x1="226" y1="226" x2="234" y2="242"/>
    <line x1="286" y1="226" x2="278" y2="242"/>
    <line x1="346" y1="278" x2="332" y2="290"/>
    <line x1="378" y1="348" x2="366" y2="338"/>
  </g>

  <!-- 바늘 -->
  <g>
    <line x1="256" y1="348" x2="206" y2="252"
          stroke="#262626" stroke-width="10" stroke-linecap="round"/>
    <circle cx="256" cy="348" r="14" fill="#4F81BD" stroke="#262626" stroke-width="6"/>
  </g>

  <!-- 발판 라인 (체중계 표면) -->
  <line x1="116" y1="400" x2="396" y2="400"
        stroke="rgba(38,38,38,0.28)" stroke-width="6" stroke-linecap="round"/>
</svg>
