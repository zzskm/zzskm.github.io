<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>체중 대시보드</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%23c25a31'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app" data-state="loading">
    <header class="topbar">
      <div class="brandmark">
        <span class="dot"></span>
        <span class="brand-text">체중 대시보드</span>
      </div>
      <div class="topbar-meta">
        <span id="lastSync" class="sync-text">동기화 중…</span>
        <button id="reloadBtn" class="icon-button" type="button" aria-label="다시 불러오기" title="다시 불러오기 (R)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16" />
            <path d="M3 21v-5h5" />
          </svg>
        </button>
      </div>
    </header>

    <div class="main-grid">
    <!-- HERO: goal progress (left) + current state (right) -->
    <section class="hero">
      <div class="hero-grid">
        <div class="hero-left">
          <p class="eyebrow">목표 진행률</p>
          <h1 class="hero-title">
            <span id="goalProgressPct" class="title-num">–</span><span class="title-unit">%</span>
          </h1>
          <p id="goalSubtitle" class="hero-sub">–</p>
          <div class="progress">
            <div class="progress-track">
              <div id="progressFill" class="progress-fill" style="width:0%"></div>
              <div id="progressMarker" class="progress-marker" style="left:0%">
                <span class="progress-marker-dot"></span>
              </div>
            </div>
            <div class="progress-legend">
              <span><em id="startWeight">–</em> <small>시작</small></span>
              <span class="progress-legend-right"><em id="targetWeight">–</em> <small>목표</small></span>
            </div>
          </div>
        </div>

        <div class="hero-right">
          <div class="current-weight-block">
            <p class="label">현재 체중</p>
            <div class="big-weight">
              <span id="currentWeight">–</span>
              <span class="big-weight-unit">kg</span>
            </div>
            <p class="big-weight-meta">
              <span id="currentDelta" class="delta">–</span>
              <span class="big-weight-sep"> · </span>
              <span id="currentDate">–</span>
            </p>
          </div>
          <div class="hero-metrics">
            <div class="hero-metric">
              <p class="label">7일 평균</p>
              <p id="ma7Weight" class="hero-metric-val">–</p>
              <p id="ma7Delta" class="hero-metric-sub">–</p>
            </div>
            <div class="hero-metric">
              <p class="label">주당 변화</p>
              <p id="weeklyLossRate" class="hero-metric-val">–</p>
              <p id="rateContext" class="hero-metric-sub">–</p>
            </div>
            <div class="hero-metric">
              <p class="label">목표까지</p>
              <p id="goalEta" class="hero-metric-val">–</p>
              <p id="goalEtaDate" class="hero-metric-sub">–</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Bottom cards alongside hero -->
    <section class="bottom-row">
      <article class="bottom-card">
        <p class="label">7일 변동폭</p>
        <p id="weightRange" class="bottom-val">–</p>
        <div id="sparkRange" class="spark"></div>
        <p id="weightRangeHint" class="bottom-hint">–</p>
      </article>
      <article class="bottom-card">
        <p class="label">30일 기록 완성도</p>
        <p id="logCoverage" class="bottom-val">–</p>
        <div id="coverageDots" class="dots"></div>
        <p id="coverageHint" class="bottom-hint">–</p>
      </article>
    </section>
    </div><!-- /main-grid -->

    <!-- Trend + scenarios (scenarios replace duplicate 1m/3m insight cards) -->
    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">체중 추이</p>
          <h2 class="panel-title">실제 · 이동평균 · 예측</h2>
        </div>
        <div class="panel-controls">
          <div class="seg" role="tablist" aria-label="기간">
            <button class="seg-btn" data-range="30" type="button">30일</button>
            <button class="seg-btn is-active" data-range="60" type="button">60일</button>
            <button class="seg-btn" data-range="all" type="button">전체</button>
          </div>
          <div class="chips" role="group" aria-label="표시 항목">
            <label class="chip" data-series="ma7">
              <input type="checkbox" checked />
              <span class="chip-swatch" style="--c:var(--ma7)"></span>
              7일 평균
            </label>
            <label class="chip" data-series="ma14">
              <input type="checkbox" />
              <span class="chip-swatch" style="--c:var(--ma14)"></span>
              14일 평균
            </label>
            <label class="chip" data-series="prediction">
              <input type="checkbox" checked />
              <span class="chip-swatch" style="--c:var(--predict)"></span>
              예측
            </label>
          </div>
        </div>
      </div>

      <div class="chart-wrap">
        <canvas id="weightChart" aria-label="체중 추세 차트" role="img"></canvas>
      </div>

      <div class="scenarios">
        <div class="scenarios-head">
          <p class="scenarios-label">3개월 시나리오</p>
          <p class="scenarios-hint">선택한 시나리오가 차트 예측선에 반영됩니다</p>
        </div>
        <div class="scenarios-grid">
          <button class="scenario" data-scenario="optimistic" type="button">
            <span class="scenario-tag">낙관적</span>
            <span id="scenarioOpt" class="scenario-val">–</span>
            <span class="scenario-sub">×1.0 속도</span>
          </button>
          <button class="scenario is-active" data-scenario="base" type="button">
            <span class="scenario-tag">기본</span>
            <span id="scenarioBase" class="scenario-val">–</span>
            <span class="scenario-sub">×0.8 속도</span>
          </button>
          <button class="scenario" data-scenario="conservative" type="button">
            <span class="scenario-tag">보수적</span>
            <span id="scenarioCon" class="scenario-val">–</span>
            <span class="scenario-sub">×0.6 속도</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Activity: minutes primary -->
    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">활동 · 최근 30일</p>
          <h2 class="panel-title">운동 시간</h2>
        </div>
        <p id="activityRange" class="panel-caption">–</p>
      </div>

      <div class="activity-summary">
        <div class="activity-primary">
          <span id="exerciseMinutes" class="activity-primary-val">–</span>
          <span class="activity-primary-unit">분</span>
          <span class="activity-primary-label">최근 7일 합계</span>
        </div>
        <div class="activity-secondary">
          <div class="activity-secondary-item">
            <p class="label">활동일</p>
            <p id="activeDays" class="activity-secondary-val">–</p>
            <p class="activity-secondary-sub">7일 중</p>
          </div>
          <div class="activity-secondary-item">
            <p class="label">일평균 걸음</p>
            <p id="stepsAvg" class="activity-secondary-val">–</p>
            <p id="stepsTotal" class="activity-secondary-sub">–</p>
          </div>
        </div>
      </div>

      <div class="chart-wrap chart-wrap-short">
        <canvas id="activityChart" aria-label="활동 차트" role="img"></canvas>
      </div>
    </section>

    <footer class="foot">
      <p id="statusLine">데이터를 불러오는 중입니다.</p>
      <p class="shortcut"><kbd>R</kbd> 새로고침 · <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> 기간 전환</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script defer src="./app.js"></script>
</body>
</html>
