<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근무시간 계산기</title>
    <style>
        :root {
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.12);
            --bg: #0f0f11;
            --card: #ffffff;
            --card-elev: #f5f5f7;
            --border: #e5e5ea;
            --border-strong: #c7c7cc;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --warn-5: #f59e0b;
            --warn-1: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            padding: 28px 24px;
            max-width: 440px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .notification-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .notification-toggle:hover {
            border-color: var(--border-strong);
        }

        .toggle-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            user-select: none;
        }

        .toggle-switch {
            position: relative;
            width: 28px;
            height: 16px;
            background: #d1d1d6;
            border-radius: 8px;
            transition: background 0.15s ease;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            transition: transform 0.15s ease;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(12px);
        }

        .reset-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.15s ease;
        }

        .reset-icon:hover {
            border-color: var(--border-strong);
            color: var(--text);
        }

        .reset-icon svg {
            width: 14px;
            height: 14px;
        }

        .permission-msg {
            display: none;
            margin-bottom: 16px;
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            font-size: 12px;
            color: #b91c1c;
            text-align: center;
        }

        .permission-msg.show {
            display: block;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-label {
            display: block;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .time-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 22px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: center;
            background: var(--card-elev);
            color: var(--text);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            font-family: inherit;
            color-scheme: light;
        }

        .time-input:hover {
            border-color: var(--border-strong);
        }

        .time-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .quick-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .quick-btn {
            flex: 1;
            padding: 8px;
            background: var(--card-elev);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            font-family: inherit;
            transition: all 0.15s ease;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .quick-btn.increment {
            font-variant-numeric: tabular-nums;
        }

        .quick-btn.increment-minus {
            color: #dc2626;
        }

        .quick-btn.increment-minus:hover {
            border-color: #dc2626;
            color: #dc2626;
        }

        details.settings {
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-elev);
        }

        details.settings[open] {
            padding-bottom: 4px;
        }

        details.settings summary {
            padding: 12px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
        }

        details.settings summary::-webkit-details-marker {
            display: none;
        }

        details.settings summary::after {
            content: '＋';
            color: var(--text-muted);
            font-size: 14px;
        }

        details.settings[open] summary::after {
            content: '−';
        }

        .settings-body {
            padding: 4px 14px 12px;
            display: grid;
            gap: 12px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-row-label {
            flex: 1;
            font-size: 13px;
            color: var(--text);
        }

        .num-input {
            width: 56px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            text-align: center;
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            color-scheme: light;
        }

        .num-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .unit-label {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
        }

        .result-card {
            background: var(--accent);
            padding: 24px 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            margin-top: 20px;
        }

        .result-card.show {
            display: block;
            animation: resultFadeIn 0.2s ease;
        }

        .result-card.warning-5min {
            background: var(--warn-5);
        }

        .result-card.warning-1min {
            background: var(--warn-1);
            animation: resultFadeIn 0.2s ease, urgentPulse 2s infinite;
        }

        .result-card.overtime {
            background: var(--success);
        }

        @keyframes resultFadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes urgentPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.015); }
        }

        .result-countdown {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .result-time {
            color: white;
            font-size: 40px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }

        .result-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 14px;
        }

        .result-details {
            color: rgba(255, 255, 255, 0.82);
            font-size: 11px;
            line-height: 1.7;
            font-weight: 400;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 10px;
            margin-top: 4px;
        }

        .progress-container {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            margin: 10px 0 16px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 3px;
            transition: width 1s linear;
        }

        .progress-text {
            margin-top: 4px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 420px) {
            .container {
                padding: 20px 16px;
            }

            .header {
                margin-bottom: 20px;
            }

            .result-time {
                font-size: 34px;
            }

            .time-input {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>근무시간 계산기</h1>
            <div class="controls">
                <div class="notification-toggle" onclick="toggleNotification()">
                    <span class="toggle-label">알림</span>
                    <div class="toggle-switch" id="notificationToggle">
                        <div class="toggle-slider"></div>
                    </div>
                </div>
                <div class="reset-icon" onclick="reset()" title="초기화" aria-label="초기화">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 3-6.7"/>
                        <path d="M3 4v5h5"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="permission-msg" id="permissionMsg">
            브라우저 설정에서 알림 권한을 허용해주세요
        </div>

        <div class="section">
            <label class="section-label" for="startTime">출근</label>
            <input type="time" class="time-input" id="startTime" value="09:00" oninput="calculate()">
            <div class="quick-actions">
                <button class="quick-btn" onclick="setStartTime('09:00')">09:00</button>
                <button class="quick-btn" onclick="setStartTime('10:00')">10:00</button>
                <button class="quick-btn" onclick="setStartTime('11:00')">11:00</button>
            </div>
            <div class="quick-actions">
                <button class="quick-btn increment increment-minus" onclick="incrementStart(-1)">−1분</button>
                <button class="quick-btn increment" onclick="incrementStart(1)">+1분</button>
                <button class="quick-btn increment" onclick="incrementStart(5)">+5분</button>
                <button class="quick-btn increment" onclick="incrementStart(10)">+10분</button>
                <button class="quick-btn increment" onclick="incrementStart(30)">+30분</button>
            </div>
        </div>

        <div class="section">
            <label class="section-label" for="targetTime">퇴근</label>
            <input type="time" class="time-input" id="targetTime" value="18:00" oninput="calculate()">
            <div class="quick-actions">
                <button class="quick-btn" onclick="setTargetTime('18:00')">18:00</button>
                <button class="quick-btn" onclick="setTargetTime('19:00')">19:00</button>
                <button class="quick-btn" onclick="setTargetTime('20:00')">20:00</button>
            </div>
            <div class="quick-actions">
                <button class="quick-btn increment increment-minus" onclick="incrementTarget(-1)">−1분</button>
                <button class="quick-btn increment" onclick="incrementTarget(1)">+1분</button>
                <button class="quick-btn increment" onclick="incrementTarget(5)">+5분</button>
                <button class="quick-btn increment" onclick="incrementTarget(10)">+10분</button>
                <button class="quick-btn increment" onclick="incrementTarget(30)">+30분</button>
            </div>
        </div>

        <details class="settings">
            <summary id="settingsSummary">설정 · 기본 8시간 · 휴게 1시간</summary>
            <div class="settings-body">
                <div class="settings-row">
                    <span class="settings-row-label">기본 근로</span>
                    <input type="number" class="num-input" id="baseHour" min="0" max="23" value="8" oninput="calculate()">
                    <span class="unit-label">시간</span>
                    <input type="number" class="num-input" id="baseMinute" min="0" max="59" value="0" oninput="calculate()">
                    <span class="unit-label">분</span>
                </div>
                <div class="settings-row">
                    <span class="settings-row-label">휴게시간</span>
                    <input type="number" class="num-input" id="breakHour" min="0" max="23" value="1" oninput="calculate()">
                    <span class="unit-label">시간</span>
                    <input type="number" class="num-input" id="breakMinute" min="0" max="59" value="0" oninput="calculate()">
                    <span class="unit-label">분</span>
                </div>
            </div>
        </details>

        <div class="result-card" id="result">
            <div class="result-countdown" id="resultCountdown"></div>
            <div class="result-time" id="resultTime"></div>
            <div class="result-subtitle" id="resultSubtitle"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="result-details" id="resultDetails"></div>
        </div>
    </div>

    <script>
        let notificationEnabled = false;
        let notified5min = false;
        let notified1min = false;
        let notifiedNow = false;

        function init() {
            const savedNotification = localStorage.getItem('notificationEnabled');
            if (savedNotification === 'true') {
                checkNotificationPermission();
            }
            updateSettingsSummary();
            calculate();
        }

        function parseTime(value) {
            if (!value) return null;
            const [h, m] = value.split(':').map(Number);
            if (isNaN(h) || isNaN(m)) return null;
            return { h, m };
        }

        function setStartTime(value) {
            document.getElementById('startTime').value = value;
            calculate();
        }

        function setTargetTime(value) {
            document.getElementById('targetTime').value = value;
            calculate();
        }

        function addMinutes(value, amount) {
            const parsed = parseTime(value);
            if (!parsed) return value;
            let total = parsed.h * 60 + parsed.m + amount;
            total = ((total % 1440) + 1440) % 1440;
            const h = Math.floor(total / 60);
            const m = total % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function incrementStart(amount) {
            const el = document.getElementById('startTime');
            el.value = addMinutes(el.value || '09:00', amount);
            calculate();
        }

        function incrementTarget(amount) {
            const el = document.getElementById('targetTime');
            el.value = addMinutes(el.value || '18:00', amount);
            calculate();
        }

        function updateSettingsSummary() {
            const baseH = parseInt(document.getElementById('baseHour').value) || 0;
            const baseM = parseInt(document.getElementById('baseMinute').value) || 0;
            const breakH = parseInt(document.getElementById('breakHour').value) || 0;
            const breakM = parseInt(document.getElementById('breakMinute').value) || 0;
            const baseLabel = baseM ? `${baseH}시간 ${baseM}분` : `${baseH}시간`;
            const breakLabel = breakM ? `${breakH}시간 ${breakM}분` : `${breakH}시간`;
            document.getElementById('settingsSummary').textContent =
                `설정 · 기본 ${baseLabel} · 휴게 ${breakLabel}`;
        }

        function toggleNotification() {
            if (!notificationEnabled) {
                checkNotificationPermission();
            } else {
                notificationEnabled = false;
                document.getElementById('notificationToggle').classList.remove('active');
                localStorage.setItem('notificationEnabled', 'false');
                document.getElementById('permissionMsg').classList.remove('show');
            }
        }

        async function checkNotificationPermission() {
            if (!('Notification' in window)) {
                alert('이 브라우저는 알림을 지원하지 않습니다.');
                return;
            }

            const permission = Notification.permission;

            if (permission === 'granted') {
                notificationEnabled = true;
                document.getElementById('notificationToggle').classList.add('active');
                localStorage.setItem('notificationEnabled', 'true');
                document.getElementById('permissionMsg').classList.remove('show');
            } else if (permission === 'denied') {
                notificationEnabled = false;
                document.getElementById('notificationToggle').classList.remove('active');
                document.getElementById('permissionMsg').classList.add('show');
            } else {
                const result = await Notification.requestPermission();
                if (result === 'granted') {
                    notificationEnabled = true;
                    document.getElementById('notificationToggle').classList.add('active');
                    localStorage.setItem('notificationEnabled', 'true');
                    document.getElementById('permissionMsg').classList.remove('show');
                } else {
                    notificationEnabled = false;
                    document.getElementById('notificationToggle').classList.remove('active');
                    document.getElementById('permissionMsg').classList.add('show');
                }
            }
        }

        function showNotification(title, body) {
            if (!notificationEnabled || Notification.permission !== 'granted') return;
            new Notification(title, {
                body: body,
                tag: 'work-timer',
                requireInteraction: false
            });
            playBeep(0.3, 800);
        }

        function playBeep(duration, frequency) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (e) {
                console.log('오디오 재생 실패:', e);
            }
        }

        function calculate() {
            updateSettingsSummary();

            const start = parseTime(document.getElementById('startTime').value);
            const target = parseTime(document.getElementById('targetTime').value);
            const baseH = parseInt(document.getElementById('baseHour').value) || 0;
            const baseM = parseInt(document.getElementById('baseMinute').value) || 0;
            const breakH = parseInt(document.getElementById('breakHour').value) || 0;
            const breakM = parseInt(document.getElementById('breakMinute').value) || 0;

            if (!start || !target) {
                document.getElementById('result').classList.remove('show');
                return;
            }

            const startMinutes = start.h * 60 + start.m;
            const endMinutes = target.h * 60 + target.m;
            const breakMinutes = breakH * 60 + breakM;
            const baseMinutes = baseH * 60 + baseM;

            let workMinutes = endMinutes - startMinutes - breakMinutes;
            if (endMinutes < startMinutes) workMinutes += 24 * 60;

            const overtimeMinutes = workMinutes - baseMinutes;
            const overtimeAbs = Math.abs(overtimeMinutes);
            const overtimeSign = overtimeMinutes < 0 ? '-' : '+';
            const overtimeH = Math.floor(overtimeAbs / 60);
            const overtimeM = overtimeAbs % 60;

            const workH = Math.floor(workMinutes / 60);
            const workM = workMinutes % 60;

            document.getElementById('resultTime').textContent =
                `${String(target.h).padStart(2, '0')}:${String(target.m).padStart(2, '0')}`;

            document.getElementById('resultSubtitle').textContent =
                `추가 근로 ${overtimeSign}${overtimeH}시간 ${overtimeM}분`;

            document.getElementById('resultDetails').innerHTML =
                `출근 ${String(start.h).padStart(2, '0')}:${String(start.m).padStart(2, '0')} · ` +
                `퇴근 ${String(target.h).padStart(2, '0')}:${String(target.m).padStart(2, '0')}<br>` +
                `실 근무 ${workH}시간 ${workM}분 · 휴게 ${breakH}시간 ${breakM}분`;

            document.getElementById('result').classList.add('show');

            notified5min = false;
            notified1min = false;
            notifiedNow = false;

            if (window.countdownInterval) {
                clearInterval(window.countdownInterval);
            }

            updateCountdown(target.h, target.m, start.h, start.m);
            window.countdownInterval = setInterval(
                () => updateCountdown(target.h, target.m, start.h, start.m), 1000);
        }

        function updateCountdown(endH, endM, startH, startM) {
            const now = new Date();
            const currentTotalS = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            const endTotalS = endH * 3600 + endM * 60;
            const startTotalS = startH * 3600 + startM * 60;

            let remainingTotalS = endTotalS - currentTotalS;

            if (remainingTotalS < 0 && remainingTotalS > -12 * 3600) {
                remainingTotalS = 0;
            } else if (remainingTotalS < 0) {
                remainingTotalS += 24 * 3600;
            }

            const remainingH = Math.floor(remainingTotalS / 3600);
            const remainingM = Math.floor((remainingTotalS % 3600) / 60);
            const remainingS = remainingTotalS % 60;

            let elapsedTotalS = currentTotalS - startTotalS;
            if (elapsedTotalS < 0) elapsedTotalS += 24 * 3600;

            let totalSpanS = endTotalS - startTotalS;
            if (totalSpanS <= 0) totalSpanS += 24 * 3600;
            const progressPercent = Math.min(100, Math.max(0, (elapsedTotalS / totalSpanS) * 100));
            document.getElementById('progressBar').style.width = progressPercent.toFixed(1) + '%';
            document.getElementById('progressText').textContent = Math.round(progressPercent) + '%';

            const resultCard = document.getElementById('result');
            resultCard.classList.remove('warning-5min', 'warning-1min', 'overtime');

            if (remainingTotalS <= 0) {
                document.getElementById('resultCountdown').textContent = '퇴근 완료';
                resultCard.classList.add('overtime');
                document.title = '🎉 퇴근!';

                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressText').textContent = '100%';

                if (!notifiedNow) {
                    if (notificationEnabled) {
                        showNotification('퇴근 시간', '수고하셨습니다!');
                    }
                    playBeep(0.5, 1000);
                    notifiedNow = true;
                }

                clearInterval(window.countdownInterval);
                return;
            }

            const countdownText = `퇴근까지 ${String(remainingH).padStart(2, '0')}:${String(remainingM).padStart(2, '0')}:${String(remainingS).padStart(2, '0')}`;
            document.getElementById('resultCountdown').textContent = countdownText;

            if (remainingTotalS <= 60) {
                resultCard.classList.add('warning-1min');
                document.title = `🔴 ${String(remainingM).padStart(2, '0')}:${String(remainingS).padStart(2, '0')}`;

                if (!notified1min) {
                    if (notificationEnabled) {
                        showNotification('근무시간 알림', '퇴근까지 1분 남았습니다');
                    }
                    notified1min = true;
                }
            } else if (remainingTotalS <= 300) {
                resultCard.classList.add('warning-5min');
                document.title = `⏰ ${String(remainingH).padStart(2, '0')}:${String(remainingM).padStart(2, '0')}`;

                if (!notified5min) {
                    if (notificationEnabled) {
                        showNotification('근무시간 알림', `퇴근까지 5분 남았습니다`);
                    }
                    notified5min = true;
                }
            } else if (remainingTotalS <= 600) {
                document.title = `⏰ ${String(remainingH).padStart(2, '0')}:${String(remainingM).padStart(2, '0')}`;
            } else {
                document.title = '근무시간 계산기';
            }
        }

        function reset() {
            document.getElementById('startTime').value = '09:00';
            document.getElementById('targetTime').value = '18:00';
            document.getElementById('baseHour').value = '8';
            document.getElementById('baseMinute').value = '0';
            document.getElementById('breakHour').value = '1';
            document.getElementById('breakMinute').value = '0';
            calculate();
        }

        init();
    </script>
</body>

</html>
